    <div style="background:linear-gradient(135deg,#E65100,#BF360C);border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(230,81,0,.3)">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <span style="font-size:1.8rem;flex-shrink:0">🔔</span>
        <div style="flex:1">
          <p style="font-weight:700;color:white;font-size:.92rem;margin-bottom:4px">Sugerencia de cambio de categoría</p>
          <p style="color:rgba(255,255,255,.85);font-size:.78rem;line-height:1.4">${regla.msg}</p>
          <p style="color:rgba(255,255,255,.65);font-size:.73rem;margin-top:4px">Peso actual: <strong style="color:white">${pesoAct.toFixed(1)} kg</strong> · Categoría actual: <strong style="color:white">${a.categoria}</strong></p>
        </div>

        ${regla.sugeridas.map(cat=>`
          <button onclick="confirmarCambioCat(${id},'${cat}')"
            style="border:none;background:rgba(255,255,255,.2);color:white;border-radius:8px;padding:8px 16px;font-size:.82rem;font-weight:700;cursor:pointer;flex:1;min-width:80px">
            Cambiar a ${cat}
          </button>`).join('')}
        <button onclick="posponerCambioCat(${id})"
          style="border:1.5px solid rgba(255,255,255,.35);background:none;color:rgba(255,255,255,.7);border-radius:8px;padding:8px 12px;font-size:.78rem;cursor:pointer">
          Luego
        </button>
      </div>
    </div>` : ''

    <div class="tab${tab==='pesajes'?' on':''}" onclick="setTab('af','pesajes');go('animal-ficha',{id:${id}})">Pesajes</div>
    <div class="tab${tab==='labores'?' on':''}" onclick="setTab('af','labores');go('animal-ficha',{id:${id}})">Labores</div>
    <div class="tab${tab==='rend'?' on':''}" onclick="setTab('af','rend');go('animal-ficha',{id:${id}})">Rendimiento</div>

    ${rowD('Raza',a.raza||'—')} ${rowD('Color',a.color||'—')} ${rowD('Descripción',a.descripcion||'—')}

    ${a.precioPorKg&&a.pesoInicial?rowD('Valor total compra',`$${(a.precioPorKg*a.pesoInicial).toLocaleString()}`,true):''}
    ${rowD('Ingreso finca',ffd(a.fechaIngreso))} ${rowD('Procedencia',a.procedencia||'—',true)}
  </div>`

  else if(tab==='pesajes') {
    const ps=await db.pesajes.where('animalId').equals(id).reverse().sortBy('fecha')
    body=ps.length?ps.map(p=>`<div class="card mb8">
      <div class="row-b">
        <div><p class="bold">${p.pesoKg.toFixed(1)} kg</p>

          ${l.registradoPor?`<p class="xs" style="color:#b0b0b0;margin-top:2px">👤 ${l.registradoPor}${l.registradoEn?' · '+ffdHora(l.registradoEn):''}</p>`:''}
        </div>
        <span class="badge bg-blue">${l.tipo}</span>
      </div>
    </div>`).join(''):
    '<div class="empty"><div class="eico">📋</div><p>Sin labores registradas</p></div>'
  }

  else { // rendimiento
    const afPeriodos=[{v:30,l:'30 días'},{v:90,l:'3 meses'},{v:180,l:'6 meses'},{v:365,l:'1 año'},{v:0,l:'Todo'}]
    const afPSel=parseInt(_seg['afp']??'0')
    const afDesdeTs=afPSel>0?Date.now()-afPSel*86400000:0

    const ps=await db.pesajes.where('animalId').equals(id).sortBy('fecha')
    const psFilt=afDesdeTs>0?ps.filter(p=>p.fecha>=afDesdeTs):ps

    const diasTotal=a.fechaIngreso?diasDesde(a.fechaIngreso):0
    const ganTotal=pesoAct-(a.pesoInicial||0)
    const gdpTotal=diasTotal>0?Math.round(ganTotal/diasTotal*1000):0

    let ganPer=0, gdpPer=null
    if(afPSel>0){
      let base=null
      if(psFilt.length>=1) base=psFilt[0].pesoKg
      else {
        const antes=ps.filter(p=>p.fecha<afDesdeTs)
        if(antes.length) base=antes[antes.length-1].pesoKg
      }
      if(base!==null){
        ganPer=pesoAct-base
        const refTs=psFilt.length?psFilt[0].fecha:afDesdeTs
        const dias=Math.max(1,Math.round((Date.now()-refTs)/86400000))
        gdpPer=Math.round(ganPer/dias*1000)
      }
    }

    const afSegBtns=afPeriodos.map(p=>`<button class="${p.v===afPSel?'on':''}" onclick="_seg['afp']=${p.v};go('animal-ficha',{id:${id}})">${p.l}</button>`).join('')

    body=`<div class="seg mb8">${afSegBtns}</div>
    <div class="card mb8">

        <div class="card row-b mb8">
          <p class="xs gray">${ffd(p.fecha)}</p>
          <p class="bold green">${p.pesoKg.toFixed(1)} kg</p>
        </div>`).join('')
      : '<div class="empty"><p>Sin pesajes suficientes en el período</p></div>'}`
  }

  return hdr+tabs+body
}

async function saveCambioCat(animalId, nuevaCat) {

  try {

    await fsUpdate('animales', animalId, { categoria: nuevaCat })
    await fsAdd('labores', {
      animalId,
      fecha: Date.now(),
      tipo: 'CAMBIO_CAT',
      obs: `Categoría cambiada de ${prev.categoria} a ${nuevaCat}${obs?' · '+obs:''}`,

function toggleVentaFields(causa) {
  const div = $('bj1-venta')
  if (div) div.style.display = causa==='Venta' ? 'block' : 'none'
  const precio = $('bj1-precio'), peso = $('bj1-peso')
  if (precio) precio.oninput = () => _updResumenVenta()
  if (peso)   peso.oninput   = () => _updResumenVenta()
}
function _updResumenVenta() {
  const precio = parseFloat($('bj1-precio')?.value)||0
  const peso   = parseFloat($('bj1-peso')?.value)||0
  const res = $('bj1-resumen'), tot = $('bj1-total')
  if (precio > 0 && peso > 0) {
    if (res) res.style.display = 'block'
    if (tot) tot.textContent = `$${(precio*peso).toLocaleString('es-CO')} (${peso} kg × $${precio.toLocaleString('es-CO')}/kg)`
  } else {
    if (res) res.style.display = 'none'
  }
}

async function saveBajaAnimal(id) {
  const causa = $('bj1-causa')?.value
  if (!causa) {
    const sel = $('bj1-causa')
    if (sel) { sel.style.border = '2px solid #C62828'; sel.focus() }
    showToast('Selecciona la causa de baja','err')
    return
  }
  // Validar precio si es venta
  const esVenta = causa === 'Venta'
  const precioVenta = parseFloat($('bj1-precio')?.value)||0
  if (esVenta && !precioVenta) {
    const f=$('bj1-precio'); if(f){f.style.border='2px solid #C62828';f.focus()}
    showToast('Ingresa el precio de venta por kg','err'); return
  }
  const fechaStr = $('bj1-fecha')?.value
  const obs = $('bj1-obs')?.value?.trim() || ''
  const fechaBaja = fechaStr ? new Date(fechaStr+'T00:00:00').getTime() : Date.now()
  const btn = $('bj1-btn')
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…' }
  let prev
  try {
    prev = await db.animales.get(id)
    // Peso de venta: campo ingresado o último pesaje o pesoInicial
    let pesoVenta = parseFloat($('bj1-peso')?.value)||0
    if (esVenta && !pesoVenta) {
      const ult = await getPesoActual(id)
      pesoVenta = ult?.pesoKg || prev?.pesoInicial || 0
    }
    const ventaData = esVenta ? {
      precioVentaKg: precioVenta,
      pesoVenta,
      valorVenta: precioVenta * pesoVenta,
      comprador: $('bj1-comprador')?.value?.trim() || ''
    } : {}
    await fsUpdate('animales', id, {
      activo:0, causaBaja:causa, fechaBaja, obsBaja:obs||undefined,
      loteId:undefined, fechaLote:undefined,
      ...ventaData
    })
    trazar('BAJA_ANIMAL','ANIMAL', id, {causa, fecha:fechaBaja})
  } catch(e) {
    showToast('Error al dar de baja','err', 4000)
    if (btn) { btn.disabled = false; btn.textContent = '✓ Confirmar baja' }
    return
  }
  closeSheet()
  pushUndo(`Baja de "${prev.arete}" revertida`, async () => {
    await fsUpdate('animales', id, {
      activo:1, causaBaja:undefined, fechaBaja:undefined, obsBaja:undefined,
      loteId:prev.loteId, fechaLote:prev.fechaLote,
      precioVentaKg:undefined, pesoVenta:undefined, valorVenta:undefined, comprador:undefined
    })
  })
  go(esVenta ? 'ventas' : 'ganado')
}

async function eliminarLotesSeleccionados(){
  const ids=[..._loteSelected]
  if(!ids.length) return
  const lotes=await Promise.all(ids.map(id=>db.lotes.get(id)))
  const nombres=lotes.map(l=>l?.nombre||'').filter(Boolean).join(', ')
  if(!confirm(`¿Eliminar los siguientes lotes?\n\n${nombres}\n\nLos animales asignados quedarán sin lote.`)) return
  // Snapshot completo antes de modificar
  const snapshots=[]
  for(const id of ids){
    const anis=await db.animales.where({activo:1,loteId:id}).toArray()
    const ciclo=await db.ciclos.where({loteId:id,activo:1}).first()
    snapshots.push({id, anis:anis.map(a=>({id:a.id,loteId:a.loteId,fechaLote:a.fechaLote})), ciclo})
  }
  // Ejecutar eliminación
  for(const {id,anis,ciclo} of snapshots){
    for(const a of anis) await fsUpdate('animales',a.id,{loteId:undefined,fechaLote:undefined})
    if(ciclo){
      await fsUpdate('ciclos',ciclo.id,{activo:0,fechaSalida:Date.now()})
      await fsUpdate('potreros',ciclo.potreroId,{estado:'EN_DESCANSO',numAnimales:0,loteActual:undefined,fechaSalida:Date.now()})
    }
    await fsUpdate('lotes',id,{activo:0})
  }
  _loteSelMode=false; _loteSelected.clear()
  const n=ids.length
  pushUndo(`${n} lote${n>1?'s eliminados':' eliminado'}`, async()=>{
    for(const {id,anis,ciclo} of snapshots){
      await fsUpdate('lotes',id,{activo:1})
      for(const a of anis) await fsUpdate('animales',a.id,{loteId:a.loteId,fechaLote:a.fechaLote})
      if(ciclo){
        await fsUpdate('ciclos',ciclo.id,{activo:1,fechaSalida:undefined})
        await fsUpdate('potreros',ciclo.potreroId,{estado:'OCUPADO',numAnimales:ciclo.numAnimales,loteActual:id,fechaSalida:undefined})
      }
    }
  })
  go('lotes')
}

  const msg=`¿Eliminar el lote "${l?.nombre}"?${anis.length?`\n\n${anis.length} animal(es) quedarán sin lote.`:''}`
  if(!confirm(msg)) return

  const snapshotAnis=anis.map(a=>({id:a.id,loteId:a.loteId,fechaLote:a.fechaLote}))
  for(const a of anis) await fsUpdate('animales',a.id,{loteId:undefined,fechaLote:undefined})
  if(ciclo){
    await fsUpdate('ciclos',ciclo.id,{activo:0,fechaSalida:Date.now()})
    await fsUpdate('potreros',ciclo.potreroId,{estado:'EN_DESCANSO',numAnimales:0,loteActual:undefined,fechaSalida:Date.now()})
  }
  await fsUpdate('lotes',id,{activo:0})
  pushUndo(`Lote "${l?.nombre}" eliminado`, async()=>{
    await fsUpdate('lotes',id,{activo:1})
    for(const s of snapshotAnis) await fsUpdate('animales',s.id,{loteId:s.loteId,fechaLote:s.fechaLote})
    if(ciclo){
      await fsUpdate('ciclos',ciclo.id,{activo:1,fechaSalida:undefined})
      await fsUpdate('potreros',ciclo.potreroId,{estado:'OCUPADO',numAnimales:ciclo.numAnimales,loteActual:id,fechaSalida:undefined})
    }
  })
  go('lotes')
}

// Estima el peso de un animal en una fecha dada, usando sus pesajes ordenados
function _pesoEnFecha(ps, fecha, pesoInicial) {
  const antes = ps.filter(p => p.fecha <= fecha)
  if (antes.length) return antes[antes.length-1].pesoKg
  return ps.length ? ps[0].pesoKg : (pesoInicial||0)
}

// Calcula métricas por ciclo para un lote
async function calcProdLote(loteId, desde=null, hasta=null) {
  const ciclos = (await db.ciclos.where('loteId').equals(loteId).sortBy('fechaEntrada')).filter(c=>c.fechaEntrada)
  if (!ciclos.length) return []
  const animales = await db.animales.where({activo:1,loteId}).toArray()
  if (!animales.length) return []
  const psMap = {}
  for (const a of animales) psMap[a.id] = await db.pesajes.where('animalId').equals(a.id).sortBy('fecha')
  const results = []
  for (const ciclo of ciclos) {
    const pot = await db.potreros.get(ciclo.potreroId)
    if (!pot?.areaHa) continue
    const cFin = ciclo.fechaSalida || Date.now()
    // Filtrar ciclos fuera del rango
    if (desde && cFin < desde) continue
    if (hasta && ciclo.fechaEntrada > hasta) continue
    // Recortar al rango seleccionado
    const fechaI = desde ? Math.max(ciclo.fechaEntrada, desde) : ciclo.fechaEntrada
    const fechaF = hasta ? Math.min(cFin, hasta) : cFin
    const dias = Math.max(1, Math.round((fechaF - fechaI)/86400000))
    let pE=0, pS=0
    for (const a of animales) {
      const ps = psMap[a.id]||[]
      pE += _pesoEnFecha(ps, fechaI, a.pesoInicial)
      pS += _pesoEnFecha(ps, fechaF, a.pesoInicial)
    }
    const gan = pS - pE
    const kgHa   = pot.areaHa > 0 ? gan / pot.areaHa : 0
    const kgHaDia = pot.areaHa > 0 && dias > 0 ? gan / pot.areaHa / dias : 0
    const carga   = pot.areaHa > 0 ? (pE/450) / pot.areaHa : 0
    results.push({pot, ciclo, dias, nAni:animales.length, pE, pS, gan, kgHa, kgHaDia, carga, activo:ciclo.activo===1})
  }
  return results
}

// Calcula métricas de productividad por potrero para una rotación
async function calcProdRotacion(rotacionId, desde=null, hasta=null) {
  const rot = await db.rotaciones.get(rotacionId)
  if (!rot) return null
  const pids = rot.potreroIds||[]
  if (!pids.length) return null
  const pots = await db.potreros.where('activo').equals(1).toArray()
  const potMap = Object.fromEntries(pots.map(p=>[p.id,p]))
  const areaTotal = pids.reduce((s,pid)=>s+(potMap[pid]?.areaHa||0), 0)
  const stats = []
  let ganTotal = 0
  for (const pid of pids) {
    const pot = potMap[pid]; if(!pot?.areaHa) continue
    const ciclos = (await db.ciclos.where('potreroId').equals(pid).toArray()).filter(c=>c.fechaEntrada)
    let kgHaSum=0, ciclosVal=0, ganPot=0
    for (const ciclo of ciclos) {
      const cFin = ciclo.fechaSalida||Date.now()
      if (desde && cFin < desde) continue
      if (hasta && ciclo.fechaEntrada > hasta) continue
      const fechaI = desde ? Math.max(ciclo.fechaEntrada, desde) : ciclo.fechaEntrada
      const fechaF = hasta ? Math.min(cFin, hasta) : cFin
      const anis = await db.animales.where({activo:1,loteId:ciclo.loteId}).toArray()
      if (!anis.length) continue
      let pE=0, pS=0
      for (const a of anis) {
        const ps = await db.pesajes.where('animalId').equals(a.id).sortBy('fecha')
        pE += _pesoEnFecha(ps, fechaI, a.pesoInicial)
        pS += _pesoEnFecha(ps, fechaF, a.pesoInicial)
      }
      const gan = pS-pE
      kgHaSum += pot.areaHa>0 ? gan/pot.areaHa : 0
      ganPot  += gan
      ganTotal+= gan
      ciclosVal++
    }
    stats.push({pot, ciclosVal, kgHaProm: ciclosVal>0?kgHaSum/ciclosVal:null, ganPot})
  }
  return {stats, ganTotal, areaTotal, kgHaTotal: areaTotal>0?ganTotal/areaTotal:0}
}

      <p class="bold green">${peso.toFixed(1)} kg</p>
    </div>`
  })):'<div class="empty"><p>Sin animales en este lote</p></div>'

  const selHeader = _lfSelMode && animales.length ? `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <p class="sec" style="margin:0">Animales del lote (${animales.length})</p>
      <button onclick="selectAllLF(${JSON.stringify(animales.map(a=>a.id))})"
        style="border:none;background:${_lfSelected.size===animales.length?'#C62828':'#2E7D32'};color:white;border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:700;cursor:pointer">
        ${_lfSelected.size===animales.length?'Desmarcar todos':'✓ Todos'}
      </button>
    </div>` : `<p class="sec">Animales del lote (${animales.length})</p>`

  _prodLoteId = id
  const prodMetrics = await calcProdLote(id, _prodLoteDesde, _prodLoteHasta)
  const prodCard = renderProdLoteHTML(prodMetrics, id, _prodLoteDesde, _prodLoteHasta)

  return hdr + prodCard + selHeader + (Array.isArray(listaAnimales)?listaAnimales.join(''):listaAnimales)
}

async function saveLaborLoteFicha() {
  const tipo = document.getElementById('sl-tipo')?.value
  if (!tipo) { showToast('Selecciona el tipo de labor','err'); return }
  let tipoLabel = tipo
  if (tipo === 'VACUNA') {
    const vt = document.getElementById('sl-vacuna-tipo')?.value
    if (!vt) {
      const s = document.getElementById('sl-vacuna-tipo')
      if (s) { s.style.border='2px solid #C62828'; s.focus() }
      showToast('Selecciona el tipo de vacuna','err'); return
    }
    const otraVal = vt === 'Otra' ? (document.getElementById('sl-vacuna-otra')?.value?.trim()||'Otra') : vt
    tipoLabel = 'VACUNA_' + otraVal.toUpperCase()
  }
  const fechaStr = document.getElementById('sl-fecha')?.value
  if (!fechaStr) { showToast('Selecciona la fecha','err'); return }
  const fecha = new Date(fechaStr+'T00:00:00').getTime()
  const prod = document.getElementById('sl-prod')?.value?.trim() || ''
  const obs  = document.getElementById('sl-obs')?.value?.trim() || ''
  const obsTexto = [prod, obs].filter(Boolean).join(' · ')
  const ids = _sheetLaborIds
  if (!ids.length) { closeSheet(); return }
  const btn = document.getElementById('sl-btn')
  if (btn) { btn.disabled = true; btn.textContent = 'Registrando…' }
  const labIds = []
  try {
    for (const animalId of ids) {
      const lid = await fsAdd('labores', {
        animalId, fecha, tipo: tipoLabel,
        obs: obsTexto || null,
        registradoPor: USER?.nombre||'—',
        registradoEn: Date.now()
      })
      labIds.push(lid)
    }
  } catch(e) {
    showToast('Error al registrar labores','err', 4000)
    if (btn) { btn.disabled = false; btn.textContent = '✓ Registrar' }
    return
  }
  closeSheet()
  _sheetLaborIds = []
  _lfSelMode = false
  _lfSelected = new Set()
  const n = labIds.length
  pushUndo(`Labor registrada en ${n} animal${n>1?'es':''}`, async () => {
    for (const lid of labIds) await fsDelete('labores', lid)
  })
  go('lote-ficha', {id: _lfLoteId})
}

function filtrarAnimalesLote(){
  const ql=($('aa-bus')?.value||'').toLowerCase().trim()
  const fCat=$('aa-cat')?.value||''
  const fRaza=$('aa-raza')?.value||''
  const fColor=$('aa-color')?.value||''
  const fuente=_aaTab==='disp'?_aniLoteLibres:_aniLoteEnOtros
  _aniLoteFiltrada=fuente.filter(a=>{
    if(ql&&!((a.arete||'').toLowerCase().includes(ql)||(a.nombre||'').toLowerCase().includes(ql))) return false
    if(fCat&&a.categoria!==fCat) return false
    if(fRaza&&a.raza!==fRaza) return false
    if(fColor&&(a.color||'')!==fColor) return false
    return true

    const bc=sel?(esTraslado?'#E65100':'#1565C0'):'#ccc'

      </div>

function _actualizarBtnAA(){
  const n=_aniLoteSel.size, nF=_aniLoteFiltrada.length
  const todos=nF>0&&_aniLoteFiltrada.every(a=>_aniLoteSel.has(a.id))
  const esT=_aaTab==='traslado'
  const selColor=esT?'#E65100':'#1565C0'
  const count=$('aa-count'),info=$('aa-sel-info'),btn=$('aa-btn'),btnT=$('aa-sel-todo')
  if(count) count.textContent=`${nF} en esta pestaña`
  if(info){
    const nT=[..._aniLoteSel].filter(id=>_aniLoteEnOtros.some(a=>a.id===id)).length
    const nD=n-nT
    let txt=''
    if(nD>0) txt+=`${nD} disponible${nD>1?'s':''}`
    if(nT>0) txt+=(txt?' · ':'')+`${nT} traslado${nT>1?'s':''} 🟠`
    info.textContent=txt?txt+' seleccionado'+((n>1)?'s':'')+' ✓':''
    info.style.color=nT>0?'#E65100':'#1565C0'
  }
  if(btn){btn.disabled=n===0;btn.textContent=n>0?`Agregar ${n} al lote`:'Agregar al lote'}
  if(btnT){btnT.textContent=todos?'☑ Deseleccionar todo':'☐ Seleccionar todo';btnT.style.borderColor=todos?(esT?'#C62828':'#C62828'):selColor;btnT.style.color=todos?(esT?'#C62828':'#C62828'):selColor}
}
async function saveAgregarAnimal(){
  const ids=[..._aniLoteSel]; if(!ids.length) return
  const traslados=_aniLoteEnOtros.filter(a=>ids.includes(a.id))
  if(traslados.length){
    const loteDestino=await db.lotes.get(_aniLoteId)
    const lista=traslados.map(a=>`• ${a.arete}${a.nombre?' ('+a.nombre+')':''} — actualmente en "${a._loteNombre}"`).join('\n')
    const msg=`⚠ TRASLADO\n${traslados.length} animal${traslados.length>1?'es':''} en otro lote se moverán a "${loteDestino?.nombre||'este lote'}".\n\n${lista}\n\n¿Confirmar traslado?`
    if(!confirm(msg)) return
  }
  const btn=$('aa-btn')
  if(btn){btn.disabled=true;btn.textContent='Agregando…'}
  let snaps=[]
  try{
    for(const anId of ids){
      const prev=await db.animales.get(anId)
      snaps.push({id:anId,loteId:prev?.loteId,fechaLote:prev?.fechaLote})
      await fsUpdate('animales',anId,{loteId:_aniLoteId,fechaLote:Date.now()})
    }
  }catch(e){
    showToast('Error al agregar animales','err',4000)
    if(btn){btn.disabled=false;btn.textContent=`Agregar ${ids.length} al lote`}
    return
  }
  pushUndo(`${ids.length} animal${ids.length>1?'es':''} agregado${ids.length>1?'s':''}`, async()=>{
    for(const s of snaps) await fsUpdate('animales',s.id,{loteId:s.loteId||undefined,fechaLote:s.fechaLote||undefined})
  })
  _aniLoteSel=new Set()
  if(_aniLoteFromEdit){ _aniLoteFromEdit=false; openEditarLote(_aniLoteId) }
  else { closeSheet(); go('lote-ficha',{id:_aniLoteId}) }
}

        ${n>0?`<button class="btn btn-sm btn-r" onclick="eliminarPotrerosSel()">🗑 Eliminar (${n})</button>`:''}
      </div>`
  } else {
    $('hdrAct').innerHTML=`
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-gray" onclick="activarSelPotreros()">Seleccionar</button>
        <button class="btn btn-sm btn-g" onclick="go('potrero-nuevo')">+ Nuevo</button>
      </div>`
  }

  const pots=await db.potreros.where('activo').equals(1).toArray()
  if(!pots.length) return `<div class="empty"><div class="eico">🌿</div><p>Sin potreros registrados</p>
    <button class="btn btn-g mt12" style="max-width:220px;margin:12px auto 0" onclick="go('potrero-nuevo')">+ Agregar potrero</button></div>`

  const mkCard=async p=>{
    const cicloActivo=await db.ciclos.where({potreroId:p.id,activo:1}).first()
    const diasOcup=cicloActivo?diasDesde(cicloActivo.fechaEntrada):0
    const diasDesc=p.fechaSalida&&p.estado==='EN_DESCANSO'?diasDesde(p.fechaSalida):0
    const bl=blPotrero(p,diasOcup,diasDesc)
    const semHtml=p.estado==='OCUPADO'?renderSem(semOcup(diasOcup),'ocup'):p.estado==='EN_DESCANSO'?renderSem(semDesc(diasDesc),'desc'):''
    const sel=_potSelected.has(p.id)
    const busqData=`${p.nombre} ${p.pastos||''} ${cicloActivo?.nombreLote||''}`.toLowerCase()
    if(_potSelMode){
      return `<div class="card border-l4 pot-card ${sel?'bl-red':bl}" data-busq="${busqData}" style="cursor:pointer;${sel?'background:#FFF5F5':''}" onclick="togglePotreroSel(${p.id})">
        <div class="row-b">
          <div class="row" style="gap:10px;align-items:center;flex:1">
            <div style="width:22px;height:22px;border-radius:6px;border:2px solid ${sel?'#C62828':'#ccc'};background:${sel?'#C62828':'white'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
              ${sel?'<span style="color:white;font-size:14px;font-weight:700">✓</span>':''}
            </div>
            <div style="flex:1">
              <p class="bold">${p.nombre}</p>
              <p class="xs gray">${p.areaHa?.toFixed(1)||0} ha · ${p.pastos||'—'}</p>
              ${cicloActivo?`<p class="xs gray">Lote: ${cicloActivo.nombreLote||'—'}</p>`:''}
            </div>
          </div>
          <span class="badge ${p.estado==='OCUPADO'?'bg-orange':p.estado==='EN_DESCANSO'?'bg-blue':'bg-green'}" style="font-size:.72rem">${ESTADO_POT[p.estado]}</span>
        </div>
      </div>`
    }
    return `<div class="card border-l4 pot-card ${bl}" data-busq="${busqData}" style="cursor:pointer" onclick="go('potrero-ficha',{id:${p.id}})">
      <div class="row-b">
        <div style="flex:1">
          <p class="bold">${p.nombre}</p>
          <p class="xs gray">${p.areaHa?.toFixed(1)||0} ha · ${p.pastos||'—'}</p>
          ${cicloActivo?`<p class="xs gray">Lote: ${cicloActivo.nombreLote||'—'} · ${fmtDias(diasOcup)}</p>`:''}
          ${p.estado==='EN_DESCANSO'?`<p class="xs gray">Descanso: ${diasDesc} días</p>`:''}
        </div>
        <div class="row" style="gap:10px;align-items:center">
          ${semHtml}
          <span class="badge ${p.estado==='OCUPADO'?'bg-orange':p.estado==='EN_DESCANSO'?'bg-blue':p.estado==='EN_MANEJO'?'bg-purple':'bg-green'}" style="font-size:.72rem">${ESTADO_POT[p.estado]}</span>
        </div>
      </div>
    </div>`
  }

  const secTit=(label,n,color,grupo)=>n>0
    ?`<p class="pot-sec" data-grupo="${grupo}" style="font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:${color};margin:14px 0 6px 2px">${label} <span style="font-weight:500;opacity:.7">(${n})</span></p>`
    :''

  // Calcular prioridad para ordenar dentro de cada grupo
  const potsConPrio = await Promise.all(pots.map(async p => {
    const cicloActivo = await db.ciclos.where({potreroId:p.id,activo:1}).first()
    const diasOcup = cicloActivo ? diasDesde(cicloActivo.fechaEntrada) : 0
    const diasDesc = p.fechaSalida && p.estado==='EN_DESCANSO' ? diasDesde(p.fechaSalida) : 0
    p._diasOcup = diasOcup  // Cachear para el resumen
    p._diasDesc = diasDesc
    return { p, prio: semPrioridad(p, diasOcup, diasDesc) }
  }))

  // Ordenar: mayor prioridad (rojo=2) arriba dentro de cada grupo
  const ordenar = arr => arr.sort((a,b) => b.prio - a.prio).map(x => x.p)

  const grOcup = ordenar(potsConPrio.filter(x => x.p.estado==='OCUPADO'||x.p.estado==='EN_MANEJO'))
  const grDesc = ordenar(potsConPrio.filter(x => x.p.estado==='EN_DESCANSO'))
  const grDisp = potsConPrio.filter(x => x.p.estado==='DISPONIBLE').map(x => x.p)

  const [cOcup,cDesc,cDisp]=await Promise.all([
    Promise.all(grOcup.map(mkCard)),
    Promise.all(grDesc.map(mkCard)),
    Promise.all(grDisp.map(mkCard))
  ])

  // Resumen semáforo — máximo días por grupo
  const ocupados = potsConPrio.filter(x => x.p.estado==='OCUPADO'||x.p.estado==='EN_MANEJO')
  const descansando = potsConPrio.filter(x => x.p.estado==='EN_DESCANSO')

  // El más crítico de cada grupo (mayor días)
  const maxOcup = ocupados.reduce((mx,x) => {
    const d = x.p._diasOcup || 0; return d > mx.dias ? {p:x.p, dias:d, prio:x.prio} : mx
  }, {p:null, dias:0, prio:0})
  const maxDesc = descansando.reduce((mx,x) => {
    const d = x.p._diasDesc || 0; return d > mx.dias ? {p:x.p, dias:d, prio:x.prio} : mx
  }, {p:null, dias:0, prio:0})

  const semColor = prio => prio===3?{bg:'#FFEBEE',txt:'#C62828',ico:'🔴'}:prio===2?{bg:'#FFF8E1',txt:'#E65100',ico:'🟡'}:prio===1?{bg:'#E3F2FD',txt:'#1565C0',ico:'🔵'}:{bg:'#E8F5E9',txt:'#2E7D32',ico:'🟢'}

  const resumenSem = ''

  const leyenda = _potSelMode
    ? `<p class="xs gray center mb8">Toca un potrero para seleccionarlo</p>`
    : `<div class="card mb8" style="padding:10px 14px;font-size:.75rem;color:#666;line-height:2">
        <div><span style="font-weight:700;color:#444">Días de ocupación:</span> &nbsp;🟢 1–${SEM_OCUP.azul}d &nbsp;🔵 4–${SEM_OCUP.amarillo}d &nbsp;🟡 8–${SEM_OCUP.rojo}d &nbsp;🔴 +${SEM_OCUP.rojo}d</div>
        <div><span style="font-weight:700;color:#444">Días de descanso:</span> &nbsp;🟢 20–30d &nbsp;🔵 31–40d &nbsp;🟡 41–50d &nbsp;🔴 +50d</div>
      </div>`

  const busqInput=`<div style="position:relative;margin-bottom:10px">
    <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:.95rem;color:#aaa">🔍</span>
    <input id="pot-busq" class="inp" placeholder="Buscar potrero…" value="${_potBusq}"
      style="padding-left:34px;font-size:.87rem"
      oninput="_potBusq=this.value;filtrarPotreros(this.value)">
  </div>`

  return (
    resumenSem +
    leyenda +
    busqInput +
    secTit('Ocupación', grOcup.length, '#E65100','ocup') + cOcup.join('') +
    secTit('Descanso',  grDesc.length, '#1565C0','desc') + cDesc.join('') +
    secTit('Disponibles', grDisp.length, '#2E7D32','disp') + cDisp.join('')
  )
}

function activarSelPotreros(){ _potSelMode=true; _potSelected.clear(); go('potreros') }
function cancelarSelPotreros(){ _potSelMode=false; _potSelected.clear(); go('potreros') }
function filtrarPotreros(q){
  const term=(q||'').toLowerCase().trim()
  document.querySelectorAll('.pot-card').forEach(c=>{
    c.style.display=(!term||c.dataset.busq.includes(term))?'':'none'
  })
  document.querySelectorAll('.pot-sec').forEach(sec=>{
    let next=sec.nextElementSibling, visible=false
    while(next&&!next.classList.contains('pot-sec')){
      if(next.classList.contains('pot-card')&&next.style.display!=='none') visible=true
      next=next.nextElementSibling
    }
    sec.style.display=visible?'':'none'
  })
}
function togglePotreroSel(id){
  if(_potSelected.has(id)) _potSelected.delete(id)
  else _potSelected.add(id)
  go('potreros')
}
async function eliminarPotrerosSel(){
  const ids=[..._potSelected]
  if(!ids.length) return
  const pots=await Promise.all(ids.map(id=>db.potreros.get(id)))
  const ocupados=pots.filter(p=>p?.estado==='OCUPADO')
  if(ocupados.length){
    showToast(`No se puede eliminar un potrero ocupado. Saca el lote primero.`,'err',5000)
    return
  }
  const nombres=pots.map(p=>p?.nombre||'').filter(Boolean).join(', ')
  if(!confirm(`¿Eliminar los siguientes potreros?\n\n${nombres}`)) return
  for(const id of ids){
    await db.ciclos.where('potreroId').equals(id).modify({activo:0})
    await fsUpdate('potreros',id,{activo:0})
  }
  _potSelMode=false; _potSelected.clear()
  const n=ids.length
  pushUndo(`${n} potrero${n>1?'s eliminados':' eliminado'}`, async()=>{
    for(const id of ids) await fsUpdate('potreros',id,{activo:1})
  })
  go('potreros')
}
async function eliminarPotrero(id){
  const p=await db.potreros.get(id)
  if(p?.estado==='OCUPADO'){showToast('No se puede eliminar un potrero ocupado. Saca el lote primero.','err',5000);return}
  if(!confirm(`¿Eliminar el potrero "${p?.nombre}"?`)) return
  await db.ciclos.where('potreroId').equals(id).modify({activo:0})
  await fsUpdate('potreros',id,{activo:0})
  pushUndo(`Potrero "${p?.nombre}" eliminado`, async()=>{
    await fsUpdate('potreros',id,{activo:1})
  })
  go('potreros')
}

async function saveRotacion() {
  const nombre = $('rn-n')?.value?.trim()
  if (!nombre) { const f=$('rn-n');if(f){f.style.border='2px solid #C62828';f.focus()} showToast('El nombre es requerido','err');return }
  const existe = await db.rotaciones.where('activo').equals(1).filter(r=>r.nombre.trim().toLowerCase()===nombre.toLowerCase()).first()
  if (existe) { showToast(`Ya existe la rotación "${existe.nombre}"`, 'err', 4000); return }
  const desc = $('rn-d')?.value?.trim()||''
  const btn = document.querySelector('[onclick="saveRotacion()"]')
  if(btn){btn.disabled=true;btn.textContent='Creando…'}
  let id
  try { id = await fsAdd('rotaciones',{nombre,descripcion:desc,potreroIds:[],activo:1,creadoEn:Date.now()}) }
  catch(e) { showToast('Error al crear rotación','err',4000);if(btn){btn.disabled=false;btn.textContent='Crear rotación'};return }
  pushUndo('Rotación "'+nombre+'" creada', async()=>{ await fsUpdate('rotaciones',id,{activo:0}) })
  go('rotacion-ficha',{id})
}

  $('hdrAct').innerHTML = '<div class="row" style="gap:6px">'

    + '<button class="btn btn-sm btn-r" onclick="eliminarRotacion('+id+')">🗑</button>'
    + '</div>'
  const pids = r.potreroIds || []
  const pots = await db.potreros.where('activo').equals(1).toArray()
  const potMap = Object.fromEntries(pots.map(p=>[p.id,p]))
  const lotes = await db.lotes.where('activo').equals(1).toArray()
  const lotesRot = lotes.filter(l=>l.rotacionId===id)

  let potreroItems = ''
  if (pids.length) {
    for (let i=0; i<pids.length; i++) {
      const p = potMap[pids[i]]
      if (!p) continue
      const estadoBadge = p.estado==='OCUPADO'
        ? '<span class="badge bg-orange" style="font-size:.7rem">Ocupado</span>'
        : p.estado==='EN_DESCANSO'
        ? '<span class="badge bg-blue" style="font-size:.7rem">Descanso</span>'
        : '<span class="badge bg-green" style="font-size:.7rem">Libre</span>'
      const btnUp = i>0 ? '<button onclick="moverPotreroRot('+id+','+i+',-1)" style="border:1.5px solid #ddd;background:white;border-radius:7px;padding:4px 9px;font-size:.85rem;cursor:pointer">↑</button>' : ''
      const btnDn = i<pids.length-1 ? '<button onclick="moverPotreroRot('+id+','+i+',1)" style="border:1.5px solid #ddd;background:white;border-radius:7px;padding:4px 9px;font-size:.85rem;cursor:pointer">↓</button>' : ''
      const btnRm = '<button onclick="quitarPotreroRot('+id+','+pids[i]+')" style="border:1.5px solid #FFCDD2;background:#FFEBEE;border-radius:7px;padding:4px 9px;font-size:.8rem;cursor:pointer;color:#C62828">✕</button>'
      potreroItems += '<div class="card mb8" style="padding:12px 14px">'
        + '<div class="row-b">'
        + '<div class="row" style="gap:10px;align-items:center;flex:1;min-width:0">'
        + '<div style="width:26px;height:26px;border-radius:50%;background:#E8F5E9;border:2px solid #4CAF50;display:flex;align-items:center;justify-content:center;flex-shrink:0">'
        + '<span style="font-size:.78rem;font-weight:900;color:#2E7D32">'+(i+1)+'</span></div>'
        + '<div style="min-width:0"><p class="bold sm">'+escH(p.nombre)+'</p>'
        + '<p class="xs gray">'+(p.areaHa?p.areaHa+' ha · ':'')+( p.pastos||'')+'</p></div>'
        + '</div>'
        + '<div class="row" style="gap:4px;flex-shrink:0">'+estadoBadge+btnUp+btnDn+btnRm+'</div>'
        + '</div></div>'
    }
  } else {
    potreroItems = '<div class="empty" style="padding:20px 0"><div class="eico">🌿</div><p>Sin potreros en esta rotación</p></div>'
  }

  let lotesSection = ''
  if (lotesRot.length) {
    for (const l of lotesRot) {
      const idx = l.rotacionIdx ?? 0
      const pid = pids[idx]
      const pot = pid ? potMap[pid] : null
      lotesSection += '<div class="card mb8" style="padding:12px 14px;cursor:pointer" onclick="go(\'lote-ficha\',{id:'+l.id+'})">'
        + '<div class="row-b"><div>'
        + '<p class="bold sm">'+escH(l.nombre)+'</p>'
        + '<p class="xs gray mt4">Posición '+(idx+1)+' de '+pids.length+' · '+(pot?'📍 '+escH(pot.nombre):'Sin potrero activo')+'</p>'
        + '</div><span class="badge bg-blue xs">→</span></div></div>'
    }
  } else {
    lotesSection = '<p class="xs gray" style="padding:8px 0">Ningún lote usa esta rotación aún.</p>'
  }

  _prodRotId = id
  const prodRot = await calcProdRotacion(id, _prodRotDesde, _prodRotHasta)
  const prodSection = renderProdRotacionHTML(prodRot, id, _prodRotDesde, _prodRotHasta)

  return (r.descripcion?'<div class="card mb12"><p class="sm gray">'+escH(r.descripcion)+'</p></div>':'')
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'

    + '</div>'
    + potreroItems
    + '<p class="sec mt16">🐄 Lotes en esta rotación</p>'
    + lotesSection
    + prodSection
}

async function saveEditarRotacion(id) {
  const nombre = $('er-n')?.value?.trim()
  if (!nombre) { const f=$('er-n');if(f){f.style.border='2px solid #C62828';f.focus()} showToast('El nombre es requerido','err');return }
  const existe = await db.rotaciones.where('activo').equals(1).filter(r=>r.id!==id&&r.nombre.trim().toLowerCase()===nombre.toLowerCase()).first()
  if (existe) { showToast(`Ya existe la rotación "${existe.nombre}"`, 'err', 4000); return }
  const btn=$('er-btn'); if(btn){btn.disabled=true;btn.textContent='Guardando…'}
  let prev
  try { prev=await db.rotaciones.get(id); await fsUpdate('rotaciones',id,{nombre,descripcion:$('er-d')?.value?.trim()||''}) }
  catch(e) { showToast('Error al guardar','err',4000);if(btn){btn.disabled=false;btn.textContent='Guardar'};return }
  if(prev) pushUndo('Edición revertida', async()=>fsUpdate('rotaciones',id,{nombre:prev.nombre,descripcion:prev.descripcion}))
  closeSheet(); go('rotacion-ficha',{id})
}

async function openAgregarPotreroRot(rotId) {
  // Recopilar todos los potreroIds usados en CUALQUIER rotación activa
  const todasRots = await db.rotaciones.where('activo').equals(1).toArray()
  const pidsOcupados = new Set(todasRots.flatMap(rot => rot.potreroIds || []))
  const pots = await db.potreros.where('activo').equals(1).toArray()
  const disponibles = pots.filter(p => !pidsOcupados.has(p.id))
  if (!disponibles.length) {
    showToast('Todos los potreros ya están asignados a una rotación', 'info', 4000)
    return
  }
  let items = ''
  for (const p of disponibles) {
    const col = p.estado==='OCUPADO'?'#2E7D32':p.estado==='EN_DESCANSO'?'#E65100':'#1565C0'
    const est = p.estado==='OCUPADO'?'Ocup.':p.estado==='EN_DESCANSO'?'Desc.':'Libre'
    items += '<div class="rot-pot-item" data-nombre="'+escH(p.nombre).toLowerCase()+'" onclick="agregarPotreroRot('+rotId+','+p.id+')" style="display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer">'
      + '<div><p class="bold sm">'+escH(p.nombre)+'</p>'+(p.areaHa?'<p class="xs gray">'+p.areaHa+' ha</p>':'')+'</div>'
      + '<span style="font-size:.72rem;color:'+col+';font-weight:700">● '+est+'</span></div>'
  }
  showSheet('<div class="sh-title">🌿 Agregar potrero<button class="sh-x" onclick="closeSheet()">✕</button></div>'
    + '<div style="position:relative;margin-bottom:10px">'
    + '<span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa">🔍</span>'

function filtrarRotPot(q) {
  const term = (q||'').toLowerCase().trim()
  let visible = 0
  document.querySelectorAll('.rot-pot-item').forEach(el => {
    const match = !term || el.dataset.nombre.includes(term)
    el.style.display = match ? '' : 'none'
    if (match) visible++
  })
  const empty = document.getElementById('rot-pot-empty')
  if (empty) empty.style.display = visible === 0 ? 'block' : 'none'
}
async function agregarPotreroRot(rotId, potId) {
  // Validar que el potrero no esté en NINGUNA rotación activa
  const todasRots = await db.rotaciones.where('activo').equals(1).toArray()
  for (const rot of todasRots) {
    if ((rot.potreroIds || []).includes(potId)) {
      const pot = await db.potreros.get(potId)
      const msg = rot.id === rotId
        ? 'Este potrero ya está en esta rotación'
        : `"${pot?.nombre}" ya pertenece a la rotación "${rot.nombre}"`
      showToast(msg, 'err', 4000)
      return
    }
  }
  const r = await db.rotaciones.get(rotId)
  await fsUpdate('rotaciones', rotId, {potreroIds: [...(r?.potreroIds||[]), potId]})
  closeSheet(); go('rotacion-ficha',{id:rotId})
}
async function moverPotreroRot(rotId, idx, dir) {
  const r = await db.rotaciones.get(rotId)
  const ids = [...(r?.potreroIds||[])]
  const ni = idx+dir
  if(ni<0||ni>=ids.length) return
  ;[ids[idx],ids[ni]]=[ids[ni],ids[idx]]
  await fsUpdate('rotaciones',rotId,{potreroIds:ids})
  go('rotacion-ficha',{id:rotId})
}
async function quitarPotreroRot(rotId, potId) {
  if(!confirm('¿Quitar este potrero de la rotación?')) return
  const r = await db.rotaciones.get(rotId)
  const prev = r?.potreroIds||[]
  const ids = prev.filter(id=>id!==potId)
  await fsUpdate('rotaciones',rotId,{potreroIds:ids})
  pushUndo('Potrero quitado', async()=>fsUpdate('rotaciones',rotId,{potreroIds:prev}))
  go('rotacion-ficha',{id:rotId})
}
async function eliminarRotacion(id) {
  const r = await db.rotaciones.get(id)
  const lotes = await db.lotes.where('activo').equals(1).filter(l=>l.rotacionId===id).toArray()
  const msg = '¿Eliminar la rotación "'+r?.nombre+'"?'+(lotes.length?'\n\n'+lotes.length+' lote(s) perderán su rotación asignada.':'')
  if(!confirm(msg)) return
  for(const l of lotes) await fsUpdate('lotes',l.id,{rotacionId:undefined,rotacionIdx:undefined})
  await fsUpdate('rotaciones',id,{activo:0})
  pushUndo('Rotación "'+r?.nombre+'" eliminada', async()=>{
    await fsUpdate('rotaciones',id,{activo:1})
    for(const l of lotes) await fsUpdate('lotes',l.id,{rotacionId:id,rotacionIdx:l.rotacionIdx||0})
  })
  go('potreros')
}

async function saveAvanzarRotacion(loteId, idxAct, idxSig, potIdAct, potIdSig) {
  const fecha = $('av-f')?.value ? fromD($('av-f').value) : Date.now()
  const btn=$('av-btn'); if(btn){btn.disabled=true;btn.textContent='Guardando…'}
  try {
    // Cerrar ciclo actual si existe
    const cicloAct = await db.ciclos.where({potreroId:potIdAct,loteId,activo:1}).first()
    if(cicloAct){
      await fsUpdate('ciclos',cicloAct.id,{activo:0,fechaSalida:fecha})
      await fsUpdate('potreros',potIdAct,{estado:'EN_DESCANSO',numAnimales:0,loteActual:undefined,fechaSalida:fecha})
    }
    // Abrir nuevo ciclo en siguiente potrero
    const l = await db.lotes.get(loteId)
    const anis = await db.animales.where({activo:1,loteId}).toArray()
    await fsAdd('ciclos',{potreroId:potIdSig,loteId,nombreLote:l?.nombre||'—',activo:1,fechaEntrada:fecha,numAnimales:anis.length})
    await fsUpdate('potreros',potIdSig,{estado:'OCUPADO',numAnimales:anis.length,loteActual:loteId,fechaEntrada:fecha,fechaSalida:undefined})
    await fsUpdate('lotes',loteId,{rotacionIdx:idxSig})
  } catch(e) {
    showToast('Error al avanzar','err',4000)
    if(btn){btn.disabled=false;btn.textContent='✓ Avanzar'}
    return
  }
  closeSheet()
  showToast('¡Rotación avanzada! Ahora en posición '+(idxSig+1),'ok')
  go('lote-ficha',{id:loteId})
}

// ─── Pastos helpers ───────────────────────────────
function _parsePastos(str) {
  // Devuelve {nombre: pct} desde "Colosuana 40%, Rastrojo 20%"
  const map = {}
  if (!str) return map
  str.split(',').forEach(p => {
    const m = p.trim().match(/^(.+?)\s+(\d+)%$/)
    if (m) map[m[1].trim()] = parseInt(m[2])
  })
  return map
}

function _mkPastosUI(pfx, savedStr) {
  const saved = _parsePastos(savedStr)
  const todas = [...VARIEDADES_PASTO, VARIEDAD_RASTROJO]
  const items = todas.map((v, i) => {
    const pct = saved[v] || ''
    const chk = !!saved[v]
    const isRastrojo = v === VARIEDAD_RASTROJO
    const sep = isRastrojo ? `<div style="border-top:1.5px dashed #d0d0d0;margin:8px 0 10px"></div>` : ''
    return `${sep}<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <input type="checkbox" id="${pfx}chk${i}" style="width:18px;height:18px;flex-shrink:0;accent-color:#388E3C"
        ${chk?'checked':''} onchange="_updPastos('${pfx}')">
      <label style="flex:1;font-size:.85rem;cursor:pointer;${isRastrojo?'color:#795548;font-weight:600':''}"
        for="${pfx}chk${i}">${v}</label>
      <div style="position:relative;width:72px">
        <input type="number" id="${pfx}pct${i}" class="inp"
          placeholder="0" min="0" max="100" value="${pct}"
          style="padding:8px 20px 8px 8px;font-size:.82rem;${!chk?'opacity:.4':''}"
          ${!chk?'disabled':''} oninput="_updPastos('${pfx}')">
        <span style="position:absolute;right:6px;top:50%;transform:translateY(-50%);color:#999;font-size:.7rem;pointer-events:none">%</span>
      </div>
    </div>`
  }).join('')
  const total = _calcTotalPastos(pfx, saved)
  return `<div style="background:#f7f9f7;border-radius:10px;padding:14px;border:1.5px solid #e0e0e0;margin-bottom:12px">
    <p style="font-size:.74rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">🌿 Composición del potrero</p>
    ${items}
    <div id="${pfx}total" style="margin-top:8px;padding-top:8px;border-top:1.5px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center">
      <span class="xs gray">Total</span>
      <span style="font-weight:700;font-size:.9rem;color:${total>100?'#C62828':total===100?'#2E7D32':'#888'}">${total}% ${total>100?'⚠ supera 100%':total===100?'✓':''}</span>
    </div>
  </div>`
}

function _calcTotalPastos(pfx, defaults) {
  const todas = [...VARIEDADES_PASTO, VARIEDAD_RASTROJO]
  let total = 0
  todas.forEach((_, i) => {
    const chk = document.getElementById(`${pfx}chk${i}`)
    const pct = document.getElementById(`${pfx}pct${i}`)
    if (chk && pct && chk.checked) total += parseInt(pct.value || 0) || 0
  })
  return total
}

function _updPastos(pfx) {
  const todas = [...VARIEDADES_PASTO, VARIEDAD_RASTROJO]
  todas.forEach((_, i) => {
    const chk = document.getElementById(`${pfx}chk${i}`)
    const pct = document.getElementById(`${pfx}pct${i}`)
    if (!chk || !pct) return
    pct.disabled = !chk.checked
    pct.style.opacity = chk.checked ? '1' : '.4'
    if (!chk.checked) pct.value = ''
  })
  const total = _calcTotalPastos(pfx)
  const el = document.getElementById(`${pfx}total`)
  if (el) {
    const span = el.querySelector('span:last-child')
    if (span) {
      span.textContent = `${total}% ${total > 100 ? '⚠ supera 100%' : total === 100 ? '✓' : ''}`
      span.style.color = total > 100 ? '#C62828' : total === 100 ? '#2E7D32' : '#888'
    }
  }
}

function _getPastosVal(pfx) {
  const todas = [...VARIEDADES_PASTO, VARIEDAD_RASTROJO]
  const parts = []
  todas.forEach((v, i) => {
    const chk = document.getElementById(`${pfx}chk${i}`)
    const pct = document.getElementById(`${pfx}pct${i}`)
    if (chk?.checked && pct) {
      const n = parseInt(pct.value || 0) || 0
      if (n > 0) parts.push(`${v} ${n}%`)
    }
  })
  return parts.join(', ')
}

        <div><p class="sm bold">🚦 Semáforo ocupación</p>
          <p class="xs gray">${fmtDias(diasOcup)} ocupado</p></div>
        ${renderSem(semOcup(diasOcup),'ocup')}

    : p.estado==='EN_DESCANSO'
    ? `<div class="card row-b mb8" style="background:#E3F2FD;border-left:4px solid #1565C0">
        <div><p class="sm bold">🚦 Semáforo descanso</p>
          <p class="xs gray">${fmtDias(diasDesc)} en descanso</p></div>
        ${renderSem(semDesc(diasDesc),'desc')}
      </div>` : ''

  const hdr=`<div class="card card-dark">
    <div class="row-b">
      <div>
        <p class="sub">${p.areaHa?.toFixed(1)||0} ha · ${p.pastos||'—'}</p>
        <p style="font-size:1.2rem;font-weight:700;margin-top:2px">${PENDIENTE[p.pendiente]||'—'}</p>
        ${cicloActivo?`<p class="sub xs">Lote: ${cicloActivo.nombreLote} · ${cicloActivo.numAnimales} animales</p>`:''}
      </div>
      <span class="badge bg-gray">${ESTADO_POT[p.estado]}</span>
    </div>
  </div>
  ${alertaHuerfano}
  ${semHtml}
  <div class="btn-row mb12">
    ${p.estado!=='OCUPADO'
      ? `<button class="btn btn-g btn-sm" onclick="openIngresarDesde(${id})">🐄 Ingresar lote</button>`
      : `<button class="btn btn-r btn-sm" onclick="confirmarSalidaPotrero(${id},${cicloActivo?.id})">🚪 Sacar lote</button>`}
  </div>`

  const tabs=`<div class="tabs" style="overflow:hidden">
    <div class="tab${tab==='datos'?' on':''}" onclick="setTab('pf','datos');go('potrero-ficha',{id:${id}})" style="font-size:.95rem;font-weight:700;${tab==='datos'?'':'color:#81C784'}">Datos</div>

    <div class="tab${tab==='labores'?' on':''}" onclick="setTab('pf','labores');go('potrero-ficha',{id:${id}})" style="font-size:.95rem;font-weight:700;${tab==='labores'?'':'color:#81C784'}">🛠 Labores</div>
  </div>`

  let body=''
  if(tab==='datos') body=`<div class="card">
    ${rowD('Nombre',p.nombre)} ${rowD('Área',`${p.areaHa?.toFixed(2)||0} ha`)}
    ${rowD('Pendiente',PENDIENTE[p.pendiente]||p.pendiente||'—')}
    ${rowD('Pastos',p.pastos||'—')} ${rowD('Fuente de agua',FUENTE_AGUA[p.fuenteAgua]||p.fuenteAgua||'—')}
    ${rowD('Estado',ESTADO_POT[p.estado])}
    ${cicloActivo?rowD('Lote actual',cicloActivo.nombreLote||'—'):''}
    ${cicloActivo&&cicloActivo.fechaEntrada?rowD('Fecha de ingreso','📅 '+ffd(cicloActivo.fechaEntrada)):''}
    ${cicloActivo?rowD('Días ocupado', fmtDias(diasOcup)):''}
    ${p.estado==='EN_DESCANSO'?rowD('Días en descanso', fmtDias(diasDesc)):''}
    ${(p.estado==='EN_DESCANSO'||p.estado==='DISPONIBLE')&&p.fechaSalida?rowD('Fecha de salida','📅 '+ffd(p.fechaSalida)):''}
    ${rowD('Observaciones',p.observaciones||'—',true)}
  </div>`
  else {
    const TIPOS_LP = {CERCA:'🔧 Cerca', GUADANA:'🌿 Guadaña', FUMIGACION:'🧴 Fumigación', TOCONEO:'🪓 Toconeo', SIEMBRA:'🌱 Siembra', RESIEMBRA:'🌾 Resiembra'}
    const TIPOS_COLOR = {CERCA:'bl-blue', GUADANA:'bl-green', FUMIGACION:'bl-yellow', TOCONEO:'bl-black', SIEMBRA:'bl-green', RESIEMBRA:'bl-green'}
    // Consulta defensiva: comparación con == para tolerar potreroId guardado como string o número
    const todosLps = await db.laboresPotrero.toArray()
    const lps = todosLps
      .filter(l => l.potreroId == id)   // == tolera "3" === 3
      .sort((a, b) => (b.fecha||0) - (a.fecha||0))
    const btnAdd = `<button class="btn btn-b btn-sm mb12" onclick="openNuevaLaborPotrero(${id})">+ Registrar labor</button>`

    // Si Dexie está vacío para este potrero, recuperar desde Firebase automáticamente
    if (!lps.length) {
      try {
        const snap = await fsdb.collection('laboresPotrero').where('potreroId','==',id).get()
        const snapStr = await fsdb.collection('laboresPotrero').where('potreroId','==',String(id)).get()
        const vistos = new Set()
        for (const doc of [...snap.docs, ...snapStr.docs]) {
          if (vistos.has(doc.id)) continue
          vistos.add(doc.id)
          const d = doc.data()
          const localId = parseInt(doc.id)
          if (isNaN(localId)) continue
          const {_id, _ts, ...clean} = d
          const exists = await db.laboresPotrero.get(localId)
          if (!exists) await db.laboresPotrero.put({...clean, potreroId: id, id: localId})
          lps.push({...clean, potreroId: id, id: localId})
        }
        lps.sort((a,b) => (b.fecha||0) - (a.fecha||0))
      } catch(e) { console.warn('Recuperación Firebase labores:', e.message) }
    }

    if (!lps.length) {
      body = btnAdd + '<div class="empty"><div class="eico">🛠</div><p>Sin labores registradas</p></div>'
    } else {
      // Filtro sin persistencia entre potreros — se lee del estado de navegación actual
      if (!window._lpFiltros) window._lpFiltros = {}
      // Resetear si venimos de otro potrero
      if (window._lpFiltrosPotrero !== id) {
        window._lpFiltros[id] = 'TODAS'
        window._lpFiltrosPotrero = id
      }
      let filtroActual = window._lpFiltros[id] || 'TODAS'
      const tiposPresentes = Object.keys(TIPOS_LP).filter(t => lps.some(l => l.tipo === t))
      // Si el tipo filtrado no existe en este potrero, resetear a TODAS
      if (filtroActual !== 'TODAS' && !tiposPresentes.includes(filtroActual)) {
        filtroActual = 'TODAS'
        window._lpFiltros[id] = 'TODAS'
      }
      const chips = ['TODAS', ...tiposPresentes].map(t => {
        const label = t === 'TODAS' ? '📋 Todas' : TIPOS_LP[t]
        const activo = filtroActual === t
        return `<button onclick="if(!window._lpFiltros)window._lpFiltros={};window._lpFiltros[${id}]='${t}';window._lpFiltrosPotrero=${id};go('potrero-ficha',{id:${id}})"
          style="flex-shrink:0;border:none;border-radius:20px;padding:6px 14px;font-size:.78rem;font-weight:700;cursor:pointer;
          background:${activo?'#1565C0':'#e8e8e8'};color:${activo?'white':'#555'};
          box-shadow:${activo?'0 2px 8px rgba(21,101,192,.35)':'none'}">${label}</button>`
      }).join('')
      const filtroBar = `<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch">${chips}</div>`

      // Filtrar — ya vienen ordenados cronológicamente (más reciente primero)
      const filtrados = filtroActual === 'TODAS' ? lps : lps.filter(l => l.tipo === filtroActual)

      const filas = filtrados.map(l => {
        const titulo = TIPOS_LP[l.tipo] || l.tipo
        const colorClass = TIPOS_COLOR[l.tipo] || 'bl-gray'
        return `
          <div class="card mb8 border-l4 ${colorClass}">
            <div class="row-b">
              <div>
                <p class="bold sm">${titulo}</p>
                <p class="xs gray">${ffd(l.fecha)}${l.fechaFin?' → '+ffd(l.fechaFin):''}</p>
              </div>
              <div class="right">
                <p class="xs"><span class="bold">${l.jornales||0}</span> jornal${(l.jornales||0)===1?'':'es'}</p>
                <div style="display:flex;gap:5px;margin-top:4px;justify-content:flex-end">
                  <button class="btn btn-sm" style="padding:4px 10px;font-size:.73rem;background:#E3F2FD;color:#1565C0;border:none;border-radius:9px" onclick="openEditarLaborPotrero(${l.id},${id})">✏️</button>
                  <button class="btn btn-sm btn-r" style="padding:4px 10px;font-size:.73rem" onclick="eliminarLaborPotrero(${l.id},${id})">🗑</button>
                </div>
              </div>
            </div>
            ${l.tipo==='FUMIGACION'&&l.productos?`<p class="xs gray mt8"><span class="bold">Productos:</span> ${l.productos}</p>`:''}
            ${l.observaciones?`<p class="xs gray mt4">${l.observaciones}</p>`:''}
          </div>`
      }).join('')

      const totalTxt = `<p class="xs gray mb8">${filtrados.length} registro${filtrados.length===1?'':'s'}${filtroActual!=='TODAS'?' · '+TIPOS_LP[filtroActual]:''}</p>`
      body = btnAdd + filtroBar + totalTxt + (filtrados.length
        ? filas
        : '<div class="empty"><div class="eico">🔍</div><p>Sin labores de este tipo</p></div>')
    }
  }
  return hdr+tabs+body
}

async function forzarDisponible(potreroId, cicloId) {
  if (!confirm('¿Marcar este potrero como Disponible?\n\nSe eliminará el ciclo activo (si existe). Úsalo solo si el estado es incorrecto.')) return
  try {
    if (cicloId) {
      await fsUpdate('ciclos', cicloId, {activo:0, fechaSalida:Date.now(), _huerfano:true})
    }
    await fsUpdate('potreros', potreroId, {estado:'DISPONIBLE', numAnimales:0, loteActual:undefined})
  } catch(e) { showToast('Error al corregir','err',4000); return }
  showToast('Potrero marcado como disponible')
  go('potrero-ficha', {id: potreroId})
}

async function saveNuevaLaborPotrero(potreroId) {
  const tipo = $('lp-tipo')?.value
  if (!tipo) {
    showToast('Selecciona el tipo de labor','err')
    return
  }
  const fechaIniStr = $('lp-fecha-ini')?.value
  if (!fechaIniStr) { showToast('Selecciona la fecha de inicio','err'); return }
  const fecha = new Date(fechaIniStr+'T00:00:00').getTime()
  const fechaFinStr = $('lp-fecha-fin')?.value
  const fechaFin = fechaFinStr ? new Date(fechaFinStr+'T00:00:00').getTime() : null
  const jornales = parseInt($('lp-jornales')?.value) || 0
  const productos = tipo === 'FUMIGACION' ? ($('lp-productos')?.value?.trim() || '') : ''
  const obs = $('lp-obs')?.value?.trim() || ''
  const btn = $('lp-btn')
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando…' }

  // Construir objeto sin campos vacíos (evita conflictos con Dexie/IndexedDB)
  const payload = { potreroId: parseInt(potreroId), tipo, fecha, jornales }
  if (fechaFin) payload.fechaFin = fechaFin
  if (productos) payload.productos = productos
  if (obs) payload.observaciones = obs

  let laborId
  try {
    laborId = await fsAdd('laboresPotrero', payload)
  } catch(e) {
    console.error('Error guardando labor:', e)
    showToast('Error al guardar: ' + e.message, 'err', 5000)
    if (btn) { btn.disabled = false; btn.textContent = '✓ Guardar' }
    return
  }
  closeSheet()
  pushUndo('Labor registrada', async () => {
    await db.laboresPotrero.delete(laborId)
    fsdb.collection('laboresPotrero').doc(String(laborId)).delete().catch(()=>{})
  })
  setTab('pf','labores')
  go('potrero-ficha', {id: potreroId})
}

async function recuperarLaboresFirebase(potreroId) {
  showToast('Buscando en Firebase…','info',3000)
  try {
    const snap1 = await fsdb.collection('laboresPotrero').get()
    let recuperados = 0
    for (const doc of snap1.docs) {
      const d = doc.data()
      const localId = parseInt(doc.id)
      if (isNaN(localId)) continue
      const {_id, _ts, ...clean} = d
      const pid = clean.potreroId
      if (pid != potreroId && String(pid) !== String(potreroId)) continue
      const exists = await db.laboresPotrero.get(localId)
      if (!exists) {
        await db.laboresPotrero.put({...clean, potreroId: parseInt(potreroId), id: localId})
        recuperados++
      }
    }
    if (recuperados > 0) {
      showToast(`${recuperados} labor${recuperados>1?'es':''} recuperada${recuperados>1?'s':''}  ✓`, 'ok')
    } else {
      showToast('No se encontraron registros en Firebase para este potrero','info', 5000)
    }
    setTab('pf','labores')
    go('potrero-ficha', {id: potreroId})
  } catch(e) {
    showToast('Error al consultar Firebase: ' + e.message, 'err', 5000)
  }
}

    await fsUpdate('potreros',potreroId,{estado:'DISPONIBLE',numAnimales:0,loteActual:undefined})

function filtrarPotMover(q) {
  const items = document.querySelectorAll('.sp-item')
  const busq = q.toLowerCase().trim()
  items.forEach(b => {
    b.style.display = (!busq || b.dataset.nom.includes(busq)) ? 'flex' : 'none'
  })
}

async function sacarYMover(potreroId, cicloId, nuevoPotId) {
  closeSheet()
  const ciclo = await db.ciclos.get(cicloId)
  const dias  = diasDesde(ciclo.fechaEntrada)
  const ahora = Date.now()
  try {
    // Cerrar ciclo actual
    await fsUpdate('ciclos', cicloId, {activo:0, fechaSalida:ahora, diasOcupacion:dias})
    // Potrero anterior → descanso
    await fsUpdate('potreros', potreroId, {estado:'EN_DESCANSO', numAnimales:0, loteActual:undefined, fechaSalida:ahora})
    // Abrir nuevo ciclo en potrero destino
    const nuevoCicloId = await fsAdd('ciclos', {
      potreroId:nuevoPotId, loteId:ciclo.loteId, nombreLote:ciclo.nombreLote,
      numAnimales:ciclo.numAnimales, fechaEntrada:ahora, activo:1, obs:''
    })
    // Potrero nuevo → ocupado
    await fsUpdate('potreros', nuevoPotId, {estado:'OCUPADO', numAnimales:ciclo.numAnimales, loteActual:ciclo.loteId})
    trazar('MOVER_POTRERO','CICLO', nuevoCicloId, {de:potreroId, a:nuevoPotId})
  } catch(e) { showToast('Error al mover','err',4000); return }
  pushUndo(`Lote movido — deshacer`, async () => {
    await fsUpdate('ciclos', cicloId, {activo:1, fechaSalida:undefined, diasOcupacion:undefined})
    await fsUpdate('potreros', potreroId, {estado:'OCUPADO', numAnimales:ciclo.numAnimales, loteActual:ciclo.loteId, fechaSalida:undefined})
    await fsUpdate('potreros', nuevoPotId, {estado:'DISPONIBLE', numAnimales:0, loteActual:undefined})
    const nc = await db.ciclos.where({potreroId:nuevoPotId, activo:1}).first()
    if (nc) await fsUpdate('ciclos', nc.id, {activo:0})
  })
  go('potrero-ficha', {id:nuevoPotId})
}

async function pgVentas() {
  const vendidos = (await db.animales.where('activo').equals(0).toArray()).filter(a => a.causaBaja === 'Venta')
  if (!vendidos.length) return `<div class="empty"><div class="eico">💰</div>
    <p>Sin ventas registradas</p>
    <p class="xs gray mt8">Cuando des de baja un animal por "Venta" aparecerá aquí.</p></div>`

  // Ordenar por fecha de baja desc
  vendidos.sort((a,b)=>(b.fechaBaja||0)-(a.fechaBaja||0))

  // KPIs globales
  let totalValor=0, totalCosto=0, totalGanPeso=0, nConPrecio=0, nConCosto=0
  for (const a of vendidos) {
    if (a.valorVenta)   { totalValor += a.valorVenta;   nConPrecio++ }
    if (a.precioPorKg && a.pesoInicial) {
      totalCosto += a.precioPorKg * a.pesoInicial; nConCosto++
    }
    if (a.pesoVenta && a.pesoInicial) totalGanPeso += (a.pesoVenta - a.pesoInicial)
  }
  const utilidad = totalValor - totalCosto
  const rentPct  = totalCosto > 0 ? (utilidad/totalCosto*100) : null

  const fmt = v => '$'+Math.round(v).toLocaleString('es-CO')
  const colU = utilidad >= 0 ? '#2E7D32' : '#C62828'
  const colR = rentPct === null ? '#888' : rentPct >= 0 ? '#2E7D32' : '#C62828'

  const kpis = `<div class="card card-dark mb12">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div style="text-align:center">
        <p style="font-size:1.2rem;font-weight:800">${vendidos.length}</p>
        <p class="sub xs">Animales vendidos</p>
      </div>
      <div style="text-align:center">
        <p style="font-size:1.2rem;font-weight:800">${totalGanPeso>=0?'+':''}${totalGanPeso.toFixed(0)} kg</p>
        <p class="sub xs">Ganancia de peso</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
      <div><p style="font-weight:700;font-size:.95rem">${nConPrecio?fmt(totalValor):'—'}</p><p class="sub xs">Total ventas</p></div>
      <div><p style="font-weight:700;font-size:.95rem">${nConCosto?fmt(totalCosto):'—'}</p><p class="sub xs">Costo total</p></div>
      <div><p style="font-weight:800;font-size:.95rem;color:${colU}">${nConPrecio&&nConCosto?(utilidad>=0?'+':'')+fmt(utilidad):'—'}</p><p class="sub xs">Utilidad</p></div>
    </div>
    ${rentPct!==null?`<div style="text-align:center;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.15)">
      <p style="font-size:1.1rem;font-weight:800;color:${colR}">${rentPct>=0?'+':''}${rentPct.toFixed(1)}% rentabilidad</p>
    </div>`:''}
  </div>`

  // Agrupar por mes
  const grupos = {}
  for (const a of vendidos) {
    const d = a.fechaBaja ? new Date(a.fechaBaja) : null
    const key = d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` : 'Sin fecha'
    const label = d ? d.toLocaleDateString('es-CO',{month:'long',year:'numeric'}) : 'Sin fecha'
    if (!grupos[key]) grupos[key] = {label, items:[]}
    grupos[key].items.push(a)
  }

  let cards = ''
  for (const key of Object.keys(grupos).sort().reverse()) {
    const g = grupos[key]
    let gValor=0, gCosto=0, gN=g.items.length
    const rows = g.items.map(a => {
      const pesoE = a.pesoInicial||0
      const pesoS = a.pesoVenta||pesoE
      const ganPeso = pesoS - pesoE
      const valV = a.valorVenta||0
      const valC = (a.precioPorKg||0)*(a.pesoInicial||0)
      const util = valV && valC ? valV - valC : null
      if (valV) gValor += valV
      if (valC) gCosto += valC
      const colGan = ganPeso >= 0 ? '#2E7D32' : '#C62828'
      const colUtil = !util ? '#888' : util>=0 ? '#2E7D32' : '#C62828'
      return `<div style="padding:11px 0;border-bottom:1px solid #f4f4f4">
        <div class="row-b" style="margin-bottom:5px">
          <div>
            <span class="bold sm">${a.arete}${a.nombre?' — '+a.nombre:''}</span>
            <span class="badge bg-gray xs" style="margin-left:6px">${CAT[a.categoria]||a.categoria||'—'}</span>
          </div>
          <span class="xs gray">${a.fechaBaja?new Date(a.fechaBaja).toLocaleDateString('es-CO',{day:'2-digit',month:'short'}):''}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center">
          <div style="background:#f8f8f8;border-radius:6px;padding:5px 2px">
            <p style="font-size:.75rem;font-weight:700">${pesoE} kg</p><p style="font-size:.6rem;color:#aaa">Entrada</p>
          </div>
          <div style="background:#f8f8f8;border-radius:6px;padding:5px 2px">
            <p style="font-size:.75rem;font-weight:700">${pesoS} kg</p><p style="font-size:.6rem;color:#aaa">Salida</p>
          </div>
          <div style="background:#f8f8f8;border-radius:6px;padding:5px 2px">
            <p style="font-size:.75rem;font-weight:700;color:${colGan}">${ganPeso>=0?'+':''}${ganPeso} kg</p><p style="font-size:.6rem;color:#aaa">Δ Peso</p>
          </div>
          <div style="background:#f8f8f8;border-radius:6px;padding:5px 2px">
            <p style="font-size:.75rem;font-weight:700;color:${colUtil}">${util!==null?(util>=0?'+':'')+fmt(util):'—'}</p><p style="font-size:.6rem;color:#aaa">Utilidad</p>
          </div>
        </div>
        ${a.precioVentaKg?`<p class="xs gray mt6">Precio venta: <strong>$${a.precioVentaKg.toLocaleString('es-CO')}/kg</strong>${a.precioPorKg?' · Compra: <strong>$'+a.precioPorKg.toLocaleString('es-CO')+'/kg</strong>':''}${a.comprador?' · '+a.comprador:''}</p>`:''}
      </div>`
    }).join('')
    const gUtil = gValor && gCosto ? gValor-gCosto : null
    cards += `<p class="sec" style="text-transform:capitalize">${g.label}</p>
    <div class="card mb8">
      <div class="row-b mb10">
        <span class="xs gray">${gN} animal${gN>1?'es':''}</span>
        <div style="text-align:right">
          ${gValor?`<p class="xs bold" style="color:#1565C0">${fmt(gValor)} venta</p>`:''}
          ${gUtil!==null?`<p class="xs bold" style="color:${gUtil>=0?'#2E7D32':'#C62828'}">${gUtil>=0?'+':''}${fmt(gUtil)} utilidad</p>`:''}
        </div>
      </div>
      ${rows}
    </div>`
  }

  return kpis + cards
}

async function guardarEditarUsuario(id,puedeEditarRol,esYo) {
  const n=$('eu-n').value.trim()
  if(!n){
    const f=$('eu-n');if(f){f.style.border='2px solid #C62828';f.focus()}
    showToast('El nombre es requerido','err');return
  }
  const updates={nombre:n,modificadoPor:USER?.nombre||'—',modificadoEn:Date.now()}
  if(puedeEditarRol&&$('eu-r')) updates.rol=$('eu-r').value
  if(esYo){
    const pin=$('eu-p')?.value||''
    if(pin){
      if(pin.length<4){
        const f=$('eu-p');if(f){f.style.border='2px solid #C62828';f.focus()}
        showToast('El PIN debe tener al menos 4 dígitos','err');return
      }
      updates.pinHash=await hPin(pin)
    }
  }
  const btn=document.querySelector('#ov .btn-b')
  if(btn){btn.disabled=true;btn.textContent='Guardando…'}
  try{
    await fsUpdate('usuarios',id,updates)
  }catch(e){
    showToast('Error al guardar usuario','err',4000)
    if(btn){btn.disabled=false;btn.textContent='Guardar cambios'}
    return
  }
  if(id===USER?.id){USER.nombre=n;if(updates.rol)USER.rol=updates.rol}
  closeSheet(); go('config')
}

  await fsUpdate('usuarios',id,{pinHash:null,pinReseteadoPor:USER?.nombre||'—',pinReseteadoEn:Date.now()})
  closeSheet(); go('config')
}

async function loadXLSX(){
  if(typeof XLSX!=='undefined') return true
  return new Promise((res,rej)=>{
    const s=document.createElement('script')
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'
    s.onload=()=>res(true)
    s.onerror=()=>rej(new Error('No se pudo cargar la librería Excel. Verifica tu conexión.'))
    document.head.appendChild(s)
  })
}
