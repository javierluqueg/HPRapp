async function compartirArchivo(tipo) {
  try {
    showToast('Preparando archivo...', 'ok', 2000)
    let blob, filename
    if (tipo === 'json') {
      await setCfg('ultimo_backup', String(Date.now()))
      fsdb.collection('config').doc('ultimo_backup').set({clave:'ultimo_backup', valor:String(Date.now()), _ts:Date.now()}).catch(()=>{})
      const [animales,pesajes,labores,potreros,lotes,ciclos,lluvias,usuarios,config,laboresPotrero,rotaciones] = await Promise.all([
        db.animales.toArray(),db.pesajes.toArray(),db.labores.toArray(),db.potreros.toArray(),
        db.lotes.toArray(),db.ciclos.toArray(),db.lluvias.toArray(),db.usuarios.toArray(),db.config.toArray(),db.laboresPotrero.toArray(),db.rotaciones.toArray()
      ])
      const data = JSON.stringify({v:3,app:'HPRapp',ts:Date.now(),animales,pesajes,labores,potreros,lotes,ciclos,lluvias,usuarios,config,laboresPotrero,rotaciones},null,2)
      blob = new Blob([data], {type:'application/json'})
      filename = `HPRapp-backup-${new Date().toISOString().split('T')[0]}.json`
    } else if (tipo === 'excel') {
      // Reusar exportarExcel pero retornar blob en vez de descargar
      blob = await generarExcelBlob()
      filename = `HPRapp-datos-${new Date().toISOString().split('T')[0]}.xlsx`
    } else if (tipo === 'pdf') {
      blob = await generarPdfBlob()
      filename = `HPRapp-reporte-${new Date().toISOString().split('T')[0]}.pdf`
    }
    if (!blob) return
    // Intentar Web Share API (abre menú compartir en celular)
    if (navigator.canShare && navigator.canShare({files:[new File([blob], filename)]})) {
      try {
        await navigator.share({files:[new File([blob], filename)], title:'HPRapp', text:'Copia de seguridad HPRapp'})
        return
      } catch(e) { if (e.name !== 'AbortError') console.warn('Share failed:', e.message) }
    }
    // Fallback: descarga directa (PC o celular sin Web Share)
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = filename
    a.click()
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000)
    showToast('Archivo descargado ✅')
  } catch(e) { showToast('Error: ' + e.message, 'err', 4000) }
}

async function compartirWhatsApp() {
  try {
    const finca   = await getCfg('nombre_finca') || 'HPRapp'
    const animales = await db.animales.where('activo').equals(1).toArray()
    const lotes    = await db.lotes.where('activo').equals(1).toArray()
    const potreros = await db.potreros.where('activo').equals(1).toArray()
    const lluvias  = await db.lluvias.orderBy('fecha').toArray()
    const ahora    = new Date()
    const fd = (ts) => { const d=new Date(ts); return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear() }

    // Peso total
    let pesoTotal = 0
    for (const a of animales) {
      const ult = await getPesoActual(a.id)
      pesoTotal += (ult?.pesoKg || a.pesoInicial || 0)
    }

    // Lluvias último mes
    const hace30 = Date.now() - 30*86400000
    const lluvMes = lluvias.filter(l=>l.fecha>=hace30)
    const mmMes   = lluvMes.reduce((s,l)=>s+l.mm,0)

    const txt = [
      `🌿 *${finca}* — Resumen HPRapp`,
      `📅 ${fd(Date.now())}`,
      ``,
      `🐄 *Animales activos:* ${animales.length}`,
      `⚖️ *Peso total:* ${Math.round(pesoTotal).toLocaleString('es-CO')} kg`,
      `📂 *Lotes:* ${lotes.length}`,
      `🌿 *Potreros:* ${potreros.length}`,
      lluvMes.length ? `🌧 *Lluvia últimos 30 días:* ${mmMes.toFixed(0)} mm (${lluvMes.length} días)` : '',
      ``,
      `_Generado desde HPRapp_`
    ].filter(l=>l!==null).join('\n')

    const url = 'https://wa.me/?text=' + encodeURIComponent(txt)
    window.open(url, '_blank')
  } catch(e) { showToast('Error: ' + e.message, 'err', 4000) }
}

  }
  addSheet('ANIMALES', animales.filter(a=>a.activo).map(a=>({

  })))
  addSheet('PESAJES', pesajes.map(p=>({

    'Peso (kg)':p.pesoKg,'Fecha':fd(p.fecha),'Método':p.metodo||'','Obs':p.obs||''
  })))
  addSheet('POTREROS', potreros.filter(p=>p.activo).map(p=>({

  if(lluvias.length) addSheet('LLUVIAS', lluvias.map(l=>({'Fecha':fd(l.fecha),'mm':l.mm,'Obs':l.obs||''})))

    if(!d.app||d.app!=='HPRapp'||!d.animales){await showAlert('❌ Archivo no válido. Usa un backup generado desde HPRapp.');input.value='';return}

    // Restaurar Dexie
    await db.transaction('rw',[db.animales,db.pesajes,db.labores,db.potreros,db.lotes,db.ciclos,db.lluvias,db.usuarios,db.config,db.laboresPotrero,db.rotaciones],async()=>{

      await db.pesajes.clear();         await db.pesajes.bulkAdd(d.pesajes||[])

      await db.lotes.clear();           await db.lotes.bulkAdd(d.lotes||[])
      await db.ciclos.clear();          await db.ciclos.bulkAdd(d.ciclos||[])
      await db.lluvias.clear();         await db.lluvias.bulkAdd(d.lluvias||[])
      await db.usuarios.clear();        await db.usuarios.bulkAdd(d.usuarios||[])
      await db.config.clear();          await db.config.bulkAdd(d.config||[])
      await db.laboresPotrero.clear();  await db.laboresPotrero.bulkAdd(d.laboresPotrero||[])
      await db.rotaciones.clear();      await db.rotaciones.bulkAdd(d.rotaciones||[])
    })

    // ── Sincronizar todo a Firebase ──
    // Marcar data_version nueva para que otros dispositivos detecten los datos restaurados
    const _dv = String(Date.now())
    localStorage.setItem('hpr_data_version', _dv)
    localStorage.setItem('hpr_reset_applied', String(_resetTs||0))

      for(const row of rows){
        const {id,...data}=row
        try{
          await fsdb.collection(t).doc(String(id)).set({...data,_ts:data._ts||Date.now()})
        }catch(e){}
      }

    await showAlert(`✅ Restauración completa\n\n🐄 ${d.animales?.length||0} animales\n🌿 ${d.potreros?.length||0} potreros\n📂 ${d.lotes?.length||0} lotes\n⚖️ ${d.pesajes?.length||0} pesajes`)
    location.reload()
  }catch(e){await showAlert('Error al restaurar: '+e.message)}

}

async function bootstrapFromFirebase(){
  try {
    const dataTables=['animales','pesajes','labores','potreros','lotes','ciclos','laboresPotrero','rotaciones','lluvias']

    // ── 1. Config: solo lee Firestore si config local está vacía ──
    const cfgLocal = await db.config.count()
    if(cfgLocal === 0){
      // Dexie vacío — primera vez o después de limpiar Safari — carga desde Firestore
      const cfgSnap = await fsdb.collection('config').get()
      for(const doc of cfgSnap.docs){
        const d = doc.data()
        if(d.clave) await setCfg(d.clave, d.valor)
        if(d.clave==='reset_ts'&&d.valor){
          const ts=parseInt(d.valor)||0
          if(ts>_resetTs){_resetTs=ts;localStorage.setItem('hpr_reset_ts',String(ts))}
        }
      }
    } else {
      // Dexie tiene config — leer reset_ts local sin tocar Firestore
      const cfgTs = await getCfg('reset_ts')
      const ts = parseInt(cfgTs||'0')||0
      if(ts>_resetTs){_resetTs=ts;localStorage.setItem('hpr_reset_ts',String(ts))}
    }

    // ── 2. Aplicar reset y/o data_version si corresponde ──
    const localApplied = parseInt(localStorage.getItem('hpr_reset_applied')||'0')||0
    const serverDV = await getCfg('data_version') || ''
    const localDV  = localStorage.getItem('hpr_data_version') || ''
    const needsClear = (_resetTs>0 && _resetTs!==localApplied) || (serverDV && serverDV!==localDV)
    if(needsClear){
      for(const t of dataTables){try{await db[t].clear()}catch(e){}}
      if(_resetTs>0) localStorage.setItem('hpr_reset_applied',String(_resetTs))
      if(serverDV)   localStorage.setItem('hpr_data_version',serverDV)
    }

    // ── 3. Solo cargar desde Firestore si Dexie está vacío ──
    // Si Dexie tiene datos, el onSnapshot (que se activa después) maneja las diferencias
    const animalesCount = await db.animales.count()
    const usuariosCount = await db.usuarios.count()

    if(animalesCount === 0 || usuariosCount === 0){
      // Dexie vacío o reset aplicado — carga inicial desde Firestore
      const tables=['animales','pesajes','labores','potreros','lotes','ciclos','usuarios','laboresPotrero','rotaciones','lluvias']
      for(const t of tables){
        const snap = await fsdb.collection(t).get()
        if(snap.empty) continue
        for(const doc of snap.docs){
          const d=doc.data()
          const localId=parseInt(doc.id)
          if(isNaN(localId)) continue
          if(t!=='usuarios' && _resetTs && (d._ts||0)<_resetTs) continue
          const {_id,_ts,...clean}=d
          try{
            const exists=await db[t].get(localId)
            if(!exists||(d._ts||0)>(exists._ts||0))
              await db[t].put({...clean,id:localId,_ts:d._ts||0})
          }catch(e){}
        }
      }
    }
    // Si Dexie YA tiene datos: no se hace ninguna lectura a Firestore aquí.
    // El onSnapshot sincroniza cambios incrementales — mucho más eficiente.

  }catch(e){ console.warn('Bootstrap offline:',e.message) }
}

async function checkAppVersion() {
  // No interrumpir si el usuario está en login o sin sesión iniciada
  if (!USER || ['login','setup'].includes(PAGE)) return
  try {
    // Usa la API de GitHub para obtener el último commit — no le afecta el caché del CDN
    const r = await fetch('https://api.github.com/repos/javierluqueg/HPRapp/commits/main', {
      cache: 'no-store',
      headers: {'Accept': 'application/vnd.github.v3+json'}
    })
    if (!r.ok) return
    const data = await r.json()
    const latestSha = (data.sha || '').substring(0, 10)
    if (!latestSha) return
    const storedSha = localStorage.getItem('hpr_commit_sha')
    if (!storedSha) {
      // Primera vez — guardar SHA sin recargar
      localStorage.setItem('hpr_commit_sha', latestSha)
      return
    }
    if (storedSha !== latestSha) {
      // Hay versión nueva — mostrar banner para que el usuario actualice
      localStorage.setItem('hpr_commit_sha', latestSha)
      const b = document.getElementById('update-banner')
      if (b) b.style.display = 'block'
    }
  } catch(e) { /* offline o rate limit — no hacer nada */ }
}

function doAppUpdate() {
  // Limpiar SHA guardado para que la próxima carga también verifique
  localStorage.removeItem('hpr_commit_sha')
  // Recargar con parámetro único — el SW no lo intercepta
  window.location.href = location.pathname + '?update=' + Date.now()
}

let _resetSnapshot = null  // Guarda copia para deshacer
let _resetTs = parseInt(localStorage.getItem('hpr_reset_ts') || '0')  // Persiste entre recargas

async function ejecutarResetear() {
  try {
    const tables = ['animales','pesajes','labores','potreros','lotes','ciclos','laboresPotrero','rotaciones','lluvias']

    // 1. Snapshot para deshacer
    _resetSnapshot = {}
    for (const t of tables) _resetSnapshot[t] = await db[t].toArray()

    // 2. Detener listeners
    _syncActive = false
    _unsubscribers.forEach(u => u())
    _unsubscribers = []

    // 3. Limpiar Dexie local
    for (const t of tables) await db[t].clear()

    // 4. Mostrar pantalla de progreso
    _seg['reset_step'] = 'borrando'
    go('config')

    // 5. Borrar Firestore con progreso real
    // Primero contar total de documentos
    _seg['reset_progress'] = {paso:0, total:0, label:'Contando documentos…'}
    go('config')
    let totalDocs = 0
    const snapsPrevios = {}
    for (const t of tables) {
      try {
        const snap = await fsdb.collection(t).get()
        snapsPrevios[t] = snap
        totalDocs += snap.size
      } catch(e) { snapsPrevios[t] = null }
    }
    let borrados = 0
    _seg['reset_progress'] = {paso:0, total:totalDocs, label:'Borrando documentos…'}
    go('config')
    const borrarTabla = async (t) => {
      const snap = snapsPrevios[t]
      if (!snap || snap.empty) return
      for (let i = 0; i < snap.docs.length; i += 400) {
        const batch = fsdb.batch()
        snap.docs.slice(i, i + 400).forEach(doc => batch.delete(doc.ref))
        await batch.commit()
        borrados += Math.min(400, snap.docs.length - i)
        _seg['reset_progress'] = {paso:borrados, total:totalDocs, label:`Borrando ${t}…`}
        go('config')
      }
    }
    // Borrar secuencialmente para que el progreso sea preciso
    for (const t of tables) await borrarTabla(t)

    // 6. Guardar reset_ts en Firestore y Dexie para que otros dispositivos lo detecten
    _resetTs = Date.now()
    const _dataVersion = String(_resetTs)
    localStorage.setItem('hpr_reset_ts', _dataVersion)
    localStorage.setItem('hpr_reset_applied', _dataVersion)
    localStorage.setItem('hpr_data_version', _dataVersion)
    try {
      await fsdb.collection('config').doc('reset_ts').set({clave:'reset_ts', valor:_dataVersion, _ts:_resetTs})
      await fsdb.collection('config').doc('data_version').set({clave:'data_version', valor:_dataVersion, _ts:_resetTs})
      await setCfg('reset_ts', _dataVersion)
      await setCfg('data_version', _dataVersion)
    } catch(e) {}

    // 7. Reactivar sync — Firestore ya está limpio
    _syncActive = true
    initFirebaseSync()

    // 8. Mostrar éxito
    _seg['reset_step'] = 'hecho'
    go('config')
    showToast('✅ Firestore y datos locales borrados completamente', 'ok', 5000)

  } catch(e) {
    _syncActive = true
    initFirebaseSync()
    showToast('Error al resetear: ' + e.message, 'err', 5000)
  }
}
async function deshacerResetear() {
  if (!_resetSnapshot) { showToast('No hay datos para restaurar','err'); return }
  try {
    const tables = Object.keys(_resetSnapshot)
    for (const t of tables) {
      for (const row of _resetSnapshot[t]) {
        const {id, ...data} = row
        try {
          await db[t].put({...data, id})
          await fsdb.collection(t).doc(String(id)).set({...data, _id:id, _ts:Date.now()})
        } catch(e) {}
      }
    }
    _resetSnapshot = null
    _seg['reset_step'] = 'inicio'
    showToast('Datos restaurados correctamente ✅', 'ok', 4000)
    go('config')
  } catch(e) {
    showToast('Error al deshacer: ' + e.message, 'err', 5000)
  }
}

async function init(){
  // Mostrar pantalla de carga mientras se conecta a Firebase
  $('pg').innerHTML = `
    <div style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0d1b2a;padding:32px">
      ${logoHPR(72)}
      <p style="color:rgba(255,255,255,.6);font-size:.82rem;letter-spacing:.12em;text-transform:uppercase;margin:12px 0 32px">Gestión Ganadera</p>
      <div id="boot-msg" style="color:rgba(255,255,255,.7);font-size:.88rem;margin-bottom:16px">Conectando…</div>
      <div style="width:48px;height:4px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden">
        <div id="boot-bar" style="height:100%;width:0%;background:#FF8C00;border-radius:4px;transition:width .4s"></div>
      </div>
      <button id="boot-retry" onclick="location.reload()" style="display:none;margin-top:24px;padding:10px 28px;background:#FF8C00;color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer">🔄 Reintentar</button>
    </div>`

  const setMsg = (msg, pct) => {
    const el = document.getElementById('boot-msg')
    const bar = document.getElementById('boot-bar')
    if (el) el.textContent = msg
    if (bar) bar.style.width = pct + '%'
  }

  try {
    setMsg('Verificando datos locales…', 20)
    try {
      await Promise.race([
        bootstrapFromFirebase(),
        new Promise((_,rej) => setTimeout(() => rej(new Error('timeout')), 20000))
      ])
    } catch(e) {
      console.warn('Bootstrap:', e.message)
      // Si hay timeout pero Dexie tiene datos, continuar igual
    }

    setMsg('Cargando configuración…', 60)
    await migrarNombresLote()
    let ok = await getCfg('setup_ok')
    if (!ok) {
      setMsg('Restaurando configuración…', 75)
      try {
        const cfgSnap = await fsdb.collection('config').get()
        for (const doc of cfgSnap.docs) {
          const d = doc.data()
          if (d.clave && d.valor !== undefined) await setCfg(d.clave, d.valor)
        }
        ok = await getCfg('setup_ok')
      } catch(e) { console.warn('setup_ok fallback:', e.message) }
    }

    setMsg('Iniciando…', 95)
    if (USER && ok) {
      _syncActive = true
      initFirebaseSync()
      await go('dashboard')
    } else {
      await go(ok ? 'login' : 'setup')
    }
    setTimeout(checkAppVersion, 3000)
    // Limpiar ciclos con más de 1 año de antigüedad (inactivos únicamente)
    limpiarCiclosAntiguos()
  } catch(e) {
    const msg = document.getElementById('boot-msg')
    const retry = document.getElementById('boot-retry')
    if (msg) msg.textContent = 'Error al conectar: ' + e.message
    if (retry) retry.style.display = 'block'
  }
}
init()

function updateOfflineBanner() {
  const b = document.getElementById('offline-banner')
  if (!b) return
  if (navigator.onLine) {
    b.style.display = 'none'
    document.getElementById('hdr').style.marginTop = ''
    document.getElementById('pg').style.paddingTop = ''
  } else {
    b.style.display = 'block'
    document.getElementById('hdr').style.marginTop = '34px'
  }
}

// ── Pull to refresh ───────────────────────────────────────
;(()=>{
  let _ptStart = 0, _ptActive = false, _ptCancelled = false
  const PG = document.getElementById('pg')
  const IND = document.createElement('div')
  IND.id = 'ptr-ind'
  IND.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-60px);background:white;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.18);transition:transform .2s;z-index:500;font-size:1.2rem;pointer-events:none'
  IND.textContent = '↓'
  document.body.appendChild(IND)

  function resetPtr() {
    _ptActive = false; _ptCancelled = false
    IND.style.transform = 'translateX(-50%) translateY(-60px)'
    IND.textContent = '↓'
  }

  PG.addEventListener('touchstart', e => {
    _ptCancelled = false
    if (PG.scrollTop === 0) { _ptStart = e.touches[0].clientY; _ptActive = true }
    else { _ptActive = false }
  }, {passive:true})

  PG.addEventListener('touchmove', e => {
    if (!_ptActive) return
    if (PG.scrollTop > 5) { _ptCancelled = true; resetPtr(); return }
    const dist = e.touches[0].clientY - _ptStart
    if (dist < 0) { _ptCancelled = true; resetPtr(); return }
    const capped = Math.min(dist, 90)
    if (capped > 10) {
      IND.style.transform = `translateX(-50%) translateY(${Math.min(capped-10,50)}px)`
      IND.textContent = capped > 60 ? '↻' : '↓'
    }
  }, {passive:true})

  PG.addEventListener('touchend', e => {
    if (!_ptActive || _ptCancelled) { resetPtr(); return }
    const dist = e.changedTouches[0].clientY - _ptStart
    resetPtr()
    if (dist > 80 && USER && !['login','setup','bienvenida'].includes(PAGE) && !_ganSelMode && !_loteSelMode && !_potSelMode && !_rvSelMode) {
      showToast('Actualizando…','ok',1500)
      setTimeout(() => goRefrescar(PAGE, PARAMS), 300)
    }
  }, {passive:true})

  PG.addEventListener('touchcancel', resetPtr, {passive:true})
})()
