<script>
const APP_VERSION = '20260703-004'

// ── Service Worker ────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  // Escuchar activación del SW nuevo → recargar para servir versión fresca
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'SW_ACTIVATED') {
      const b = document.getElementById('update-banner')
      if (b) b.style.display = 'block'
      else location.reload()
    }
  })
  // Registrar con ?v= para que GitHub Pages no cachee el sw.js
  navigator.serviceWorker.register('./sw.js?v=' + APP_VERSION)
    .then(reg => {
      // Si hay SW esperando (versión nueva), activarlo inmediatamente
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' })
      reg.addEventListener('updatefound', () => {
        const sw = reg.installing
        if (!sw) return
        sw.addEventListener('statechange', () => {
          if (sw.state === 'installed' && navigator.serviceWorker.controller) {
            sw.postMessage({ type: 'SKIP_WAITING' })
          }
        })
      })
    })
    .catch(() => {})
}

const _manifest={name:'HPRapp',short_name:'HPRapp',start_url:'.',display:'standalone',background_color:'#1a1a2e',theme_color:'#1a1a2e',icons:[{src:'https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f334.png',sizes:'72x72',type:'image/png'},{src:'https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f334.png',sizes:'192x192',type:'image/png'}]}
const _mb=new Blob([JSON.stringify(_manifest)],{type:'application/json'})
document.getElementById('pwaManifest').href=URL.createObjectURL(_mb)
</script>

<script>
'use strict'

// ═══════════════════════════════════════════════════
// BASE DE DATOS
// ═══════════════════════════════════════════════════
const db = new Dexie('HPRappDB')
db.version(1).stores({
  animales: '++id, arete, activo, loteId, categoria',
  pesajes:  '++id, animalId, fecha',
  labores:  '++id, animalId, fecha, tipo',
  potreros: '++id, activo, estado',
  lotes:    '++id, activo',
  ciclos:   '++id, potreroId, loteId, activo',
  lluvias:  '++id, fecha',
  usuarios: '++id, activo',
  config:   'clave',
})
db.version(2).stores({
  laboresPotrero: '++id, potreroId, tipo, fecha',
})
db.version(3).stores({
  rotaciones: '++id, activo',
})


// ═══════════════════════════════════════════════════
// FIREBASE — SINCRONIZACIÓN EN TIEMPO REAL
// ═══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyA7HFazgKZTP-XR_Hy1nm2lYeRoSAl_RBo",
  authDomain: "hprapp-6c6f8.firebaseapp.com",
  projectId: "hprapp-6c6f8",
  storageBucket: "hprapp-6c6f8.firebasestorage.app",
  messagingSenderId: "445992219171",
  appId: "1:445992219171:web:b0ef1bdb9100fa4f887796"
}
firebase.initializeApp(firebaseConfig)
const fsdb = firebase.firestore()

// Offline persistence
if(location.protocol!=='file:'){
  fsdb.enablePersistence({synchronizeTabs:true}).catch(e=>console.warn('Persistence:',e.code))
}

let _syncActive = false
let _refreshTimer = null

// ─── Trazabilidad ─────────────────────────────────
async function trazar(accion, entidad, entidadId, datos={}) {
  try {
    await fsdb.collection('trazabilidad').add({
      accion, entidad, entidadId: String(entidadId),
      datos,
      usuario: USER?.nombre || '—',
      usuarioId: USER?.id ? String(USER?.id) : null,
      rol: USER?.rol || '—',
      fecha: Date.now(),
      fechaISO: new Date().toISOString()
    })
  } catch(e) { console.warn('Trazabilidad:', e.message) }
}

// ─── Sync status indicator ─────────────────────────
let _syncTimer = null
function showSyncStatus(status) {
  let el = document.getElementById('syncDot')
  if (!el) {
    el = document.createElement('div')
    el.id = 'syncDot'
    el.style.cssText = 'position:fixed;top:10px;right:10px;z-index:999;width:9px;height:9px;border-radius:50%;pointer-events:none;transition:background .4s'
    document.body.appendChild(el)
  }
  // Solo mostrar badge de texto cuando hay problema real (offline o error)
  // Para ok/sync solo cambiar el color del puntito sin texto ni parpadeo
  if (status === 'ok') {
    el.style.width='9px'; el.style.height='9px'; el.style.padding=''
    el.style.background='#4CAF50'; el.style.color=''; el.style.borderRadius='50%'
    el.innerHTML = ''
    if (_syncTimer) clearTimeout(_syncTimer)
    _syncTimer = setTimeout(()=>{ el.style.opacity='0' }, 4000)
    el.style.opacity='1'
  }
  if (status === 'sync') {
    if (_syncTimer) clearTimeout(_syncTimer)
    el.style.opacity='1'
    el.style.width='9px'; el.style.height='9px'; el.style.padding=''
    el.style.background='#FFC107'; el.style.color=''; el.style.borderRadius='50%'
    el.innerHTML = ''
  }
  if (status === 'off') {
    if (_syncTimer) clearTimeout(_syncTimer)
    el.style.opacity='1'
    el.style.width='auto'; el.style.height='auto'
    el.style.background='rgba(198,40,40,.15)'
    el.style.padding='5px 10px'; el.style.borderRadius='20px'
    el.style.color='#C62828'; el.style.fontSize='.75rem'; el.style.fontWeight='700'
    el.innerHTML = '📡 Sin conexión'
  }
  if (status === 'err') {
    if (_syncTimer) clearTimeout(_syncTimer)
    el.style.opacity='1'
    el.style.width='auto'; el.style.height='auto'
    el.style.background='rgba(198,40,40,.15)'
    el.style.padding='5px 10px'; el.style.borderRadius='20px'
    el.style.color='#C62828'; el.style.fontSize='.75rem'; el.style.fontWeight='700'
    el.innerHTML = '⚠ Error sync'
    _syncTimer = setTimeout(()=>{ el.style.opacity='0' }, 6000)
  }
}

// ─── Wrapper: Add to Dexie + Firebase ─────────────
async function fsAdd(table, obj) {
  const ts = Date.now()
  const id = await db[table].add({...obj, _ts: ts})
  _suppressRefreshUntil = Date.now() + 4000  // Suprimir refresh por 4s
  // Sanitizar: Firestore no acepta undefined — omitir campos con ese valor
  const clean = Object.fromEntries(
    Object.entries({...obj, _id: id, _ts: ts}).filter(([, v]) => v !== undefined)
  )
  fsdb.collection(table).doc(String(id)).set(clean)
    .then(()=>showSyncStatus('ok'))
    .catch(e=>{ showSyncStatus('off'); console.warn('fsAdd offline:', e.message) })
  return id
}

// ─── Wrapper: Update Dexie + Firebase ─────────────
async function fsUpdate(table, id, obj) {
  const ts = Date.now()
  await db[table].update(id, {...obj, _ts: ts})
  _suppressRefreshUntil = Date.now() + 4000  // Suprimir refresh por 4s
  const fbObj = {_id: id, _ts: ts}
  for (const [k, v] of Object.entries(obj)) {
    // Firebase no acepta undefined — convertir a FieldValue.delete() para eliminar el campo
    fbObj[k] = (v === undefined) ? firebase.firestore.FieldValue.delete() : v
  }
  fsdb.collection(table).doc(String(id)).set(fbObj, {merge: true})
    .then(()=>showSyncStatus('ok'))
    .catch(e=>{ showSyncStatus('off'); console.warn('fsUpdate offline:', e.message) })
}

// ─── Real-time listeners ──────────────────────────
const SYNC_TABLES = ['animales','pesajes','labores','potreros','lotes','ciclos','usuarios','laboresPotrero','rotaciones','lluvias']
let _unsubscribers = []
let _suppressRefreshUntil = 0  // Evitar re-render por writes propios

function scheduleRefresh() {
  if (_refreshTimer) clearTimeout(_refreshTimer)
  _refreshTimer = setTimeout(() => {
    // No refrescar si: sheet abierta, modo selección, o write propio reciente
    const sheetAbierto = $('ov')?.classList.contains('show')
    if (sheetAbierto || _ganSelMode || _loteSelMode || _potSelMode || _rvSelMode) return
    if (Date.now() < _suppressRefreshUntil) return  // Cambio propio, ignorar
    goRefrescar(PAGE, PARAMS)
  }, 2000)  // 2s de delay para agrupar múltiples cambios de otros dispositivos
}

function initFirebaseSync() {
  // Disconnect previous listeners
  _unsubscribers.forEach(u => u())
  _unsubscribers = []

  SYNC_TABLES.forEach(table => {
    const unsub = fsdb.collection(table)
      .onSnapshot(async snap => {
        if (!_syncActive) return
        let changed = false
        for (const change of snap.docChanges()) {
          const localId = parseInt(change.doc.id)
          if (isNaN(localId)) continue
          if (change.type === 'removed') {
            try {
              const exists = await db[table].get(localId)
              if (exists) { await db[table].delete(localId); changed = true }
            } catch(e) {}
            continue
          }
          const data = change.doc.data()
          if (table !== 'usuarios' && _resetTs && (data._ts || 0) < _resetTs) continue
          try {
            const local = await db[table].get(localId)
            const {_id, _ts, ...clean} = data
            if (!local) {
              await db[table].put({...clean, id: localId, _ts: data._ts||0})
              changed = true
            } else if ((data._ts||0) > (local._ts||0)) {
              await db[table].update(localId, {...clean, _ts: data._ts||0})
              changed = true
            }
          } catch(e) {}
        }
        if (changed) { scheduleRefresh(); showSyncStatus('ok') }
      }, err => { showSyncStatus('err'); console.warn('Sync error:', err.message) })
    _unsubscribers.push(unsub)
  })

  const unsubCfg = fsdb.collection('config').onSnapshot(async snap => {
    if (!_syncActive) return
    for (const change of snap.docChanges()) {
      if (change.type === 'removed') continue
      const data = change.doc.data()
      if (data.clave) await setCfg(data.clave, data.valor)
      if (data.clave === 'reset_ts' && data.valor) {
        const serverTs = parseInt(data.valor) || 0
        const localApplied = parseInt(localStorage.getItem('hpr_reset_applied') || '0') || 0
        if (serverTs > 0 && serverTs !== localApplied) {
          _resetTs = serverTs
          localStorage.setItem('hpr_reset_ts', String(_resetTs))
          localStorage.setItem('hpr_reset_applied', String(serverTs))
          const _rt = ['animales','pesajes','labores','potreros','lotes','ciclos','laboresPotrero','rotaciones','lluvias']
          await Promise.all(_rt.map(t => db[t].clear().catch(()=>{})))
          showToast('🔄 Sincronizando datos nuevos...', 'ok', 3000)
          setTimeout(() => initFirebaseSync(), 500)
        }
      }
      if (data.clave === 'data_version' && data.valor) {
        const serverDV = data.valor
        const localDV = localStorage.getItem('hpr_data_version') || ''
        if (serverDV && serverDV !== localDV) {
          localStorage.setItem('hpr_data_version', serverDV)
          const _rt = ['animales','pesajes','labores','potreros','lotes','ciclos','laboresPotrero','rotaciones','lluvias']
          await Promise.all(_rt.map(t => db[t].clear().catch(()=>{})))
          showToast('🔄 Cargando datos actualizados...', 'ok', 3000)
          setTimeout(() => initFirebaseSync(), 500)
        }
      }
    }
  })
  _unsubscribers.push(unsubCfg)
  _syncActive = true
  showSyncStatus('ok')
}

// ─── Push all local data to Firebase (first sync) ─
async function pushAllToFirebase(showAlert=false) {
  const tables=['animales','pesajes','labores','potreros','lotes','ciclos','usuarios','laboresPotrero','rotaciones','lluvias']
  showSyncStatus('sync')
  let total=0,errors=0
  for(const t of tables){
    const rows = await db[t].toArray()
    for (const row of rows) {
      const {id, ...data} = row
      try {
        await fsdb.collection(t).doc(String(id)).set({...data, _id:id, _ts:Date.now()}, {merge:true})
      } catch(e) {}
    }
  }
  const cfgs = await db.config.toArray()
  for (const c of cfgs) {
    try { await fsdb.collection('config').doc(c.clave).set({...c, _ts:Date.now()}, {merge:true}) } catch(e) {}
  }
  showSyncStatus('ok')
}

  const ps = await db.pesajes.where('animalId').equals(animalId).sortBy('fecha')
  if (ps.length<2) return null
  const last=ps[ps.length-1], prev=ps[ps.length-2]

}

// Semáforos
// ── Umbrales semáforo (días) — ajustar según necesidad de la finca ──
// Ocupación: 1-3 verde · 4-7 azul · 8-15 amarillo · +15 rojo
const SEM_OCUP = { azul: 3, amarillo: 7, rojo: 15 }
// Descanso:  20-30 verde · 31-40 azul · 41-50 amarillo · +50 rojo
const SEM_DESC = { verde_min: 20, azul: 30, amarillo: 40, rojo: 50 }

function semOcup(dias) {
  if (dias <= SEM_OCUP.azul)     return {cls:'on-verde',   label:'Verde',   dias, prioridad:0}
  if (dias <= SEM_OCUP.amarillo) return {cls:'on-azul',    label:'Azul',    dias, prioridad:1}
  if (dias <= SEM_OCUP.rojo)     return {cls:'on-amarillo',label:'Amarillo',dias, prioridad:2}
  return                                {cls:'on-rojo',    label:'Rojo',    dias, prioridad:3}
}
function semDesc(dias) {
  if (dias < SEM_DESC.verde_min) return {cls:'on-negro',   label:'Pronto',  dias, prioridad:-1}
  if (dias <= SEM_DESC.azul)     return {cls:'on-verde',   label:'Verde',   dias, prioridad:0}
  if (dias <= SEM_DESC.amarillo) return {cls:'on-azul',    label:'Azul',    dias, prioridad:1}
  if (dias <= SEM_DESC.rojo)     return {cls:'on-amarillo',label:'Amarillo',dias, prioridad:2}
  return                                {cls:'on-rojo',    label:'Rojo',    dias, prioridad:3}
}
function renderSem(sem, tipo) {
  const colores = {'on-verde':'#4CAF50','on-azul':'#1565C0','on-amarillo':'#FFC107','on-rojo':'#F44336'}
  const color = colores[sem.cls] || '#ddd'
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0">
    <div style="width:16px;height:16px;border-radius:50%;background:${color};box-shadow:0 0 7px ${color}"></div>
    <span style="font-size:.65rem;color:#888;font-weight:700">${sem.dias===0?'<1d':sem.dias+'d'}</span>
  </div>`
}

function blPotrero(p, diasOcup, diasDesc) {
  const clsTobl = cls => cls==='on-verde'?'bl-green':cls==='on-azul'?'bl-azul':cls==='on-amarillo'?'bl-yellow':'bl-red'
  if (p.estado==='OCUPADO'||p.estado==='EN_MANEJO') return clsTobl(semOcup(diasOcup).cls)
  if (p.estado==='EN_DESCANSO') return clsTobl(semDesc(diasDesc).cls)
  return 'bl-green'
}
function semPrioridad(p, diasOcup, diasDesc) {
  if (p.estado==='OCUPADO'||p.estado==='EN_MANEJO') return semOcup(diasOcup).prioridad
  if (p.estado==='EN_DESCANSO') return semDesc(diasDesc).prioridad
  return -1  // Disponibles al final
}

    const _goTimeout = new Promise((_,rej) => setTimeout(()=>rej(new Error('Timeout en página: '+page)), 15000))
    const _pageResult = await Promise.race([
      Promise.resolve(map[page]?.(params)).then(r => r ?? '<p>Página no encontrada: '+page+'</p>'),
      _goTimeout
    ])
    $('pg').innerHTML = _pageResult || `<div style="padding:30px;text-align:center;background:white;border-radius:12px;margin:20px"><p style="color:#888;margin-bottom:12px">Página vacía: ${page}</p><button onclick="go('dashboard')" class="btn btn-g">Ir al inicio</button></div>`
  }
  catch(e) { console.error('go() error:', page, e); $('pg').innerHTML=`<div style="padding:30px;text-align:center;background:white;border-radius:12px;margin:20px"><div style="font-size:2rem;margin-bottom:10px">❌</div><p style="font-weight:700;color:#C62828;margin-bottom:8px">Error: ${page}</p><p style="font-size:.85rem;color:#555;margin-bottom:16px">${e.message}</p><button onclick="go('dashboard')" class="btn btn-g">🏠 Ir al inicio</button></div>` }
  window.scrollTo(0,0)
}

  const p = (page==='ganado') ? {...params, _ganPage:(_ganPage||1)} : params

// ═══════════════════════════════════════════════════
// PIN HANDLER
// ═══════════════════════════════════════════════════
async function pinKey(k, ctx) {
  if(k==='⌫') _pinBuf=_pinBuf.slice(0,-1)
  else if(_pinBuf.length<4&&k!=='') _pinBuf+=k
  for(let i=0;i<4;i++){const d=$(`pd${i}`);if(d)d.classList.toggle('f',i<_pinBuf.length)}
  if(_pinBuf.length===4){
    if(ctx==='setup')  await finSetup(_pinBuf)
    else if(ctx==='crear1') await pinCrear1(_pinBuf)
    else if(ctx==='crear2') await pinCrear2(_pinBuf)
    else await doLogin(_pinBuf)
    _pinBuf=''
  }
}
async function pinCrear1(pin) {
  _pinFirst=pin; _pinStep='crear2'; _pinBuf=''; go('login')
}
async function pinCrear2(pin) {
  if(pin!==_pinFirst){
    _pinFirst=''; _pinStep='crear1'; _pinBuf=''
    await go('login')
    if($('pinErr')) $('pinErr').textContent='Los PINs no coinciden, intenta de nuevo'
    return
  }
  const ph=await hPin(pin)
  await fsUpdate('usuarios',_loginUser.id,{pinHash:ph,pinCreadoEn:Date.now()})
  _loginUser.pinHash=ph
  USER=_loginUser; _loginUser=null; _pinStep='login'; _pinFirst=''
  try{sessionStorage.setItem('hpr_user',JSON.stringify(USER))}catch(e){}
  _syncActive=true; initFirebaseSync()
  go('dashboard')
}
async function finSetup(pin) {
  const d=_setupData
  await setCfgSync('nombre_finca',d.nombre); await setCfgSync('municipio',d.municipio)
  await setCfgSync('area_total',d.areaTotal||'0'); await setCfgSync('area_util',d.areaUtil||'0')
  await setCfgSync('meta_gdp','500'); await setCfgSync('setup_ok','true')
  const ph=await hPin(pin)
  await fsAdd('usuarios',{nombre:d.usuario,rol:d.rol,pinHash:ph,activo:1,creadoEn:Date.now()})
  _loginUser=null; go('login')
}
async function doLogin(pin) {
  const ph=await hPin(pin)
  if(ph===_loginUser.pinHash){
    USER=_loginUser; _loginUser=null; _syncActive=true
    try{sessionStorage.setItem('hpr_user',JSON.stringify(USER))}catch(e){}
    initFirebaseSync()
    // Mostrar bienvenida solo la primera vez por usuario en este dispositivo
    const key = 'bienvenida_' + USER?.id
    const visto = localStorage.getItem(key)
    if (!visto) {
      go('bienvenida')
    } else {
      go('dashboard')
    }
  }
  else {
    _pinBuf=''
    if($('pinErr')) $('pinErr').textContent='PIN incorrecto'
    for(let i=0;i<4;i++){const d=$(`pd${i}`);if(d)d.classList.remove('f')}
    setTimeout(()=>{if($('pinErr'))$('pinErr').textContent=''},2000)
  }
}

      <button onclick="go('config')" style="border:none;background:#E65100;color:white;border-radius:8px;padding:7px 12px;font-size:.78rem;font-weight:700;cursor:pointer">Ir a Config</button>
    </div>` : ''
  const area=parseFloat(areaUtil)||1
  const [animales, potreros, lotes, todosLosPesajes] = await Promise.all([
    db.animales.where('activo').equals(1).toArray(),
    db.potreros.where('activo').equals(1).toArray(),
    db.lotes.where('activo').equals(1).toArray(),
    db.pesajes.orderBy('fecha').toArray()  // una sola query para todos los pesajes
  ])

  // Indexar pesajes por animalId en memoria (evita N queries individuales)
  const pesajesPorAnimal = {}
  for (const p of todosLosPesajes) {
    if (!pesajesPorAnimal[p.animalId]) pesajesPorAnimal[p.animalId] = []
    pesajesPorAnimal[p.animalId].push(p)  // ya vienen ordenados por fecha
  }

  // Pesos, GDP y última actualización de pesaje — todo en memoria
  let pesoTotal=0, gdpSum=0, gdpN=0, ultimoPesajeTs=0
  for(const a of animales){
    const ps = pesajesPorAnimal[a.id] || []
    const ult = ps.length ? ps[ps.length-1] : null
    pesoTotal += (ult?.pesoKg || a.pesoInicial || 0)
    if(ult && ult.fecha > ultimoPesajeTs) ultimoPesajeTs = ult.fecha
    if(ps.length >= 2){
      const last=ps[ps.length-1], prev=ps[ps.length-2]
      const d=Math.round((last.fecha-prev.fecha)/86400000)
      if(d>0){gdpSum+=Math.round((last.pesoKg-prev.pesoKg)/d*1000);gdpN++}
    }
  }
  const gdpProm=gdpN>0?Math.round(gdpSum/gdpN):null
  const metaN=parseInt(metaGdp)||500

  // Potreros
  const ocupados=potreros.filter(p=>p.estado==='OCUPADO').length
  const disponibles=potreros.filter(p=>p.estado==='DISPONIBLE').length
  const descanso=potreros.filter(p=>p.estado==='EN_DESCANSO').length

  // Resumen por categoría
  const catOrdenDash = ['HC','MC','HL','ML','NV','VH','VP','T','MCB']
  const catCount={}
  animales.forEach(a=>catCount[a.categoria]=(catCount[a.categoria]||0)+1)
  const catColors = {HC:'#E8F5E9,#2E7D32',MC:'#E8F5E9,#1B5E20',HL:'#E3F2FD,#1565C0',ML:'#E3F2FD,#0D47A1',NV:'#F3E5F5,#6A1B9A',VH:'#FFF3E0,#E65100',VP:'#FCE4EC,#C62828',T:'#FFFDE7,#F9A825',MCB:'#ECEFF1,#546E7A'}
  const catResumen = catOrdenDash.map(k => {
    const [bg,fg] = (catColors[k]||'#F5F5F5,#555').split(',')
    const n = catCount[k] || 0
    const opacity = n === 0 ? 'opacity:.35;' : ''
    return `<div style="${opacity}display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 4px;border-radius:10px;background:${bg};border-bottom:3px solid ${fg}"><span style="font-size:1.25rem;font-weight:900;color:${fg};line-height:1">${n}</span><span style="font-size:.64rem;font-weight:700;color:${fg};text-align:center;line-height:1.1">${k}</span></div>`
  }).join('')
  const catExtra = Object.keys(catCount).filter(k=>!catOrdenDash.includes(k)).map(k =>
    `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 4px;border-radius:10px;background:#F5F5F5;border-bottom:3px solid #999"><span style="font-size:1.25rem;font-weight:900;color:#555;line-height:1">${catCount[k]}</span><span style="font-size:.64rem;font-weight:700;color:#555;text-align:center;line-height:1.1">${k}</span></div>`
  ).join('')

  // Período para rendimiento
  const dPeriodos=[{v:30,l:'30d'},{v:90,l:'90d'},{v:180,l:'6m'},{v:365,l:'1a'},{v:0,l:'Todo'},{v:-1,l:'📅 Fechas'}]
  const dPSel=parseInt(_seg['dp']??'90')
  const esCustom=dPSel===-1
  const hoyStr=new Date().toISOString().split('T')[0]
  const dDesde=esCustom?(_seg['dp_desde']||''):''
  const dHasta=esCustom?(_seg['dp_hasta']||hoyStr):''
  const dDesdeTs=esCustom
    ?(dDesde?new Date(dDesde+'T00:00:00').getTime():0)
    :(dPSel>0?Date.now()-dPSel*86400000:0)
  const dHastaTs=(esCustom&&dHasta)
    ?new Date(dHasta+'T23:59:59').getTime()
    :Date.now()

  // Ganancia en período — todo en memoria, sin queries adicionales
  let gananciaFinca=0
  const gLoteMap={}
  for(const a of animales){
    const ps = pesajesPorAnimal[a.id] || []
    const todosHasta=ps.filter(p=>p.fecha<=dHastaTs)
    const ult=todosHasta.length?todosHasta[todosHasta.length-1]:null
    if(!ult) continue
    let base
    if(dDesdeTs>0){
      const enPer=todosHasta.filter(p=>p.fecha>=dDesdeTs)
      if(enPer.length) base=enPer[0].pesoKg
      else {
        const antes=todosHasta.filter(p=>p.fecha<dDesdeTs)
        base=antes.length?antes[antes.length-1].pesoKg:(a.pesoInicial||ult.pesoKg)
      }
    } else {
      base=a.pesoInicial!==undefined?a.pesoInicial:ult.pesoKg
    }
    const gan=ult.pesoKg-base
    if(gan>0){
      gananciaFinca+=gan
      if(a.loteId) gLoteMap[a.loteId]=(gLoteMap[a.loteId]||0)+gan
    }
  }

  // Lotes con peso — en memoria
  const loteMap2={}; lotes.forEach(l=>loteMap2[l.id]=l)
  let lotesHtml='', gLoteHtml=''
  for(const l of lotes.slice(0,6)){
    const aLote=animales.filter(a=>a.loteId===l.id)
    let pLote=0
    for(const a of aLote){
      const ps=pesajesPorAnimal[a.id]||[]
      pLote+=(ps.length?ps[ps.length-1].pesoKg:(a.pesoInicial||0))
    }
    lotesHtml+=`<div class="row-b" style="padding:6px 0;border-bottom:1px solid #f0f0f0">
      <span class="sm">${l.nombre}</span>
      <span class="sm bold">${aLote.length} anim · <span class="green">${Math.round(pLote).toLocaleString('es-CO')} kg</span></span>
    </div>`
  }
  for(const [lid,gan] of Object.entries(gLoteMap)){
    const l=loteMap2[parseInt(lid)]
    gLoteHtml+=`<div class="row-b" style="padding:3px 0"><span class="xs">${l?.nombre||'—'}</span><span class="xs bold green">+${Math.round(gan).toLocaleString('es-CO')} kg</span></div>`
  }

  const kgHaPeriodo=gananciaFinca>0?(gananciaFinca/area).toFixed(1):'0'
  const gdpColor=gdpProm===null?'gray':gdpProm>=metaN?'green':'orange'
  const dSegBtns=dPeriodos.map(p=>`<button class="${p.v===dPSel?'on':''}" onclick="_seg['dp']=${p.v};go('dashboard')">${p.l}</button>`).join('')

  return `
    <div style="
        position:relative;
        border-radius:16px;
        overflow:hidden;
        margin-bottom:12px;
        min-height:160px;
        background:#1a3a1a url('fondo.jpg') center/cover no-repeat;
      ">
      <!-- overlay gradiente para legibilidad -->
      <div style="
          position:absolute;inset:0;
          background:linear-gradient(160deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.25) 60%,rgba(0,0,0,.45) 100%);
          border-radius:16px;
        "></div>
      <!-- contenido -->
      <div style="position:relative;z-index:1;padding:18px 16px 16px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <p style="font-size:.8rem;color:rgba(255,255,255,.7);text-transform:capitalize;margin-bottom:4px">${new Date().toLocaleDateString('es-CO',{weekday:'long',day:'numeric',month:'long'})}</p>
            <p style="font-size:1.35rem;font-weight:800;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.4)">${nombre||'Mi Finca'}</p>
            ${USER?`<p style="font-size:.78rem;color:rgba(255,255,255,.6);margin-top:4px">👤 ${USER?.nombre} · ${USER?.rol}</p>`:''}
          </div>
          <button onclick="logOut()" style="background:rgba(0,0,0,.3);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.8);border-radius:8px;padding:7px 11px;font-size:.78rem;flex-shrink:0">Salir</button>
        </div>
        <!-- KPIs sobre la imagen -->
        <div style="display:flex;gap:10px;margin-top:18px">
          <div style="flex:1;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 10px;text-align:center">
            <p style="font-size:1.25rem;font-weight:800;color:#fff">${animales.length}</p>
            <p style="font-size:.65rem;color:rgba(255,255,255,.75);margin-top:1px">Animales</p>
          </div>
          <div style="flex:1;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 10px;text-align:center">
            <p style="font-size:1.25rem;font-weight:800;color:${gdpProm===null?'rgba(255,255,255,.5)':gdpProm>=metaN?'#A5D6A7':'#FFCC80'}">${gdpProm!==null?gdpProm+'g':'—'}</p>
            <p style="font-size:.65rem;color:rgba(255,255,255,.75);margin-top:1px">GDP prom/día</p>
          </div>
          <div style="flex:1;background:rgba(255,255,255,.15);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:8px 10px;text-align:center">
            <p style="font-size:1.25rem;font-weight:800;color:#90CAF9">${(pesoTotal/area).toFixed(0)}</p>
            <p style="font-size:.65rem;color:rgba(255,255,255,.75);margin-top:1px">kg/ha útil</p>
          </div>
        </div>
      </div>
    </div>


    <div class="card mb8">
      <div class="row-b mb4">
        <p class="bold" style="font-size:.8rem;text-transform:uppercase;letter-spacing:.04em">⚖️ Kilogramos totales</p>
        <p class="bold green" style="font-size:1.3rem">${pesoTotal.toLocaleString('es-CO',{maximumFractionDigits:0})} kg</p>
      </div>
      
      <div class="row-b"><span class="xs gray">Área utilizable</span><span class="xs">${area.toFixed(1)} ha</span></div>
      <div class="row-b"><span class="xs gray">Carga kg/ha</span><span class="xs bold blue">${(pesoTotal/area).toFixed(1)} kg/ha</span></div>
    </div>

    <div class="card mb8">
      <p class="bold sm mb8">📈 Rendimiento por período</p>
      <div class="seg" style="margin-bottom:10px">${dSegBtns}</div>
      ${esCustom?`
      <div style="display:flex;gap:8px;align-items:flex-end;margin-bottom:12px">
        <div style="flex:1">
          <label style="font-size:.7rem;color:#888;display:block;margin-bottom:3px">Desde</label>
          <input type="date" class="inp" style="padding:7px 10px;font-size:.82rem" value="${dDesde}" onchange="_seg['dp_desde']=this.value;go('dashboard')">
        </div>
        <div style="flex:1">
          <label style="font-size:.7rem;color:#888;display:block;margin-bottom:3px">Hasta</label>
          <input type="date" class="inp" style="padding:7px 10px;font-size:.82rem" value="${dHasta}" onchange="_seg['dp_hasta']=this.value;go('dashboard')">
        </div>
      </div>`:''}
      <div class="row-b mb4"><span class="sm gray">Ganancia total finca</span><span class="sm bold ${gananciaFinca>0?'green':'gray'}">${gananciaFinca>0?'+':''}${Math.round(gananciaFinca).toLocaleString('es-CO')} kg</span></div>
      ${gananciaFinca>0?`<div class="row-b mb4"><span class="sm gray">Rendimiento período</span><span class="sm bold blue">${kgHaPeriodo} kg/ha</span></div>`:''}
      ${gLoteHtml?`<p class="xs gray" style="margin-top:6px;margin-bottom:4px">Por lote:</p>${gLoteHtml}`:''}
      ${!gananciaFinca?`<p class="xs gray">Sin pesajes en el período · Ingrese pesajes para ver kg/ha</p>`:''}
    </div>

    <div class="g3 mb8">
      <div class="card kpi"><div class="v" style="color:#FF7043">${ocupados}</div><div class="l">Potreros<br>ocupados</div></div>
      <div class="card kpi"><div class="v green">${disponibles}</div><div class="l">Potreros<br>disponibles</div></div>
      <div class="card kpi"><div class="v blue">${descanso}</div><div class="l">En<br>descanso</div></div>
    </div>

    ${(catResumen||catExtra)?`<div class="card mb8">
      <div class="row-b" style="margin-bottom:8px">
        <p class="sec" style="margin:0">🐄 Animales por categoría</p>
        <p class="xs gray">${animales.length} totales</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px">${catResumen}${catExtra}</div>
    </div>`:''}

    <div class="card mb8">
      <div class="row-b" style="margin-bottom:10px">
        <p class="sec" style="margin:0;cursor:pointer;color:#1565C0;display:flex;align-items:center;gap:6px" onclick="go('lluvias')">🌧 Lluvias — últimos 30 días <span style="font-size:.85rem;background:#E3F2FD;color:#1565C0;border-radius:6px;padding:2px 8px;font-weight:700">Ver →</span></p>
        <button onclick="openRegistrarLluvia()" style="border:none;background:#1565C0;color:white;border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:700;cursor:pointer">+ Registrar</button>
      </div>
      <div class="g3 mb10">
        <div style="text-align:center;padding:8px 0">
          <p style="font-size:1.4rem;font-weight:800;color:#1565C0">${totalMm30.toFixed(0)}</p>
          <p style="font-size:.72rem;color:#888;margin-top:2px">mm acumulados</p>
        </div>
        <div style="text-align:center;padding:8px 0">
          <p style="font-size:1.4rem;font-weight:800;color:#0277BD">${lluv30.length}</p>
          <p style="font-size:.72rem;color:#888;margin-top:2px">días con lluvia</p>
        </div>
        <div style="text-align:center;padding:8px 0">
          <p style="font-size:1.4rem;font-weight:800;color:#01579B">${diasDesdeUltima===null?'—':diasDesdeUltima===0?'Hoy':diasDesdeUltima+'d'}</p>
          <p style="font-size:.72rem;color:#888;margin-top:2px">última lluvia</p>
        </div>
      </div>
      ${lluv30.length ? `
        <div style="overflow-x:auto;padding-bottom:4px">
          <div style="display:flex;align-items:flex-end;gap:3px;height:52px;min-width:${lluv30.length*18}px">
            ${(()=>{
              const maxMm = Math.max(...lluv30.map(l=>l.mm), 1)
              return lluv30.map(l=>{
                const pct = Math.max(8, Math.round((l.mm/maxMm)*100))
                const d = new Date(l.fecha)
                const lbl = (d.getDate()+'/'+(d.getMonth()+1))
                return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:14px" title="${lbl}: ${l.mm}mm">
                  <div style="width:100%;background:#1565C0;border-radius:3px 3px 0 0;height:${pct}%;opacity:.8"></div>
                </div>`
              }).join('')
            })()}
          </div>
          <p class="xs gray" style="margin-top:4px;text-align:right">${lluv30.length} registros · últimos 30d</p>
        </div>` : '<p class="xs gray">Sin registros en los últimos 30 días</p>'}
    </div>


    ${backupAlert}
    `
}

async function pgLluvias() {
  // Header con botón registrar
  $('hdrTitle').textContent = '🌧 Lluvias'
  $('hdrAct').innerHTML = `<button class="btn btn-sm btn-b" onclick="openRegistrarLluvia()">+ Registrar</button>`

  // Leer todas las lluvias
  const todas = await db.lluvias.orderBy('fecha').toArray()

  if (!todas.length) {
    return `<div class="empty"><div class="eico">🌧</div>
      <p>Sin registros de lluvia</p>
      <button class="btn btn-b mt12" style="max-width:220px;margin:12px auto 0" onclick="openRegistrarLluvia()">+ Registrar primera lluvia</button>
    </div>`
  }

  // ── Construir opciones de años y meses disponibles ──
  const hoy = new Date()
  const anioActual = hoy.getFullYear()
  const mesActual  = hoy.getMonth()
  const anios = [...new Set(todas.map(l => new Date(l.fecha).getFullYear()))].sort((a,b)=>b-a)

  // Estado de filtros desde _seg
  const modo    = _seg['llv_modo'] || 'mes'        // 'mes' | 'periodo' | 'anio'
  const selAnio = parseInt(_seg['llv_anio'] || anioActual)
  const selMes  = parseInt(_seg['llv_mes']  ?? mesActual)
  const selPer  = parseInt(_seg['llv_per']  || 30)   // días

  // ── Filtrar registros según modo ──
  let filtradas = []
  let titulo_periodo = ''
  if (modo === 'historial') {
    filtradas = todas
    titulo_periodo = 'Historial completo'
  } else if (modo === 'mes') {
    filtradas = todas.filter(l => {
      const d = new Date(l.fecha)
      return d.getFullYear() === selAnio && d.getMonth() === selMes
    })
    const nomMes = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][selMes]
    titulo_periodo = `${nomMes} ${selAnio}`
  } else if (modo === 'periodo') {
    const desde = Date.now() - selPer * 86400000
    filtradas = todas.filter(l => l.fecha >= desde)
    titulo_periodo = `Últimos ${selPer} días`
  } else {
    filtradas = todas.filter(l => new Date(l.fecha).getFullYear() === selAnio)
    titulo_periodo = `Año ${selAnio}`
  }

  // ── KPIs ──
  const totalMm   = filtradas.reduce((s,l)=>s+l.mm, 0)
  const diasLluvia = filtradas.length
  const promedioMm = diasLluvia > 0 ? totalMm / diasLluvia : 0
  const maxReg     = filtradas.reduce((mx,l)=>l.mm>mx.mm?l:mx, {mm:0})

  // ── Barra de selección de modo ──
  const segModo = `<div class="seg mb10">
    <button class="${modo==='mes'?'on':''}"       onclick="_seg['llv_modo']='mes';go('lluvias')">Por mes</button>
    <button class="${modo==='periodo'?'on':''}"   onclick="_seg['llv_modo']='periodo';go('lluvias')">Período</button>
    <button class="${modo==='anio'?'on':''}"      onclick="_seg['llv_modo']='anio';go('lluvias')">Por año</button>
    <button class="${modo==='historial'?'on':''}" onclick="_seg['llv_modo']='historial';go('lluvias')">Historial</button>
  </div>`

  // ── Selector según modo ──
  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
  let selector = ''
  if (modo === 'mes') {
    selector = `<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <select class="inp" style="flex:1" onchange="_seg['llv_mes']=this.value;go('lluvias')">
        ${MESES.map((m,i)=>`<option value="${i}" ${i===selMes?'selected':''}>${m}</option>`).join('')}
      </select>
      <select class="inp" style="flex:1" onchange="_seg['llv_anio']=this.value;go('lluvias')">
        ${anios.map(a=>`<option value="${a}" ${a===selAnio?'selected':''}>${a}</option>`).join('')}
      </select>
    </div>`
  } else if (modo === 'periodo') {
    selector = `<div class="seg mb12">
      ${[7,15,30,60,90,180].map(d=>`<button class="${d===selPer?'on':''}" onclick="_seg['llv_per']=${d};go('lluvias')">${d}d</button>`).join('')}
    </div>`
  } else {
    selector = `<div class="seg mb12">
      ${anios.map(a=>`<button class="${a===selAnio?'on':''}" onclick="_seg['llv_anio']=${a};go('lluvias')">${a}</button>`).join('')}
    </div>`
  }

  // ── Gráfico de barras ──
  let grafico = '<p class="xs gray mb8">Sin datos en este período</p>'
  if (filtradas.length) {
    // Para año: agrupar por mes
    let barras = []
    if (modo === 'anio') {
      const porMes = Array(12).fill(0)
      filtradas.forEach(l => { porMes[new Date(l.fecha).getMonth()] += l.mm })
      const maxVal = Math.max(...porMes, 1)
      barras = porMes.map((mm, i) => ({
        label: MESES[i].slice(0,3),
        mm,
        pct: Math.max(mm>0?6:0, Math.round((mm/maxVal)*100))
      }))
    } else {
      const maxMm = Math.max(...filtradas.map(l=>l.mm), 1)
      barras = filtradas.map(l => {
        const d = new Date(l.fecha)
        return {
          label: d.getDate()+'/'+(d.getMonth()+1),
          mm: l.mm,
          pct: Math.max(6, Math.round((l.mm/maxMm)*100))
        }
      })
    }

    grafico = `<div style="overflow-x:auto;padding-bottom:4px;margin-bottom:4px">
      <div style="display:flex;align-items:flex-end;gap:${modo==='anio'?'6':'3'}px;height:80px;min-width:${barras.length*(modo==='anio'?36:18)}px">
        ${barras.map(b=>`
          <div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:${modo==='anio'?30:14}px" title="${b.label}: ${b.mm.toFixed(1)}mm">
            ${b.mm>0?`<span style="font-size:.6rem;color:#1565C0;font-weight:700">${b.mm>=10?Math.round(b.mm):b.mm.toFixed(1)}</span>`:''}
            <div style="width:100%;background:${b.mm>0?'#1565C0':'#E0E0E0'};border-radius:4px 4px 0 0;height:${b.pct}%;opacity:.85;transition:height .3s"></div>
            <span style="font-size:.62rem;color:#888;white-space:nowrap">${b.label}</span>
          </div>`).join('')}
      </div>
    </div>`
  }

  // ── Lista de registros ──
  const lista = filtradas.length
    ? [...filtradas].reverse().map(l => {
        const d = new Date(l.fecha)
        const fecha = `${d.getDate()} ${MESES[d.getMonth()].slice(0,3)} ${d.getFullYear()}`
        return `<div class="card row-b mb8">
          <div>
            <p class="sm bold">${fecha}</p>
            ${l.obs?`<p class="xs gray">${l.obs}</p>`:''}
          </div>
          <div style="text-align:right">
            <p style="font-size:1.1rem;font-weight:800;color:#1565C0">${l.mm.toFixed(1)} <span style="font-size:.8rem;font-weight:400">mm</span></p>
            <button onclick="eliminarLluvia(${l.id})" style="border:none;background:none;color:#bbb;font-size:.85rem;cursor:pointer;padding:2px 0">🗑</button>
          </div>
        </div>`
      }).join('')
    : '<p class="xs gray">Sin registros en este período</p>'

  // ── Historial mes × año ──
  let historialHTML = ''
  if (modo === 'historial') {
    const aniosList = [...new Set(todas.map(l => new Date(l.fecha).getFullYear()))].sort((a,b)=>a-b)
    // Construir matriz [mes][anio] = mm
    const mat = {}
    const totAnio = {}
    const totMes = Array(12).fill(0)
    todas.forEach(l => {
      const d = new Date(l.fecha)
      const a = d.getFullYear(), m = d.getMonth()
      if (!mat[m]) mat[m] = {}
      mat[m][a] = (mat[m][a] || 0) + l.mm
      totAnio[a] = (totAnio[a] || 0) + l.mm
      totMes[m] += l.mm
    })
    const globalMax = Math.max(...Object.values(mat).flatMap(r=>Object.values(r)), 1)
    const cellBg = mm => {
      if (!mm) return '#f5f5f5'
      const pct = mm / globalMax
      if (pct < 0.2) return '#E3F2FD'
      if (pct < 0.4) return '#90CAF9'
      if (pct < 0.6) return '#42A5F5'
      if (pct < 0.8) return '#1976D2'
      return '#0D47A1'
    }
    const cellTxt = mm => {
      if (!mm) return '#ccc'
      const pct = mm / globalMax
      return pct < 0.4 ? '#1a1a1a' : 'white'
    }
    const thStyle = 'padding:6px 4px;font-size:.68rem;font-weight:700;color:#555;text-align:center;white-space:nowrap'
    const tdStyle = (mm) => `background:${cellBg(mm)};color:${cellTxt(mm)};padding:5px 3px;text-align:center;font-size:.7rem;font-weight:${mm?'700':'400'};border-radius:4px`
    const leyenda = `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <span style="font-size:.68rem;color:#888">Intensidad:</span>
      ${['Sin dato','Baja','Media-baja','Media','Alta','Muy alta'].map((lbl,i) => {
        const colors = ['#f5f5f5','#E3F2FD','#90CAF9','#42A5F5','#1976D2','#0D47A1']
        const txts   = ['#ccc','#1a1a1a','#1a1a1a','#1a1a1a','white','white']
        return `<span style="background:${colors[i]};color:${txts[i]};padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:600">${lbl}</span>`
      }).join('')}
    </div>`
    const totalGlobal = Object.values(totAnio).reduce((s,v)=>s+v,0)
    const resumen = `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px">
      <div style="flex:1;min-width:90px;text-align:center;background:#E3F2FD;border-radius:10px;padding:8px 4px">
        <p style="font-size:1.2rem;font-weight:800;color:#1565C0">${totalGlobal.toFixed(0)}</p>
        <p style="font-size:.68rem;color:#666">mm totales</p>
      </div>
      <div style="flex:1;min-width:90px;text-align:center;background:#E8F5E9;border-radius:10px;padding:8px 4px">
        <p style="font-size:1.2rem;font-weight:800;color:#388E3C">${todas.length}</p>
        <p style="font-size:.68rem;color:#666">días con lluvia</p>
      </div>
      <div style="flex:1;min-width:90px;text-align:center;background:#FFF3E0;border-radius:10px;padding:8px 4px">
        <p style="font-size:1.2rem;font-weight:800;color:#E65100">${aniosList.length}</p>
        <p style="font-size:.68rem;color:#666">año${aniosList.length!==1?'s':''} registrado${aniosList.length!==1?'s':''}</p>
      </div>
    </div>`
    const mesMaxIdx = totMes.indexOf(Math.max(...totMes))
    const mesMinIdx = totMes.filter(m=>m>0).length ? totMes.map((v,i)=>v>0?{v,i}:null).filter(Boolean).reduce((mn,x)=>x.v<mn.v?x:mn).i : -1
    const extremos = mesMaxIdx >= 0 ? `<div style="display:flex;gap:8px;margin-bottom:10px">
      <div style="flex:1;background:#E3F2FD;border-radius:8px;padding:7px 10px">
        <p style="font-size:.68rem;color:#888">☔ Mes más lluvioso</p>
        <p style="font-weight:700;color:#1565C0;font-size:.9rem">${MESES[mesMaxIdx]} <span style="font-size:.75rem;font-weight:400">(${totMes[mesMaxIdx].toFixed(0)} mm)</span></p>
      </div>
      ${mesMinIdx>=0?`<div style="flex:1;background:#FFF8E1;border-radius:8px;padding:7px 10px">
        <p style="font-size:.68rem;color:#888">☀️ Mes más seco</p>
        <p style="font-weight:700;color:#E65100;font-size:.9rem">${MESES[mesMinIdx]} <span style="font-size:.75rem;font-weight:400">(${totMes[mesMinIdx].toFixed(0)} mm)</span></p>
      </div>`:''}
    </div>` : ''
    const tabla = `<div style="overflow-x:auto">
      <table style="border-collapse:separate;border-spacing:3px;width:100%;min-width:${60+aniosList.length*52}px">
        <thead>
          <tr>
            <th style="${thStyle};text-align:left;min-width:56px">Mes</th>
            ${aniosList.map(a=>`<th style="${thStyle}">${a}</th>`).join('')}
            <th style="${thStyle};color:#388E3C">Total</th>
          </tr>
        </thead>
        <tbody>
          ${MESES.map((nom,m) => {
            const rowMm = aniosList.map(a => (mat[m]&&mat[m][a]) ? mat[m][a] : 0)
            const rowTot = rowMm.reduce((s,v)=>s+v,0)
            return `<tr>
              <td style="font-size:.72rem;font-weight:600;color:#333;padding:4px 2px;white-space:nowrap">${nom.slice(0,3)}</td>
              ${rowMm.map(mm=>`<td style="${tdStyle(mm)}">${mm?mm.toFixed(0):'—'}</td>`).join('')}
              <td style="font-size:.72rem;font-weight:700;color:${rowTot>0?'#1565C0':'#ccc'};text-align:center;padding:4px 2px">${rowTot?rowTot.toFixed(0):'—'}</td>
            </tr>`
          }).join('')}
        </tbody>
        <tfoot>
          <tr>
            <td style="font-size:.7rem;font-weight:700;color:#388E3C;padding:6px 2px">Total</td>
            ${aniosList.map(a=>`<td style="font-size:.72rem;font-weight:800;color:#388E3C;text-align:center;padding:4px 2px">${(totAnio[a]||0).toFixed(0)}</td>`).join('')}
            <td style="font-size:.76rem;font-weight:800;color:#1B5E20;text-align:center;padding:4px 2px">${totalGlobal.toFixed(0)}</td>
          </tr>
        </tfoot>
      </table>
    </div>`
    historialHTML = `<div class="card mb10">
      <p class="bold sm mb8">📊 Historial de precipitaciones</p>
      ${resumen}${extremos}${leyenda}${tabla}
    </div>`
  }

  return `
    ${segModo}
    ${modo === 'historial' ? historialHTML : `
    ${selector}
    <div class="card mb10">
      <p class="bold sm mb2">${titulo_periodo}</p>
      <div class="g3 mb10">
        <div style="text-align:center;padding:6px 0">
          <p style="font-size:1.4rem;font-weight:800;color:#1565C0">${totalMm.toFixed(0)}</p>
          <p style="font-size:.7rem;color:#888">mm totales</p>
        </div>
        <div style="text-align:center;padding:6px 0">
          <p style="font-size:1.4rem;font-weight:800;color:#0277BD">${diasLluvia}</p>
          <p style="font-size:.7rem;color:#888">días con lluvia</p>
        </div>
        <div style="text-align:center;padding:6px 0">
          <p style="font-size:1.4rem;font-weight:800;color:#01579B">${promedioMm.toFixed(1)}</p>
          <p style="font-size:.7rem;color:#888">mm promedio</p>
        </div>
      </div>
      ${maxReg.mm > 0 ? `<p class="xs gray">Mayor registro: <strong>${maxReg.mm.toFixed(1)} mm</strong> — ${(()=>{ const d=new Date(maxReg.fecha); return d.getDate()+' '+MESES[d.getMonth()].slice(0,3)+' '+d.getFullYear() })()}</p>` : ''}
    </div>

    <div class="card mb10">
      <p class="bold sm mb8">Precipitaciones</p>
      ${grafico}
    </div>

    <p class="sec">Registros (${filtradas.length})</p>
    ${lista}`}
  `
}

async function eliminarLluvia(id) {
  if (!await showConfirm('¿Eliminar este registro de lluvia?')) return
  try {
    await fsDelete('lluvias', id)
    showToast('Registro eliminado')
    go('lluvias')
  } catch(e) { showToast('Error al eliminar','err',4000) }
}

function openRegistrarLluvia() {
  const hoy = new Date().toISOString().split('T')[0]
  showSheet(`
    <div class="sh-title">🌧 Registrar lluvia<button class="sh-x" onclick="closeSheet()">✕</button></div>
    <div class="field">
      <label>Fecha *</label>
      <input id="ll-fecha" class="inp" type="date" value="${hoy}">
    </div>
    <div class="field">
      <label>Milímetros (mm) *</label>
      <div class="inp-wrap">
        <input id="ll-mm" class="inp" type="number" inputmode="decimal" min="0" step="0.1" placeholder="0.0">
        <span class="inp-suf">mm</span>
      </div>
    </div>
    <div class="field">
      <label>Observación</label>
      <input id="ll-obs" class="inp" placeholder="Ej: Lluvia fuerte en la tarde…">
    </div>
    <div class="btn-row">
      <button class="btn btn-gray" onclick="closeSheet()">Cancelar</button>
      <button class="btn btn-b" id="ll-btn" onclick="saveRegistrarLluvia()">✓ Guardar</button>
    </div>`)
  setTimeout(()=>{ const f=$('ll-mm'); if(f) f.focus() }, 200)

async function saveRegistrarLluvia() {
  const fechaStr = $('ll-fecha')?.value
  const mmVal    = parseFloat($('ll-mm')?.value)
  if (!fechaStr) { showToast('Selecciona la fecha','err'); return }
  if (!mmVal || mmVal <= 0) {
    const f=$('ll-mm'); if(f){f.style.border='2px solid #C62828';f.focus()}
    showToast('Ingresa los milímetros','err'); return
  }
  const obs   = $('ll-obs')?.value?.trim() || ''
  const fecha = new Date(fechaStr+'T00:00:00').getTime()

  // ── Verificar duplicado por día ──
  const diaInicio = new Date(fechaStr+'T00:00:00').getTime()
  const diaFin    = new Date(fechaStr+'T23:59:59').getTime()
  const existente = await db.lluvias.where('fecha').between(diaInicio, diaFin, true, true).first()
  if (existente) {
    showToast(`Ya existe un registro para esa fecha (${existente.mm} mm)`, 'err', 4000)
    return
  }

  // ── Confirmación antes de guardar ──
  const MESES_C = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
  const dObj = new Date(fecha)
  const fechaLabel = `${dObj.getDate()} ${MESES_C[dObj.getMonth()]} ${dObj.getFullYear()}`
  const confirmado = await showConfirm(`¿Confirmar registro de lluvia?\n\n📅 Fecha: ${fechaLabel}\n🌧 Milímetros: ${mmVal} mm${obs ? '\n📝 ' + obs : ''}`)
  if (!confirmado) return

  const btn = $('ll-btn')
  if (btn) { btn.disabled=true; btn.textContent='Guardando…' }
  let lid
  try {
    const obsLluvia = obs ? obs.trim() : undefined
    lid = await fsAdd('lluvias', {fecha, mm:mmVal, ...(obsLluvia && {obs:obsLluvia})})
  } catch(e) {
    showToast('Error al guardar','err', 4000)
    if (btn) { btn.disabled=false; btn.textContent='✓ Guardar' }
    return
  }
  closeSheet()
  pushUndo(`🌧 ${mmVal}mm registrados`, async () => {
    await fsDelete('lluvias', lid)
  })
  go('dashboard')
}

async function pgGanado() {
  const esVerMas = !!PARAMS._ganPage
  if(!esVerMas){ _ganSelMode=false; _ganSelected=new Set(); _ganFiltroAdj=null; _ganFiltroCat=''; _ganBusq='' }
  _ganPage = PARAMS._ganPage || 1
  updHdrGanado()
  const animales=await db.animales.where('activo').equals(1).toArray()
  _ganAll=animales
  if(!animales.length) return `<div class="empty"><div class="eico">🐄</div><p>Sin animales registrados</p>
    <button class="btn btn-g mt12" style="max-width:220px;margin:12px auto 0" onclick="go('animal-nuevo')">+ Agregar animal</button></div>`

  const lotes=await db.lotes.toArray()
  const loteMap=Object.fromEntries(lotes.map(l=>[l.id,l]))
  const aniConLote=animales.filter(a=>a.loteId)
  const aniSinLote=animales.filter(a=>!a.loteId)
  // Listas para armar tarjetas/paginación: respetan el filtro de categoría/adjudicación/búsqueda activo
  const busqL = _ganBusq.toLowerCase()
  const pasaBusq = a => !busqL || (a.arete+' '+(a.nombre||'')+' '+(a.raza||'')+' '+(a.color||'')+' '+(a.descripcion||'')+' '+(a.categoria||'')).toLowerCase().includes(busqL)
  let aniSinLoteF = aniSinLote.filter(pasaBusq), aniConLoteF = aniConLote.filter(pasaBusq)
  if(_ganFiltroCat){ aniSinLoteF = aniSinLoteF.filter(a=>a.categoria===_ganFiltroCat); aniConLoteF = aniConLoteF.filter(a=>a.categoria===_ganFiltroCat) }
  if(_ganFiltroAdj==='sin') aniConLoteF = []
  if(_ganFiltroAdj==='con') aniSinLoteF = []

  // Último pesaje para mostrar en resumen
  let ganUltimoPesaje = 0
  const pesajesRecientes = await db.pesajes.orderBy('fecha').reverse().limit(1).toArray()
  if (pesajesRecientes.length) ganUltimoPesaje = pesajesRecientes[0].fecha

  // Tarjeta resumen – los números actúan como filtros toggle
  const resumenGan=`<div class="card mb8" style="padding:12px 16px">
    <div style="display:flex;align-items:center;justify-content:space-around;text-align:center">
      <div id="btn-filt-sin" style="cursor:pointer;padding:6px 14px;border-radius:10px;border:2px solid transparent;transition:all .2s" onclick="filtAdjudicacion('sin')">
        <p style="font-size:1.4rem;font-weight:800;color:#E65100">${aniSinLote.length}</p>
        <p style="font-size:.72rem;color:#888;margin-top:2px">Sin lote</p>
      </div>
      <div style="width:1px;height:36px;background:#eee"></div>
      <div id="btn-filt-con" style="cursor:pointer;padding:6px 14px;border-radius:10px;border:2px solid transparent;transition:all .2s" onclick="filtAdjudicacion('con')">
        <p style="font-size:1.4rem;font-weight:800;color:#1565C0">${aniConLote.length}</p>
        <p style="font-size:.72rem;color:#888;margin-top:2px">En lote</p>
      </div>
      <div style="width:1px;height:36px;background:#eee"></div>
      <div style="padding:6px 14px">
        <p style="font-size:1.4rem;font-weight:800;color:#2E7D32">${animales.length}</p>
        <p style="font-size:.72rem;color:#888;margin-top:2px">Total</p>
      </div>
    </div>
    ${ganUltimoPesaje?`<p style="font-size:.72rem;color:#888;margin-top:10px;padding-top:8px;border-top:1px solid #f0f0f0;text-align:center">Último pesaje: <strong style="color:#555">${ffd(ganUltimoPesaje)}</strong></p>`:''}
  </div>`

  // Filtros por categoría — orden lógico
  const CAT_ORDEN = ['HC','MC','HL','ML','NV','VH','VP','T','MCB']
  const catsPresentes = [...new Set(animales.map(a=>a.categoria).filter(Boolean))]
  const cats = CAT_ORDEN.filter(c => catsPresentes.includes(c))
  const selCat = _ganFiltroCat

  const filtros=`<div style="margin-bottom:10px">
    <div id="catFiltros" style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">
      <span style="cursor:pointer;white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:700;border:2px solid ${!selCat?'#E65100':'#ddd'};background:${!selCat?'#E65100':'rgba(255,255,255,.8)'};color:${!selCat?'white':'#666'};transition:all .2s"
        onclick="filtCat('')">Todos (${animales.length})</span>
      ${cats.map(c => {
        const n = animales.filter(a=>a.categoria===c).length
        const activo = selCat === c
        return `<span data-cat="${c}" style="cursor:pointer;white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:700;border:2px solid ${activo?'#E65100':'#ddd'};background:${activo?'#E65100':'rgba(255,255,255,.8)'};color:${activo?'white':'#555'};box-shadow:${activo?'0 2px 8px rgba(230,81,0,.35)':'none'};transition:all .2s"
          onclick="filtCat('${c}')">${c} (${n})</span>`
      }).join('')}
    </div>
  </div>`

  // Renderizar tarjetas inline (sin setTimeout) para evitar race conditions
  function cardGan(a){
    const lote=a.loteId?loteMap[a.loteId]:null
    const txt=(a.arete+' '+(a.nombre||'')+' '+(a.raza||'')+' '+(a.color||'')+' '+(a.descripcion||'')+' '+(a.categoria||'')).toLowerCase()
    return `<div class="card border-l4 bl-green" style="cursor:pointer;margin-bottom:8px" onclick="go('animal-ficha',{id:${a.id}})" data-id="${a.id}" data-cat="${a.categoria||''}" data-txt="${txt}">
      <div class="row-b">
        <div style="min-width:0">
          <div class="row" style="gap:8px;align-items:center">
            <span class="bold">${a.arete}</span>
            <span class="badge bg-blue" style="font-size:.7rem">${a.categoria||'—'}</span>
          </div>
          <p class="xs gray mt8">${a.raza||'Sin raza'} · ${lote?lote.nombre:'Sin lote'}</p>
        </div>
        <div class="right" style="flex-shrink:0;margin-left:8px"><p class="bold green">${a.pesoInicial||0} kg</p><p class="xs gray">peso reg.</p></div>
      </div>
    </div>`
  }

  // Paginación (aplicada sobre las listas ya filtradas por categoría/adjudicación)
  const todosList = [...aniSinLoteF, ...aniConLoteF]
  const totalMostrar = _ganPage * _GAN_PER_PAGE
  const aniSinLotePag = aniSinLoteF.slice(0, Math.min(aniSinLoteF.length, totalMostrar))
  const restante = totalMostrar - aniSinLotePag.length
  const aniConLotePag = aniConLoteF.slice(0, Math.max(0, Math.min(aniConLoteF.length, restante)))
  const totalMostrados = aniSinLotePag.length + aniConLotePag.length
  const hayMas = totalMostrados < todosList.length

  const filtroActivo = !!(_ganFiltroCat || _ganFiltroAdj)
  const secSin=aniSinLoteF.length
    ?`<div style="display:flex;align-items:center;gap:8px;margin:4px 0 8px">
        <span style="font-size:.72rem;font-weight:700;color:#E65100;text-transform:uppercase;letter-spacing:.06em">⚠ Sin adjudicar</span>
        <span style="background:#FFF3E0;color:#E65100;border-radius:20px;font-size:.72rem;font-weight:700;padding:2px 8px">${aniSinLoteF.length}</span>
        <div style="flex:1;height:1px;background:#FFE0B2"></div>
      </div>${aniSinLotePag.map(cardGan).join('')}`
    :(filtroActivo?'':`<div style="display:flex;align-items:center;gap:8px;margin:4px 0 8px">
        <span style="font-size:.75rem;font-weight:800;color:white;background:#2E7D32;border-radius:6px;padding:3px 10px;text-transform:uppercase;letter-spacing:.05em">✓ Todos adjudicados en lote</span>
        <div style="flex:1;height:1px;background:#C8E6C9"></div></div>`)

  const secCon=aniConLotePag.length
    ?`<div style="display:flex;align-items:center;gap:8px;margin:${aniSinLoteF.length?'16px':'4px'} 0 8px">
        <span style="font-size:.72rem;font-weight:700;color:#1565C0;text-transform:uppercase;letter-spacing:.06em">En lote</span>
        <span style="background:#E3F2FD;color:#1565C0;border-radius:20px;font-size:.72rem;font-weight:700;padding:2px 8px">${aniConLoteF.length}</span>
        <div style="flex:1;height:1px;background:#BBDEFB"></div>
      </div>${aniConLotePag.map(cardGan).join('')}`:''

  const btnVerMas = hayMas
    ? `<button class="btn btn-gray mt8" onclick="PARAMS._ganPage=${_ganPage+1};_ganPage=${_ganPage+1};go('ganado',PARAMS)">
        Ver más (${todosList.length - totalMostrados} restantes)
      </button>` : ''

  return `${resumenGan}
    <div class="inp-wrap mb8">
      <input id="ganBusq" class="inp" placeholder="🔍 Buscar por arete, raza, color, descripción…" value="${_ganBusq}" oninput="_ganBusq=this.value;filtGanado(this.value);document.getElementById('ganBusqClear').style.display=this.value?'flex':'none'">
      <span id="ganBusqClear" onclick="limpiarBusqGanado()" style="display:${_ganBusq?'flex':'none'};position:absolute;right:10px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;background:#ddd;color:#555;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;pointer-events:auto">✕</span>
    </div>
    ${filtros}
    <div id="gList">${secSin}${secCon}</div>
    ${btnVerMas}`
}

function updHdrGanado(){
  if(!_ganSelMode){

let _spdSel = new Set()
let _spdMatches = []

function openSelPorPalabra() {
  _spdSel = new Set(); _spdMatches = []
  showSheet(`

        <button id="spd-all-btn" onclick="spdToggleTodos()"
          style="border:1.5px solid #1565C0;color:#1565C0;background:white;border-radius:8px;padding:5px 12px;font-size:.75rem;font-weight:700;cursor:pointer">
          ☑ Seleccionar todos
        </button>
      </div>
    </div>
    <div id="spd-lista" style="max-height:38vh;overflow-y:auto;border:1.5px solid #eee;border-radius:10px;margin-bottom:12px;display:none"></div>

  setTimeout(()=>{ const f=$('spd-q'); if(f) f.focus() }, 200)

function _spdRenderLista() {
  const lista=$('spd-lista'), ctrl=$('spd-ctrl'), empty=$('spd-empty'), btn=$('spd-btn'), count=$('spd-count'), allBtn=$('spd-all-btn')
  if (!_spdMatches.length) {
    if(lista) lista.style.display='none'
    if(ctrl) ctrl.style.display='none'
    if(empty) empty.style.display='block'
    if(btn) { btn.disabled=true; btn.textContent='Seleccionar' }
    return
  }
  if(empty) empty.style.display='none'
  if(ctrl) ctrl.style.display='block'
  if(lista) {
    lista.style.display='block'
    lista.innerHTML = _spdMatches.map(a => {
      const sel = _spdSel.has(a.id)
      const etiq = [a.categoria,a.raza,a.color,a.descripcion].filter(Boolean).join(' · ')
      return `<div onclick="spdToggle(${a.id})" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid #f0f0f0;cursor:pointer;background:${sel?'#EEF4FF':'white'};-webkit-tap-highlight-color:transparent">
        <div style="width:21px;height:21px;border-radius:5px;border:2px solid ${sel?'#1565C0':'#ccc'};background:${sel?'#1565C0':'white'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${sel?'<span style="color:white;font-size:12px;font-weight:700">✓</span>':''}
        </div>
        <div style="flex:1;min-width:0">
          <p style="font-weight:700;font-size:.88rem">${a.arete}${a.nombre?' — '+a.nombre:''}</p>
          ${etiq?`<p style="font-size:.72rem;color:#888;margin-top:1px">${etiq}</p>`:''}
        </div>
      </div>`
    }).join('')
  }
  const nSel = _spdSel.size
  const todos = _spdMatches.length>0 && _spdMatches.every(a=>_spdSel.has(a.id))
  if(count) count.textContent = nSel>0 ? `${nSel} seleccionado${nSel>1?'s':''}` : `${_spdMatches.length} coincidencia${_spdMatches.length>1?'s':''}`
  if(allBtn) {
    allBtn.textContent = todos ? '☐ Ninguno' : '☑ Seleccionar todos'
    allBtn.style.color = todos ? '#C62828' : '#1565C0'
    allBtn.style.borderColor = todos ? '#C62828' : '#1565C0'
  }
  if(btn) { btn.disabled=nSel===0; btn.textContent=nSel>0?`Seleccionar ${nSel} animal${nSel>1?'es':''}` : 'Seleccionar' }
}

function previewSelPalabra(q) {
  if (!q.trim()) {
    _spdMatches=[]; _spdSel=new Set(); _spdRenderLista(); return
  }
  const ql=q.toLowerCase()
  _spdMatches=_ganAll.filter(a=>
    (a.descripcion||'').toLowerCase().includes(ql)||
    (a.nombre||'').toLowerCase().includes(ql)||
    (a.raza||'').toLowerCase().includes(ql)||
    (a.color||'').toLowerCase().includes(ql)||
    (a.arete||'').toLowerCase().includes(ql)||
    (a.categoria||'').toLowerCase().includes(ql)
  )
  // Por defecto seleccionar todos los resultados
  _spdSel = new Set(_spdMatches.map(a=>a.id))
  _spdRenderLista()
}

function spdToggle(id) {
  if(_spdSel.has(id)) _spdSel.delete(id); else _spdSel.add(id)
  _spdRenderLista()
}

function spdToggleTodos() {
  const todos = _spdMatches.length>0 && _spdMatches.every(a=>_spdSel.has(a.id))
  _spdSel = todos ? new Set() : new Set(_spdMatches.map(a=>a.id))
  _spdRenderLista()
}

function aplicarSelPalabra() {
  if (!_spdSel.size) return
  _spdSel.forEach(id=>_ganSelected.add(id))
  updHdrGanado()
  reRenderCardsGanado()
  mostrarAccionesGanado()
}


function activarSelGanado(){
  _ganSelMode=true; _ganSelected=new Set()
  updHdrGanado()
  reRenderCardsGanado()
}

function cancelarSelGanado(){
  _ganSelMode=false; _ganSelected=new Set()
  updHdrGanado()
  reRenderCardsGanado()
}

function toggleGanSel(id){
  id=parseInt(id)
  if(_ganSelected.has(id)) _ganSelected.delete(id)
  else _ganSelected.add(id)
  updHdrGanado()
  // Re-render just the clicked card
  reRenderCardsGanado()
}

async function reRenderCardsGanado(){
  const gl=$('gList'); if(!gl) return
  const lotes=await db.lotes.toArray()
  const loteMap=Object.fromEntries(lotes.map(l=>[l.id,l]))
  const busq=($('ganBusq')?.value||'').toLowerCase()

  function makeCard(a){
    const lote=a.loteId?loteMap[a.loteId]:null
    const sel=_ganSelected.has(a.id)
    const cardStyle=`cursor:pointer;margin-bottom:8px;${sel?'border:2px solid #C62828;background:#FFF8F8;':''}`
    const chk=_ganSelMode?`<div style="width:22px;height:22px;border-radius:50%;border:2px solid ${sel?'#C62828':'#bbb'};background:${sel?'#C62828':'white'};display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:6px">${sel?'<span style="color:white;font-size:13px">✓</span>':''}</div>`:''
    const clickAct=_ganSelMode?`toggleGanSel(${a.id})`:`go('animal-ficha',{id:${a.id}})`
    const txt=(a.arete+' '+(a.nombre||'')+' '+(a.raza||'')+' '+(a.color||'')+' '+(a.descripcion||'')+' '+(a.categoria||'')).toLowerCase()
    const passSearch=!busq||txt.includes(busq)
    const passCat=!_ganFiltroCat||a.categoria===_ganFiltroCat
    const visible=passSearch&&passCat
    return `<div class="card border-l4 bl-green" style="${cardStyle}${visible?'':';display:none'}" onclick="${clickAct}" data-id="${a.id}" data-cat="${a.categoria||''}" data-txt="${txt}">
      <div class="row-b">
        <div class="row" style="align-items:center;flex:1;min-width:0">
          ${chk}
          <div style="min-width:0">
            <div class="row" style="gap:8px;align-items:center">
              <span class="bold">${a.arete}</span>
              <span class="badge bg-blue" style="font-size:.7rem">${a.categoria||'—'}</span>
            </div>
            <p class="xs gray mt8">${a.raza||'Sin raza'} · ${lote?lote.nombre:'Sin lote'}</p>
          </div>
        </div>
        <div class="right" style="flex-shrink:0;margin-left:8px"><p class="bold green">${a.pesoInicial||0} kg</p><p class="xs gray">peso reg.</p></div>
      </div>
    </div>`
  }

  function secHeader(label, count, color, bg, line, tipo){
    const clearBtn=tipo?`<button style="font-size:.7rem;background:${bg};border:1px solid ${color};color:${color};padding:2px 8px;border-radius:8px;cursor:pointer;margin-left:4px" onclick="filtAdjudicacion('${tipo}')">✕ Quitar</button>`:''
    return `<div style="display:flex;align-items:center;gap:6px;margin:4px 0 8px">
      <span style="font-size:.72rem;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.06em">${label}</span>
      <span style="background:${bg};color:${color};border-radius:20px;font-size:.72rem;font-weight:700;padding:2px 8px">${count}</span>
      <div style="flex:1;height:1px;background:${line}"></div>
      ${clearBtn}
    </div>`
  }

  if(_ganFiltroAdj===null){
    // Vista completa: sección Sin lote primero, luego En lote
    const sinLote=_ganAll.filter(a=>!a.loteId)
    const conLote=_ganAll.filter(a=>a.loteId)
    let html=''
    if(sinLote.length){
      html+=secHeader('⚠ Sin adjudicar',sinLote.length,'#E65100','#FFF3E0','#FFE0B2',null)
      html+=sinLote.map(makeCard).join('')
    } else {
      html+=`<div style="display:flex;align-items:center;gap:8px;margin:4px 0 8px">
        <span style="font-size:.75rem;font-weight:800;color:white;background:#2E7D32;border-radius:6px;padding:3px 10px;text-transform:uppercase;letter-spacing:.05em">✓ Todos adjudicados en lote</span>
        <div style="flex:1;height:1px;background:#C8E6C9"></div></div>`
    }
    if(conLote.length){
      html+=secHeader('En lote',conLote.length,'#1565C0','#E3F2FD','#BBDEFB',null)
      html+=conLote.map(makeCard).join('')
    }
    gl.innerHTML=html
  } else {
    // Vista filtrada
    const filtrados=_ganAll.filter(a=>_ganFiltroAdj==='sin'?!a.loteId:!!a.loteId)
    const color=_ganFiltroAdj==='sin'?'#E65100':'#1565C0'
    const bg=_ganFiltroAdj==='sin'?'#FFF3E0':'#E3F2FD'
    const line=_ganFiltroAdj==='sin'?'#FFE0B2':'#BBDEFB'
    const label=_ganFiltroAdj==='sin'?'⚠ Sin adjudicar':'En lote'
    gl.innerHTML=secHeader(label,filtrados.length,color,bg,line,_ganFiltroAdj)+filtrados.map(makeCard).join('')
  }
}

async function saveLaborSeleccionados() {
  const tipo = document.getElementById('sl-tipo')?.value
  if (!tipo) { showToast('Selecciona el tipo de labor','err'); return }

  let tipoLabel = tipo
  if (tipo === 'VACUNA') {
    const vt = document.getElementById('sl-vacuna-tipo')?.value
    if (!vt) {
      const s = document.getElementById('sl-vacuna-tipo')
      if (s) { s.style.border='2px solid #C62828'; s.focus() }
      showToast('Selecciona el tipo de vacuna','err'); return
    }
    const otraVal = vt === 'Otra' ? (document.getElementById('sl-vacuna-otra')?.value?.trim()||'Otra') : vt
    tipoLabel = 'VACUNA_' + otraVal.replace(/\s+/g,'_').toUpperCase()
  }

  const fechaStr = document.getElementById('sl-fecha')?.value
  if (!fechaStr) { showToast('Selecciona la fecha','err'); return }
  const fecha = new Date(fechaStr+'T00:00:00').getTime()
  const prod = document.getElementById('sl-prod')?.value?.trim() || ''
  const obs  = document.getElementById('sl-obs')?.value?.trim() || ''
  const obsTexto = [prod, obs].filter(Boolean).join(' · ')

  const ids = _sheetLaborIds
  if (!ids.length) { closeSheet(); return }
  const btn = document.getElementById('sl-btn')
  if (btn) { btn.disabled = true; btn.textContent = 'Registrando…' }

  const labIds = []
  try {
    for (const animalId of ids) {
      const lid = await fsAdd('labores', {
        animalId, fecha,
        tipo: tipoLabel,
        obs: obsTexto || null,
        registradoPor: USER?.nombre||'—',
        registradoEn: Date.now()
      })
      labIds.push(lid)
    }
  } catch(e) {
    showToast('Error al registrar labores','err', 4000)
    if (btn) { btn.disabled = false; btn.textContent = '✓ Registrar' }
    return
  }

  closeSheet()
  _sheetLaborIds = []
  _ganSelMode = false; _ganSelected = new Set(); _ganAll = []
  const n = labIds.length
  pushUndo(`Labor registrada en ${n} animal${n>1?'es':''}`, async () => {
    for (const lid of labIds) await fsDelete('labores', lid)
  })
  go('ganado')
}

async function saveDescSeleccionados() {
  const desc = $('dc-desc')?.value?.trim() ?? ''
  const ids = _sheetDescIds
  if (!ids.length) { closeSheet(); return }
  const btn = $('dc-btn')
  if (btn) { btn.disabled=true; btn.textContent='Guardando…' }
  let snaps = []
  try {
    snaps = await Promise.all(ids.map(id => db.animales.get(id)))
    for (const id of ids) await fsUpdate('animales', id, {descripcion: desc||undefined})
  } catch(e) {
    showToast('Error al guardar','err', 4000)
    if (btn) { btn.disabled=false; btn.textContent=`✓ Aplicar a ${ids.length} animales` }
    return
  }
  const n = ids.length
  closeSheet()
  _sheetDescIds = []
  _ganSelMode = false; _ganSelected = new Set(); _ganAll = []
  pushUndo(`Descripción actualizada en ${n} animal${n>1?'es':''}`, async () => {
    for (const prev of snaps) {
      if (!prev) continue
      await fsUpdate('animales', prev.id, {descripcion: prev.descripcion||undefined})
    }
  })
  showToast(`Descripción aplicada a ${n} animal${n>1?'es':''}`, 'ok')
  go('ganado')
}

async function openProdSeleccionados() {
  const ids = [..._ganSelected]
  if (!ids.length) return
  showSheet(`<div class="sh-title">📊 Productividad del grupo<button class="sh-x" onclick="closeSheet()">✕</button></div>
    <p class="xs gray center" style="padding:16px">⏳ Calculando…</p>`)
  let totalPeso=0, gdpSum=0, gdpN=0, gananciaSum=0, ganN=0
  const catCount={}, animalesList=[]
  for (const id of ids) {
    const a = await db.animales.get(id); if(!a) continue
    const ult = await getPesoActual(id)
    const peso = ult?.pesoKg||a.pesoInicial||0
    totalPeso += peso
    const gdp = await calcGdp(id)
    if (gdp!==null) { gdpSum+=gdp; gdpN++ }
    const gan = peso-(a.pesoInicial||0)
    if (a.pesoInicial!=null) { gananciaSum+=gan; ganN++ }
    const c=a.categoria||'?'; catCount[c]=(catCount[c]||0)+1
    animalesList.push({a, peso, gdp, gan})
  }
  const n=ids.length
  const pesoProm = n>0 ? totalPeso/n : 0
  const gdpProm  = gdpN>0 ? Math.round(gdpSum/gdpN) : null
  const ganProm  = ganN>0 ? gananciaSum/ganN : null
  const catOrden = ['HC','MC','HL','ML','NV','VH','VP','T','MCB']
  const catFilas = catOrden.filter(k=>catCount[k]).map(k=>
    `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0">
      <span class="sm">${CAT[k]||k}</span><span class="sm bold">${catCount[k]}</span></div>`
  ).join('')
  const mejorGDP = animalesList.filter(x=>x.gdp!==null).sort((a,b)=>b.gdp-a.gdp)[0]
  const peorGDP  = animalesList.filter(x=>x.gdp!==null).sort((a,b)=>a.gdp-b.gdp)[0]
  const sh = document.getElementById('sheet')
  if (!sh) return
  sh.innerHTML = `
    <div class="sh-title">📊 Productividad del grupo<button class="sh-x" onclick="closeSheet()">✕</button></div>
    <div class="card card-dark mb12">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;text-align:center;gap:8px">
        <div><p style="font-size:1.3rem;font-weight:800">${n}</p><p class="sub xs">Animales</p></div>
        <div><p style="font-size:1.3rem;font-weight:800">${Math.round(totalPeso).toLocaleString('es-CO')} kg</p><p class="sub xs">Peso total</p></div>
        <div><p style="font-size:1.3rem;font-weight:800">${Math.round(pesoProm).toLocaleString('es-CO')} kg</p><p class="sub xs">Peso prom.</p></div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <div class="card" style="text-align:center;padding:14px 8px">
        <p style="font-size:1.2rem;font-weight:700;color:${gdpProm!==null?(gdpProm>=500?'#2E7D32':'#E65100'):'#888'}">${gdpProm!==null?gdpProm+' g/d':'—'}</p>
        <p class="xs gray mt4">GDP promedio</p>
      </div>
      <div class="card" style="text-align:center;padding:14px 8px">
        <p style="font-size:1.2rem;font-weight:700;color:${ganProm!==null?(ganProm>=0?'#2E7D32':'#C62828'):'#888'}">${ganProm!==null?(ganProm>=0?'+':'')+ganProm.toFixed(1)+' kg':'—'}</p>
        <p class="xs gray mt4">Ganancia prom.</p>
      </div>
    </div>
    ${mejorGDP?`<div class="card mb12" style="padding:12px 14px">
      <p class="xs gray mb8">Destacados GDP</p>
      <div class="row-b mb6"><span class="xs">🏆 Mejor · <strong>${mejorGDP.a.arete}</strong></span><span class="bold green">${mejorGDP.gdp} g/d</span></div>
      <div class="row-b"><span class="xs">⬇ Menor · <strong>${peorGDP.a.arete}</strong></span><span class="bold orange">${peorGDP.gdp} g/d</span></div>
    </div>`:''}
    <p class="sec">Por categoría</p>
    <div class="card mb12">${catFilas||'<p class="xs gray">Sin datos</p>'}</div>
    <button class="btn btn-gray" onclick="mostrarAccionesGanado()">← Volver a acciones</button>`
}

  const fechaStr=$('bj-fecha')?.value

  const ids=_sheetBajaIds; if(!ids.length){closeSheet();return}
  const btn=document.querySelector('#ov .btn-r')
  if(btn){btn.disabled=true;btn.textContent='Guardando…'}
  let snapshots=[], ok=0
  try{
    snapshots=await Promise.all(ids.map(id=>db.animales.get(id)))
    const _bajLoteIds=snapshots.filter(a=>a&&a.loteId).map(a=>a.loteId)
    const _bajLotesMap = _bajLoteIds.length ? Object.fromEntries((await db.lotes.bulkGet([...new Set(_bajLoteIds)])).filter(Boolean).map(l=>[l.id,l.nombre])) : {}
    for(const snap of snapshots){
      if(!snap) continue
      await fsUpdate('animales',snap.id,{activo:0,causaBaja:causa,fechaBaja,obsBaja:obs||null,loteId:null,fechaLote:null,loteIdSalida:snap.loteId||null,loteNombreSalida:snap.loteId?(_bajLotesMap[snap.loteId]||null):null})
      ok++
    }
    if(_bajLoteIds.length) await checkLoteVacio(_bajLoteIds, fechaBaja)
  }catch(e){
    console.error('Error en saveBajaSeleccionados:',e)
    showToast('Error al guardar la baja','err',5000)
    if(btn){btn.disabled=false;btn.textContent='Confirmar baja'}
    return
  }
  closeSheet()
  _sheetBajaIds=[]
  _ganSelMode=false; _ganSelected=new Set(); _ganAll=[]
  pushUndo(`${ok} animal${ok>1?'es dados':'dado'} de baja`, async()=>{
    for(const prev of snapshots){
      if(!prev) continue
      await fsUpdate('animales',prev.id,{
        activo:1, causaBaja:null, fechaBaja:null,
        obsBaja:null, loteId:prev.loteId||null, fechaLote:prev.fechaLote||null

  })

async function saveLoteSeleccionados(){
  const loteId=parseInt($('lt-lote')?.value)
  if(!loteId){
    const sel=$('lt-lote')
    if(sel){sel.style.border='2px solid #C62828';sel.focus()}
    showToast('Selecciona un lote','err')
    return
  }
  const ids=_sheetLoteIds
  const snapshots=_sheetLoteSnaps
  if(!ids.length){closeSheet();return}
  const fechaStr=$('lt-fecha')?.value
  const fechaLote=fechaStr?new Date(fechaStr+'T00:00:00').getTime():Date.now()
  const btn=document.querySelector('#ov .btn-b')
  if(btn){btn.disabled=true;btn.textContent='Guardando…'}
  // Capturar nombre del lote y hacer updates — todo en try-catch
  let loteNom='lote'
  const _slLoteIds=_sheetLoteSnaps.filter(a=>a&&a.loteId&&a.loteId!==loteId).map(a=>a.loteId)
  try{
    const lote=await db.lotes.get(loteId)
    loteNom=lote?.nombre||'lote'
    for(const id of ids) await fsUpdate('animales',id,{loteId,fechaLote})
    if(_slLoteIds.length) await checkLoteVacio(_slLoteIds, fechaLote)
  }catch(e){
    console.error('Error en saveLoteSeleccionados:',e)
    showToast('Error al asignar lote','err',5000)
    if(btn){btn.disabled=false;btn.textContent='Asignar'}
    return
  }
  // pushUndo y navegación SIEMPRE fuera del try-catch
  const n=ids.length
  closeSheet()
  _sheetLoteIds=[]; _sheetLoteSnaps=[]
  _ganSelMode=false; _ganSelected=new Set()
  pushUndo(`${n} animal${n>1?'es':''} → ${loteNom}`, async()=>{
    for(const prev of snapshots){
      if(!prev) continue
      await fsUpdate('animales',prev.id,{
        loteId: prev.loteId||undefined,
        fechaLote: prev.fechaLote||undefined
      })
    }
  })
  go('ganado')
}

async function saveAnimal() {
  const arete=$('an-ar').value.trim()
  if(!arete){
    const f=$('an-ar'); if(f){f.style.border='2px solid #C62828';f.focus()}
    showToast('El arete es requerido','err'); return
  }
  const exist=await db.animales.where('activo').equals(1).filter(a=>a.arete.trim().toLowerCase()===arete.toLowerCase()).first()
  if(exist){ showToast(`Ya existe el arete "${exist.arete}"`, 'err', 4000); return }
  const pesoIni=parseFloat($('an-peso')?.value)||0
  const loteId=$('an-lote')?.value?parseInt($('an-lote').value):undefined
  const anData={
    arete, nombre:$('an-nm')?.value?.trim()||'', categoria:$('an-cat')?.value||'',
    raza:$('an-rz')?.value||'', color:$('an-color')?.value?.trim()||'', descripcion:$('an-desc')?.value?.trim()||'',
    loteId, fechaLote:loteId?fromD($('an-flote')?.value):undefined,
    pesoInicial:pesoIni, precioPorKg:parseFloat($('an-precio')?.value)||0,
    fechaIngreso:fromD($('an-fi')?.value),
    procedencia:$('an-proc')?.value?.trim()||'', estadoSanitario:'SANO', activo:1,
    creadoPor:USER?.nombre||'—', creadoEn:Date.now()
  }
  const btn=document.querySelector('[onclick="saveAnimal()"]')
  if(btn){btn.disabled=true;btn.textContent='Guardando…'}
  let id, pesoId=null, laborId=null
  try{
    id=await fsAdd('animales',anData)
    const ahora=Date.now(), quien=USER?.nombre||'—'
    if(pesoIni>0) pesoId=await fsAdd('pesajes',{animalId:id,fecha:fromD($('an-fpeso')?.value),pesoKg:pesoIni,metodo:'BASCULA',cc:3,obs:'Pesaje inicial',registradoPor:quien,registradoEn:ahora})
    laborId=await fsAdd('labores',{animalId:id,fecha:fromD($('an-fpeso')?.value),tipo:$('an-lab')?.value||'PESAJE',pesoKg:pesoIni,obs:'Registro inicial',registradoPor:quien,registradoEn:ahora})
  }catch(e){
    console.error('saveAnimal:',e)
    showToast('Error al guardar animal','err',5000)
    if(btn){btn.disabled=false;btn.textContent='Guardar animal'}
    return
  }
  pushUndo(`Animal "${arete}" registrado`, async()=>{
    await fsUpdate('animales',id,{activo:0})
    if(pesoId) await fsDelete('pesajes',pesoId)
    if(laborId) await fsDelete('labores',laborId)
  })
  go('ganado')
}
