async function sacarYMover(potreroId, cicloId, nuevoPotId) {
  closeSheet()
  const ciclo = await db.ciclos.get(cicloId)
  const dias  = diasDesde(ciclo.fechaEntrada)
  const ahora = Date.now()
  try {
    // Cerrar ciclo actual
    await fsUpdate('ciclos', cicloId, {activo:0, fechaSalida:ahora, diasOcupacion:dias})
    // Potrero anterior → descanso
    await fsUpdate('potreros', potreroId, {estado:'EN_DESCANSO', numAnimales:0, loteActual:undefined, fechaSalida:ahora})
    // Abrir nuevo ciclo en potrero destino
    const nuevoCicloId = await fsAdd('ciclos', {
      potreroId:nuevoPotId, loteId:ciclo.loteId, nombreLote:ciclo.nombreLote,
      numAnimales:ciclo.numAnimales, fechaEntrada:ahora, activo:1, obs:''
    })
    // Potrero nuevo → ocupado
    await fsUpdate('potreros', nuevoPotId, {estado:'OCUPADO', numAnimales:ciclo.numAnimales, loteActual:ciclo.loteId})
    trazar('MOVER_POTRERO','CICLO', nuevoCicloId, {de:potreroId, a:nuevoPotId})
  } catch(e) { showToast('Error al mover','err',4000); return }
  pushUndo(`Lote movido — deshacer`, async () => {
    await fsUpdate('ciclos', cicloId, {activo:1, fechaSalida:undefined, diasOcupacion:undefined})
    await fsUpdate('potreros', potreroId, {estado:'OCUPADO', numAnimales:ciclo.numAnimales, loteActual:ciclo.loteId, fechaSalida:undefined})
    await fsUpdate('potreros', nuevoPotId, {estado:'DISPONIBLE', numAnimales:0, loteActual:undefined})
    const nc = await db.ciclos.where({potreroId:nuevoPotId, activo:1}).first()
    if (nc) await fsUpdate('ciclos', nc.id, {activo:0})
  })
  go('potrero-ficha', {id:nuevoPotId})
}

async function pgVentas() {
  const tipo = _seg['ven_tipo'] || 'ventas'
  $('hdrTitle').textContent = tipo === 'cesiones' ? '🔄 Cesiones' : '💰 Ventas'
  $('hdrAct').innerHTML = tipo === 'ventas' ? `<button class="btn btn-sm btn-g" onclick="openRegistrarVenta()">+ Venta</button>` : ''

  // Selector Ventas / Cesiones
  const tipoSel = `<div class="seg mb10">
    <button class="${tipo==='ventas'?'on':''}" onclick="_seg['ven_tipo']='ventas';go('ventas')">Ventas</button>
    <button class="${tipo==='cesiones'?'on':''}" onclick="_seg['ven_tipo']='cesiones';go('ventas')">Cesiones</button>
  </div>`

  if (tipo === 'cesiones') return tipoSel + await _pgCesiones()

  const modo = _seg['ven_modo'] || 'mes'
  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
  const fmt = v => '$'+Math.round(v).toLocaleString('es-CO')
  const fd  = ts => { const d=new Date(ts); return d.getDate()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear() }
  const now = new Date()

  // Selector de período
  const selMes   = _seg['ven_mes']  ?? now.getMonth()
  const selAnio  = _seg['ven_anio'] ?? now.getFullYear()
  const anios    = []
  for (let y=now.getFullYear(); y>=now.getFullYear()-5; y--) anios.push(y)

  const segModo = `<div class="seg mb10">
    <button class="${modo==='mes'?'on':''}"  onclick="_seg['ven_modo']='mes';go('ventas')">Mes</button>
    <button class="${modo==='anio'?'on':''}" onclick="_seg['ven_modo']='anio';go('ventas')">Año</button>
    <button class="${modo==='todo'?'on':''}" onclick="_seg['ven_modo']='todo';go('ventas')">Todo</button>
  </div>`

  let selector = ''
  if (modo === 'mes') {
    selector = `<div style="display:flex;gap:8px;margin-bottom:12px">
      <select class="inp" style="flex:1" onchange="_seg['ven_mes']=parseInt(this.value);go('ventas')">
        ${MESES.map((m,i)=>`<option value="${i}" ${i===selMes?'selected':''}>${m}</option>`).join('')}
      </select>
      <select class="inp" style="width:90px" onchange="_seg['ven_anio']=parseInt(this.value);go('ventas')">
        ${anios.map(y=>`<option value="${y}" ${y===selAnio?'selected':''}>${y}</option>`).join('')}
      </select>
    </div>`
  } else if (modo === 'anio') {
    selector = `<div style="margin-bottom:12px">
      <select class="inp" style="width:100px" onchange="_seg['ven_anio']=parseInt(this.value);go('ventas')">
        ${anios.map(y=>`<option value="${y}" ${y===selAnio?'selected':''}>${y}</option>`).join('')}
      </select>
    </div>`
  }

  // Obtener todos los vendidos y filtrar
  const todos = (await db.animales.where('activo').equals(0).toArray()).filter(a => a.causaBaja === 'Venta')
  const filtrados = todos.filter(a => {
    if (!a.fechaBaja) return modo === 'todo'
    const d = new Date(a.fechaBaja)
    if (modo === 'mes')  return d.getMonth()===selMes && d.getFullYear()===selAnio
    if (modo === 'anio') return d.getFullYear()===selAnio
    return true
  })
  filtrados.sort((a,b)=>(b.fechaBaja||0)-(a.fechaBaja||0))

  if (!filtrados.length) {
    return tipoSel + segModo + selector + `<div class="empty">
      <div class="eico">💰</div>
      <p>Sin ventas en este perío do</p>
      <p class="xs gray mt8">Usa el botón <strong>+ Venta</strong> para registrar.</p>
    </div>`
  }

  // KPIs del período
  let totalValor=0, totalCosto=0, totalGanPeso=0, nV=0, nC=0
  for (const a of filtrados) {
    if (a.valorVenta)   { totalValor += a.valorVenta; nV++ }
    if (a.precioPorKg && a.pesoInicial) { totalCosto += a.precioPorKg*a.pesoInicial; nC++ }
    if (a.pesoVenta && a.pesoInicial)   totalGanPeso += (a.pesoVenta - a.pesoInicial)
  }
  const utilidad = totalValor - totalCosto
  const rentPct  = totalCosto > 0 ? (utilidad/totalCosto*100) : null
  const colU = utilidad >= 0 ? '#2E7D32' : '#C62828'

  const kpis = `<div class="card card-dark mb12">
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px">
      <div style="text-align:center">
        <p style="font-size:1.4rem;font-weight:800">${filtrados.length}</p>
        <p class="sub xs">Animales vendidos</p>
      </div>
      <div style="text-align:center">
        <p style="font-size:1.4rem;font-weight:800">${totalGanPeso>=0?'+':''}${Math.round(totalGanPeso).toLocaleString('es-CO')} kg</p>
        <p class="sub xs">Ganancia de peso</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
      <div><p style="font-weight:700;font-size:.9rem">${nV?fmt(totalValor):'—'}</p><p class="sub xs">Ventas</p></div>
      <div><p style="font-weight:700;font-size:.9rem">${nC?fmt(totalCosto):'—'}</p><p class="sub xs">Costo</p></div>
      <div><p style="font-weight:800;font-size:.9rem;color:${colU}">${nV&&nC?(utilidad>=0?'+':'')+fmt(utilidad):'—'}</p><p class="sub xs">Utilidad</p></div>
    </div>
    ${rentPct!==null?`<div style="text-align:center;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.15)">
      <p style="font-size:1.1rem;font-weight:800;color:${rentPct>=0?'#A5D6A7':'#EF9A9A'}">${rentPct>=0?'+':''}${rentPct.toFixed(1)}% rentabilidad</p>
    </div>`:''}
  </div>`

  // Botones export
  const exportBtns = `<div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn btn-sm btn-gray" style="flex:1" onclick="exportarVentasPDF()">📄 PDF</button>
    <button class="btn btn-sm btn-gray" style="flex:1" onclick="exportarVentasExcel()">📊 Excel</button>
  </div>`

  // Agrupar por TRANSACCIÓN (fecha + comprador)
  const txMap = {}
  for (const a of filtrados) {
    const dateKey = a.fechaBaja ? new Date(a.fechaBaja).toISOString().slice(0,10) : '0000-00-00'
    const buyKey  = (a.comprador||'').trim().toLowerCase()
    const txKey   = dateKey + '|' + buyKey
    if (!txMap[txKey]) txMap[txKey] = { fechaBaja: a.fechaBaja, comprador: a.comprador||null, items: [] }
    txMap[txKey].items.push(a)
  }
  const txList = Object.values(txMap).sort((a,b) => (b.fechaBaja||0)-(a.fechaBaja||0))

  // Botón eliminar seleccionados
  const barraElim = `<div id="vt-barra-elim" style="display:none;background:#FFEBEE;border:1.5px solid #EF9A9A;border-radius:10px;padding:8px 12px;margin-bottom:10px;align-items:center;justify-content:space-between">
    <span class="xs bold" style="color:#C62828" id="vt-barra-cnt">0 seleccionadas</span>
    <div style="display:flex;gap:8px">
      <button onclick="vtDeselAll()" style="border:1.5px solid #C62828;background:white;color:#C62828;border-radius:8px;padding:4px 10px;font-size:.75rem;font-weight:700;cursor:pointer">Cancelar</button>

    </div>

  let lista = ''

    const txValor    = tx.items.reduce((s,a) => s+(a.valorVenta||0), 0)
    const txAnimales = tx.items.length

    const txPxkg     = txPeso > 0 ? Math.round(txValor/txPeso) : null
    const txFecha    = tx.fechaBaja ? fd(tx.fechaBaja) : 'Sin fecha'

    const innerRows = tx.items.map(a => {
      const valV = a.valorVenta || 0
      return `<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0">

      <button onclick="vtToggleTx(this)" style="display:flex;align-items:center;gap:10px;width:100%;border:none;background:white;padding:13px 14px;text-align:left;cursor:pointer;-webkit-tap-highlight-color:transparent">

          <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
            <p style="font-size:1rem;font-weight:800;color:#1a1a1a">${fmt(txValor)}</p>
            <p style="font-size:.75rem;color:#888">${txAnimales} animal${txAnimales>1?'es':''} · ${Math.round(txPeso)} kg${txPxkg?' · $'+Math.round(txPxkg).toLocaleString('es-CO')+'/kg':''}</p>
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:3px;flex-wrap:wrap">
            <span style="font-size:.78rem;font-weight:700;color:#388E3C;background:#E8F5E9;border-radius:6px;padding:2px 8px">${txFecha}</span>
            ${tx.comprador?'<span style="font-size:.75rem;color:#666">👤 '+tx.comprador+'</span>':''}
          </div>
        </div>
        <span class="vt-tx-ico" style="font-size:1.1rem;color:#aaa;flex-shrink:0;transition:transform .2s">▾</span>
      </button>
      <div class="vt-tx-detail" style="display:none;padding:0 14px 4px">
        ${innerRows}
      </div>
    </div>`
  }

  setTimeout(() => vtRestaurarSel(), 0)
  return tipoSel + segModo + selector + kpis + exportBtns + barraElim + lista
}

function vtToggleTx(btn) {

function vtToggleSel(id, btn) {

function vtDeselAll() {
  for (const id of _vtSel) {

    if (chk) { chk.classList.remove('vt-chk-on'); chk.innerHTML='' }

async function vtConfElim() {
  if (!_vtSel.size) return
  const n = _vtSel.size
  const ok = await showConfirm(`¿Eliminar ${n} venta${n>1?'s':''}? Los animales quedarán activos nuevamente.`)
  if (!ok) return
  const ids = [..._vtSel]
  try {
    for (const id of ids) {
      await fsUpdate('animales', id, {
        activo:1, causaBaja:null, fechaBaja:null, obsBaja:null,
        pesoVenta:null, valorVenta:null, precioVentaKg:null, comprador:null
      })
    }
    _vtSel.clear()
    showToast(`✅ ${n} venta${n>1?'s':''} eliminada${n>1?'s':''}`, 'ok', 3000)
    go('ventas')
  } catch(e) {
    showToast('Error al eliminar','err',4000)
  }
}

async function _pgCesiones() {
  const modo = _seg['ven_modo'] || 'mes'
  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
  const fd  = ts => { const d=new Date(ts); return d.getDate()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear() }
  const now = new Date()
  const selMes  = _seg['ven_mes']  ?? now.getMonth()
  const selAnio = _seg['ven_anio'] ?? now.getFullYear()
  const anios = []; for (let y=now.getFullYear(); y>=now.getFullYear()-5; y--) anios.push(y)

  const segModo = `<div class="seg mb10">
    <button class="${modo==='mes'?'on':''}"  onclick="_seg['ven_modo']='mes';go('ventas')">Mes</button>
    <button class="${modo==='anio'?'on':''}" onclick="_seg['ven_modo']='anio';go('ventas')">Año</button>
    <button class="${modo==='todo'?'on':''}" onclick="_seg['ven_modo']='todo';go('ventas')">Todo</button>
  </div>`

  let selector = ''
  if (modo === 'mes') {
    selector = `<div style="display:flex;gap:8px;margin-bottom:12px">
      <select class="inp" style="flex:1" onchange="_seg['ven_mes']=parseInt(this.value);go('ventas')">
        ${MESES.map((m,i)=>`<option value="${i}" ${i===selMes?'selected':''}>${m}</option>`).join('')}
      </select>
      <select class="inp" style="width:90px" onchange="_seg['ven_anio']=parseInt(this.value);go('ventas')">
        ${anios.map(y=>`<option value="${y}" ${y===selAnio?'selected':''}>${y}</option>`).join('')}
      </select>
    </div>`
  } else if (modo === 'anio') {
    selector = `<div style="margin-bottom:12px">
      <select class="inp" style="width:100px" onchange="_seg['ven_anio']=parseInt(this.value);go('ventas')">
        ${anios.map(y=>`<option value="${y}" ${y===selAnio?'selected':''}>${y}</option>`).join('')}
      </select>
    </div>`
  }

  const todos = (await db.animales.where('activo').equals(0).toArray()).filter(a => a.causaBaja === 'Cesión')
  const filtrados = todos.filter(a => {
    if (!a.fechaBaja) return modo === 'todo'
    const d = new Date(a.fechaBaja)
    if (modo === 'mes')  return d.getMonth()===selMes && d.getFullYear()===selAnio
    if (modo === 'anio') return d.getFullYear()===selAnio
    return true
  })
  filtrados.sort((a,b)=>(b.fechaBaja||0)-(a.fechaBaja||0))

  if (!filtrados.length) {
    return segModo + selector + `<div class="empty"><div class="eico">🔄</div><p>Sin cesiones en este perío do</p></div>`
  }

  // Agrupar por fecha
  const txMap = {}
  for (const a of filtrados) {
    const dateKey = a.fechaBaja ? new Date(a.fechaBaja).toISOString().slice(0,10) : '0000-00-00'
    if (!txMap[dateKey]) txMap[dateKey] = { fechaBaja: a.fechaBaja, items: [] }
    txMap[dateKey].items.push(a)
  }
  const txList = Object.values(txMap).sort((a,b) => (b.fechaBaja||0)-(a.fechaBaja||0))

  let lista = ''
  for (const tx of txList) {
    const txAnimales = tx.items.length
    const txFecha    = tx.fechaBaja ? fd(tx.fechaBaja) : 'Sin fecha'
    const innerRows  = tx.items.map(a => `
      <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0f0">
        <div style="flex:1;min-width:0">
          <p style="font-size:.85rem;font-weight:700">${a.arete}${a.nombre?' <span style="font-weight:400;color:#888">— '+a.nombre+'</span>':''}</p>
          <p style="font-size:.72rem;color:#aaa">${a.categoria||''} · ${a.obsBaja||''}</p>
        </div>
      </div>`).join('')

    lista += `<div class="card mb10" style="padding:0;overflow:hidden">
      <button onclick="vtToggleTx(this)" style="display:flex;align-items:center;gap:10px;width:100%;border:none;background:white;padding:13px 14px;text-align:left;cursor:pointer;-webkit-tap-highlight-color:transparent">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:baseline;gap:8px">
            <p style="font-size:.78rem;font-weight:700;color:#388E3C;background:#E8F5E9;border-radius:6px;padding:2px 8px">${txFecha}</p>
            <p style="font-size:.75rem;color:#888">${txAnimales} animal${txAnimales>1?'es':''}</p>
          </div>
        </div>
        <span class="vt-tx-ico" style="font-size:1.1rem;color:#aaa;flex-shrink:0;transition:transform .2s">▾</span>
      </button>
      <div class="vt-tx-detail" style="display:none;padding:0 14px 4px">${innerRows}</div>
    </div>`
  }
  return segModo + selector + lista
}

let _rvSelMode = false       // true mientras el usuario está en la pantalla de selección de animales para venta
let _rvSel = new Set()       // IDs seleccionados
let _rvAnimales = []         // todos los activos cargados
let _rvFiltrados = []        // después de búsqueda en pestaña animal
let _rvModoPrecio = 'pxkg'  // 'pxkg' | 'total' | 'cabeza'
let _rvPesos = {}            // { [id]: kg } pesos editados en modo pxkg
let _rvTab = 'lotes'         // 'lotes' | 'animales'
let _rvLotes = []            // lotes con sus animales para pestaña lotes
let _rvLoteExp = new Set()   // IDs de lotes expandidos

async function _rvCargarAnimales() {
  const activos = await db.animales.where('activo').equals(1).toArray()
  const lotes = await db.lotes.where('activo').equals(1).toArray()
  const loteMap = Object.fromEntries(lotes.map(l=>[l.id, l]))
  _rvAnimales = await Promise.all(activos.map(async a => {
    const ult = await getPesoActual(a.id)
    return { ...a, _pesoAct: ult?.pesoKg || a.pesoInicial || 0, _loteNom: a.loteId ? (loteMap[a.loteId]?.nombre||'Sin lote') : 'Sin lote' }
  }))
  _rvAnimales.sort((a,b) => a._loteNom.localeCompare(b._loteNom) || a.arete.localeCompare(b.arete))
  // Construir estructura de lotes para pestaña lotes
  const loteIdx = {}
  for (const a of _rvAnimales) {
    const k = a.loteId || 0
    if (!loteIdx[k]) loteIdx[k] = { id: k, nombre: a._loteNom, animales: [] }
    loteIdx[k].animales.push(a)
  }
  _rvLotes = Object.values(loteIdx).sort((a,b) => a.nombre.localeCompare(b.nombre))
}

  const pg = $('pg')

function rvRenderTabLotes() {
  const el = document.getElementById('rv-cuerpo')
  if (!el) return
  if (!_rvLotes.length) { el.innerHTML = '<div class="empty"><p>Sin lotes activos</p></div>'; return }
  let html = ''
  for (const lote of _rvLotes) {
    const ids = lote.animales.map(a=>a.id)
    const selCount = ids.filter(id=>_rvSel.has(id)).length
    const todosSelLote = selCount === ids.length
    const exp = _rvLoteExp.has(lote.id)
    html += `<div style="border-radius:12px;overflow:hidden;margin-bottom:8px;border:1.5px solid ${todosSelLote?'#A5D6A7':selCount>0?'#FFD54F':'#e0e0e0'}">
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:${todosSelLote?'#E8F5E9':selCount>0?'#FFFDE7':'#f8f8f8'};cursor:pointer" onclick="rvToggleExpLote(${lote.id})">
        <div style="flex:1;min-width:0">
          <p style="font-size:.9rem;font-weight:700">${lote.nombre}</p>
          <p style="font-size:.72rem;color:#888">${ids.length} animal${ids.length!==1?'es':''} · ${selCount} seleccionado${selCount!==1?'s':''}</p>
        </div>
        <button onclick="event.stopPropagation();rvToggleLote(${lote.id})"
          style="border:none;border-radius:8px;padding:6px 11px;font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;
          background:${todosSelLote?'#C62828':'#2E7D32'};color:white">
          ${todosSelLote?'✕ Quitar':'✓ Todos'}
        </button>
        <span style="font-size:.85rem;color:#999;margin-left:2px">${exp?'▲':'▼'}</span>
      </div>`
    if (exp) {
      html += `<div style="border-top:1px solid #e8e8e8">`
      for (const a of lote.animales) {
        const sel = _rvSel.has(a.id)
        html += `<button onclick="rvToggle(${a.id})" style="display:flex;align-items:center;gap:10px;padding:8px 12px;width:100%;border:none;border-bottom:1px solid #f4f4f4;background:${sel?'#F1F8E9':'white'};text-align:left;cursor:pointer;-webkit-tap-highlight-color:transparent">
          <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${sel?'#2E7D32':'#ccc'};background:${sel?'#2E7D32':'white'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
            ${sel?'<span style="color:white;font-size:11px;font-weight:700">✓</span>':''}
          </div>
          <div style="flex:1;min-width:0;text-align:left">
            <p style="font-size:.83rem;font-weight:700">${a.arete}${a.nombre?' <span style="font-weight:400;color:#888">— '+a.nombre+'</span>':''} <span style="font-size:.63rem;background:#E3F2FD;color:#1565C0;border-radius:4px;padding:1px 5px">${a.categoria||''}</span></p>
            <p style="font-size:.7rem;color:#888">${a.raza||''}</p>
          </div>
          <p style="font-size:.82rem;font-weight:700;color:#333;flex-shrink:0">${a._pesoAct.toFixed(1)} kg</p>
        </button>`
      }
      html += `</div>`
    }
    html += `</div>`
  }
  el.innerHTML = html
}

function rvRenderTabAnimales() {
  const el = document.getElementById('rv-cuerpo')
  if (!el) return
  el.innerHTML = `
    <input id="rv-bus" class="inp" placeholder="🔍 Buscar por arete, nombre o lote…" oninput="rvFiltrar()" autocomplete="off" style="margin-bottom:8px">

}

function rvToggleExpLote(loteId) {
  if (_rvLoteExp.has(loteId)) _rvLoteExp.delete(loteId)
  else _rvLoteExp.add(loteId)
  rvRenderTabLotes()
}

function rvToggleLote(loteId) {
  const lote = _rvLotes.find(l=>l.id===loteId)
  if (!lote) return
  const ids = lote.animales.map(a=>a.id)
  const todos = ids.every(id=>_rvSel.has(id))
  if (todos) ids.forEach(id=>_rvSel.delete(id))
  else ids.forEach(id=>_rvSel.add(id))
  _rvRenderPag()
}

async function openVentaDesdeLote(loteId) {
  loteId = parseInt(loteId)

  _rvModoPrecio = 'pxkg'
  _rvPesos = {}
  _rvFiltrados = []

  if (!activos.length) { showToast('No hay animales activos','err'); return }
  await _rvCargarAnimales()
  // Seleccionar todos los del lote
  const lote = _rvLotes.find(l=>l.id===loteId)
  if (lote) lote.animales.forEach(a=>_rvSel.add(a.id))
  _rvRenderPag()
}

function rvCancelarBusqueda() {

  _rvSel = new Set(); _rvPesos = {}; _rvFiltrados = []; _rvLoteExp = new Set()
  go('ventas')
}

function rvFiltrar() {
  const q = (document.getElementById('rv-bus')?.value||'').toLowerCase().trim()
  if (!q) {
    _rvFiltrados = []
    const cnt = document.getElementById('rv-ncnt')
    if (cnt) cnt.textContent = 'Escribe para buscar'
    const el = document.getElementById('rv-lista')
    if (el) el.innerHTML = ''
    rvUpdBtnContinuar()
    return
  }
  _rvFiltrados = _rvAnimales.filter(a =>
    a.arete.toLowerCase().includes(q) ||
    (a.nombre||'').toLowerCase().includes(q) ||
    a._loteNom.toLowerCase().includes(q)
  ).slice(0, 60)
  rvRenderLista()
}

function rvRenderLista() {
  const el = document.getElementById('rv-lista')
  if (!el) return
  if (!_rvFiltrados.length) { el.innerHTML = '<p class="xs gray" style="padding:12px;text-align:center">Sin resultados</p>'; return }
  // Agrupar por lote
  const grupos = {}
  for (const a of _rvFiltrados) {
    if (!grupos[a._loteNom]) grupos[a._loteNom] = []
    grupos[a._loteNom].push(a)
  }
  let html = ''
  for (const [lnom, animals] of Object.entries(grupos)) {
    html += `<div style="padding:6px 10px;background:#f5f5f5;font-size:.72rem;font-weight:700;color:#555;letter-spacing:.04em;text-transform:uppercase">${lnom}</div>`
    for (const a of animals) {
      const sel = _rvSel.has(a.id)
      html += `<button onclick="rvToggle(${a.id})" style="display:flex;align-items:center;gap:10px;padding:9px 12px;width:100%;border:none;border-bottom:1px solid #f0f0f0;background:${sel?'#E8F5E9':'white'};text-align:left;cursor:pointer;-webkit-tap-highlight-color:transparent">
        <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${sel?'#2E7D32':'#ccc'};background:${sel?'#2E7D32':'white'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${sel?'<span style="color:white;font-size:12px;font-weight:700;line-height:1">✓</span>':''}
        </div>
        <div style="flex:1;min-width:0;text-align:left">
          <p style="font-size:.85rem;font-weight:700">${a.arete}${a.nombre?' <span style="font-weight:400;color:#888">— '+a.nombre+'</span>':''} <span style="font-size:.65rem;background:#E3F2FD;color:#1565C0;border-radius:4px;padding:1px 5px">${a.categoria||''}</span></p>
          <p style="font-size:.72rem;color:#888">${a.raza||''}</p>
        </div>
        <p style="font-size:.82rem;font-weight:700;color:#333;flex-shrink:0">${a._pesoAct.toFixed(1)} kg</p>
      </button>`
    }
  }
  el.innerHTML = html
  rvUpdContador()
  rvUpdBtnContinuar()
}

function rvToggle(id) {
  if (_rvSel.has(id)) _rvSel.delete(id); else _rvSel.add(id)
  if (_rvTab === 'lotes') {
    rvRenderTabLotes()
    rvUpdChips()
    rvUpdBtnContinuar()
    rvUpdSelPreviaCount()
  } else {
    rvRenderLista()
    rvUpdChips()
    rvUpdBtnContinuar()
    rvUpdSelPreviaCount()
  }
}

function rvUpdBtnContinuar() {
  const s = _rvSel.size
  const el = document.getElementById('rv-btn-continuar')
  if (!el) return
  el.innerHTML = s > 0 ? `<button onclick="rvAbrirSheet()" class="btn btn-g btn-sm">Continuar (${s}) →</button>` : ''
}

function rvUpdSelPreviaCount() {
  const el = document.querySelector('#rv-sel-previa > p.xs')
  if (!el) return
  const s = _rvSel.size
  const wrap = document.getElementById('rv-sel-previa')
  if (wrap) wrap.style.display = s ? '' : 'none'
  el.textContent = `✓ Seleccionados (${s})`
}

function rvUpdChips() {
  const wrap = document.getElementById('rv-sel-previa')
  const chips = document.getElementById('rv-sel-chips')
  if (!wrap || !chips) return
  if (!_rvSel.size) { wrap.style.display='none'; return }
  wrap.style.display='block'

  chips.innerHTML = selAni.map(a =>
    `<span style="display:inline-flex;align-items:center;gap:5px;background:#E8F5E9;border:1px solid #A5D6A7;border-radius:20px;padding:4px 10px;font-size:.78rem;font-weight:700;color:#1B5E20">
      ${a.arete}
      <button onclick="rvToggle(${a.id})" style="border:none;background:none;color:#C62828;font-size:.85rem;font-weight:700;cursor:pointer;padding:0;line-height:1">✕</button>
    </span>`
  ).join('')
}



function rvUpdContador() {
  const el = document.getElementById('rv-ncnt')
  if (!el) return
  const n = _rvFiltrados.length
  const s = _rvSel.size
  el.textContent = n === 0 ? 'Sin resultados' :
    `${n} resultado${n>1?'s':''}${s>0?' · '+s+' seleccionado'+(s>1?'s':''):''}`
}

function rvGetPeso(a) {
  return (_rvPesos[a.id] !== undefined) ? _rvPesos[a.id] : a._pesoAct
}

function rvPesoInput(id, val) {
  const v = parseFloat(String(val).replace(',','.'))
  if (!isNaN(v) && v > 0) _rvPesos[id] = v
  else delete _rvPesos[id]
  rvUpdResumen()
  // Actualizar solo el total del pie sin re-renderizar toda la lista
  const selAni = _rvAnimales.filter(a => _rvSel.has(a.id))
  const pesoTot = selAni.reduce((s,a) => s + rvGetPeso(a), 0)
  const totEl = document.getElementById('rv-sel-total')
  if (totEl) totEl.textContent = pesoTot.toLocaleString('es-CO',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' kg total'
}

function rvUpdSeleccionados() {
  const lista = document.getElementById('rv-sel-lista')
  if (!lista) return
  const selAni  = _rvAnimales.filter(a => _rvSel.has(a.id))
  const pesoTot = selAni.reduce((s,a) => s + rvGetPeso(a), 0)
  const fmtKg   = v => v.toLocaleString('es-CO', {minimumFractionDigits:1, maximumFractionDigits:1})
  const modoKg  = _rvModoPrecio === 'pxkg'
  lista.innerHTML = selAni.map((a,i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 12px;${i<selAni.length-1?'border-bottom:1px solid #E8F5E9':''}">
      <button onclick="rvToggle(${a.id});rvUpdSeleccionados();rvUpdResumen()" style="border:none;background:#FFEBEE;color:#C62828;border-radius:50%;width:22px;height:22px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1">✕</button>
      <div style="flex:1;min-width:0">
        <p style="font-size:.83rem;font-weight:700">${a.arete}${a.nombre?' <span style="font-weight:400;color:#888">'+a.nombre+'</span>':''}</p>
        <p style="font-size:.7rem;color:#888">${a._loteNom} · ${a.categoria||''}</p>
      </div>
      ${modoKg
        ? `<div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
             <input type="text" inputmode="decimal"
               value="${fmtKg(rvGetPeso(a))}"
               oninput="rvPesoInput(${a.id},this.value)"
               style="width:72px;border:1.5px solid #A5D6A7;border-radius:8px;padding:5px 6px;font-size:.82rem;font-weight:700;color:#1B5E20;text-align:right;background:white">
             <span style="font-size:.72rem;color:#888">kg</span>
           </div>`
        : `<p style="font-size:.85rem;font-weight:700;color:#2E7D32;flex-shrink:0">${fmtKg(a._pesoAct)} kg</p>`
      }
    </div>`).join('') +
    `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#E8F5E9;border-top:1.5px solid #A5D6A7">
      <span style="font-size:.78rem;font-weight:700;color:#1B5E20">${selAni.length} animal${selAni.length>1?'es':''}</span>
      <span id="rv-sel-total" style="font-size:.85rem;font-weight:800;color:#1B5E20">${fmtKg(pesoTot)} kg total</span>
    </div>`
}

function rvSetModo(modo) {
  _rvModoPrecio = modo
  const wrap = document.getElementById('rv-precio-wrap')
  const tabPxkg   = document.getElementById('rv-tab-pxkg')
  const tabTotal  = document.getElementById('rv-tab-total')
  const tabCabeza = document.getElementById('rv-tab-cabeza')
  if (!wrap) return
  tabPxkg?.classList.remove('on'); tabTotal?.classList.remove('on'); tabCabeza?.classList.remove('on')
  if (modo === 'pxkg') {
    tabPxkg?.classList.add('on')
    wrap.innerHTML = `<div class="field"><label>Precio por kg * <span class="xs gray">(valor individual = $/kg × peso)</span></label>
      <div class="inp-wrap"><input id="rv-pxkg" class="inp" type="text" inputmode="decimal" placeholder="$/kg" oninput="rvUpdResumen()"><span class="inp-suf">$/kg</span></div></div>`
  } else if (modo === 'total') {
    tabTotal?.classList.add('on')
    wrap.innerHTML = `<div class="field"><label>Valor total de la venta * <span class="xs gray">(se distribuye entre animales por peso)</span></label>
      <div class="inp-wrap"><span class="inp-suf" style="left:10px;right:auto">$</span><input id="rv-vtotal" class="inp" type="text" inputmode="decimal" placeholder="Total $" style="padding-left:28px" oninput="rvUpdResumen()"></div></div>`
  } else {
    tabCabeza?.classList.add('on')
    wrap.innerHTML = `<div class="field"><label>Valor por cabeza * <span class="xs gray">(mismo precio para cada animal, sin importar el peso)</span></label>
      <div class="inp-wrap"><span class="inp-suf" style="left:10px;right:auto">$</span><input id="rv-vcabeza" class="inp" type="text" inputmode="decimal" placeholder="$ por animal" style="padding-left:28px" oninput="rvUpdResumen()"></div></div>`
  }
  rvUpdSeleccionados()
  rvUpdResumen()
}

function rvUpdResumen() {
  const resDiv  = document.getElementById('rv-resumen')
  const resBdy  = document.getElementById('rv-resumen-body')
  if (!resDiv || !resBdy) return
  if (!_rvSel.size) { resDiv.style.display='none'; return }
  const selAni  = _rvAnimales.filter(a => _rvSel.has(a.id))
  const pesoTot = selAni.reduce((s,a) => s + rvGetPeso(a), 0)
  let totalVenta = 0, pxkgProm = 0
  if (_rvModoPrecio === 'pxkg') {
    const pxkg = parseFloat((document.getElementById('rv-pxkg')?.value||'').replace(',','.')) || 0
    totalVenta = pxkg * pesoTot
    pxkgProm = pxkg
  } else if (_rvModoPrecio === 'total') {
    const vt = parseFloat((document.getElementById('rv-vtotal')?.value||'').replace(',','.')) || 0
    totalVenta = vt
    pxkgProm = pesoTot > 0 ? vt / pesoTot : 0
  } else {
    const vc = parseFloat((document.getElementById('rv-vcabeza')?.value||'').replace(',','.')) || 0
    totalVenta = vc * selAni.length
    pxkgProm = pesoTot > 0 ? totalVenta / pesoTot : 0
  }
  if (!totalVenta) { resDiv.style.display='none'; return }
  // Costo total
  let costoTot = 0
  for (const a of selAni) if (a.precioPorKg && a.pesoInicial) costoTot += a.precioPorKg * a.pesoInicial
  const util = costoTot > 0 ? totalVenta - costoTot : null
  const fmt = v => '$'+Math.round(v).toLocaleString('es-CO')
  resDiv.style.display = 'block'
  resDiv.style.background = (util===null||util>=0) ? '#F1F8E9' : '#FFEBEE'
  resBdy.style.color = (util===null||util>=0) ? '#1B5E20' : '#B71C1C'
  resBdy.innerHTML = `
    <div style="display:flex;justify-content:space-between"><span>Animales</span><strong>${selAni.length}</strong></div>
    <div style="display:flex;justify-content:space-between"><span>Peso total</span><strong>${pesoTot.toFixed(1)} kg</strong></div>
    ${_rvModoPrecio==='cabeza'?`<div style="display:flex;justify-content:space-between"><span>Precio por cabeza</span><strong>${fmt(totalVenta/selAni.length)}</strong></div>`:`<div style="display:flex;justify-content:space-between"><span>Precio prom.</span><strong>${fmt(pxkgProm)}/kg</strong></div>`}
    <div style="display:flex;justify-content:space-between;border-top:1px solid rgba(0,0,0,.08);margin-top:4px;padding-top:4px"><span>Total venta</span><strong>${fmt(totalVenta)}</strong></div>
    ${util!==null?`<div style="display:flex;justify-content:space-between"><span>Utilidad estimada</span><strong>${util>=0?'+':''}${fmt(util)}</strong></div>`:''}
  `
}

// Auto-descanso: lote vacío → potrero EN_DESCANSO
async function checkLoteVacio(loteIds, fechaTs) {
  const ids = [...new Set(loteIds.filter(Boolean))]
  for (const loteId of ids) {
    const restantes = await db.animales.where({ activo: 1, loteId }).count()
    if (restantes > 0) continue
    const ciclo = await db.ciclos.where({ loteId, activo: 1 }).first()
    if (!ciclo) continue
    await fsUpdate('ciclos', ciclo.id, { activo: 0, fechaSalida: fechaTs || Date.now() })
    await fsUpdate('potreros', ciclo.potreroId, {
      estado: 'EN_DESCANSO', numAnimales: 0,
      loteActual: null, fechaSalida: fechaTs || Date.now()
    })
    const potrero = await db.potreros.get(ciclo.potreroId)
    const nomPot = potrero ? potrero.nombre : 'potrero'
    showToast('🌿 ' + nomPot + ' pasó a descanso (lote vacío)', 'ok', 4000)
  }
}

async function guardarVenta() {
  if (!_rvSel.size) { showToast('Selecciona al menos un animal','err'); return }
  const fechaStr  = document.getElementById('rv-fecha')?.value
  const comprador = document.getElementById('rv-comprador')?.value?.trim()||''
  const obs       = document.getElementById('rv-obs')?.value?.trim()||''
  if (!fechaStr) { showToast('Indica la fecha de venta','err'); return }

  const selAni  = _rvAnimales.filter(a => _rvSel.has(a.id))
  const pesoTot = selAni.reduce((s,a) => s + rvGetPeso(a), 0)
  let pxkg = 0, totalVenta = 0, vcabeza = 0
  if (_rvModoPrecio === 'pxkg') {
    pxkg = parseFloat((document.getElementById('rv-pxkg')?.value||'').replace(',','.')) || 0
    if (!pxkg) { showToast('Indica el precio por kg','err'); return }
    totalVenta = pxkg * pesoTot
  } else if (_rvModoPrecio === 'total') {
    totalVenta = parseFloat((document.getElementById('rv-vtotal')?.value||'').replace(',','.')) || 0
    if (!totalVenta) { showToast('Indica el valor total de la venta','err'); return }
    pxkg = pesoTot > 0 ? totalVenta / pesoTot : 0
  } else {
    vcabeza = parseFloat((document.getElementById('rv-vcabeza')?.value||'').replace(',','.')) || 0
    if (!vcabeza) { showToast('Indica el valor por cabeza','err'); return }
    totalVenta = vcabeza * selAni.length
    pxkg = pesoTot > 0 ? totalVenta / pesoTot : 0
  }

  const btn = document.getElementById('rv-btn')
  if (btn) { btn.disabled=true; btn.textContent=`Guardando ${selAni.length} animal${selAni.length>1?'es':''}…` }
  const fechaBaja = new Date(fechaStr+'T00:00:00').getTime()

  const _vtLoteIds = selAni.map(a => a.loteId).filter(Boolean)
  const ahora = Date.now(), quien = USER?.nombre||'—'
  try {
    for (const a of selAni) {
      const pesoVenta = rvGetPeso(a)
      const valorVenta = _rvModoPrecio === 'pxkg'
        ? Math.round(pxkg * pesoVenta)
        : _rvModoPrecio === 'cabeza'
          ? Math.round(vcabeza)                              // mismo valor para cada uno
          : Math.round(totalVenta * (pesoVenta / pesoTot))  // distribución proporcional por peso
      const precioVentaKg = Math.round(valorVenta / pesoVenta)
      await fsUpdate('animales', a.id, {
        activo:0, causaBaja:'Venta', fechaBaja,
        pesoVenta, valorVenta, precioVentaKg,
        comprador: comprador||null,
        obsBaja: obs||null,
        loteId: null, fechaLote: null,
        loteIdSalida: a.loteId||null, loteNombreSalida: a.loteId?(a._loteNom||null):null
      })
      // Solo en modo "Por kilo" el peso es el que el usuario ingresó/confirmó al vender:
      // se guarda como pesaje real para que quede en el historial y en el rendimiento de la finca.
      if (_rvModoPrecio === 'pxkg') {
        const dup = await db.pesajes.where('animalId').equals(a.id).filter(p=>p.fecha===fechaBaja && p.pesoKg===pesoVenta).first()
        if (!dup) {
          await fsAdd('pesajes', {animalId:a.id, fecha:fechaBaja, pesoKg:pesoVenta, metodo:'BASCULA', cc:3, obs:'Pesaje de venta', registradoPor:quien, registradoEn:ahora})
        }
      }
    }
    await checkLoteVacio(_vtLoteIds, fechaBaja)
    _rvSelMode = false
    closeSheet()
    showToast(`✅ ${selAni.length} animal${selAni.length>1?'es':''} vendido${selAni.length>1?'s':''}`, 'ok', 3500)
    go('ventas')
  } catch(e) {
    showToast('Error: '+e.message,'err',4000)
    if (btn) { btn.disabled=false; btn.textContent='✓ Registrar venta' }
  }
}

function evCalcTotal() {

  const peso  = parseFloat((document.getElementById('ev-peso')?.value||'').replace(',','.')) || 0
  const el    = document.getElementById('ev-total')
  if (pxkg && peso && el) el.value = Math.round(pxkg * peso)
}

function evCalcPxkg() {

  const peso  = parseFloat((document.getElementById('ev-peso')?.value||'').replace(',','.')) || 0

async function saveEditarVenta(id) {
  const fechaStr  = document.getElementById('ev-fecha')?.value
  const pesoVenta = parseFloat((document.getElementById('ev-peso')?.value||'').replace(',','.')) || 0
  const pxkg      = parseFloat((document.getElementById('ev-pxkg')?.value||'').replace(',','.')) || 0
  const total     = parseFloat((document.getElementById('ev-total')?.value||'').replace(',','.')) || 0
  const comprador = document.getElementById('ev-comprador')?.value?.trim() || ''
  const obs       = document.getElementById('ev-obs')?.value?.trim() || ''

  if (!fechaStr) { showToast('Indica la fecha','err'); return }
  if (!pxkg && !total) { showToast('Indica el precio o el total','err'); return }

  const fechaBaja     = new Date(fechaStr+'T00:00:00').getTime()
  const valorVenta    = total || Math.round(pxkg * pesoVenta)
  const precioVentaKg = pxkg  || (pesoVenta ? Math.round(total / pesoVenta) : 0)

  const btn = document.getElementById('ev-btn')
  if (btn) { btn.disabled=true; btn.textContent='Guardando…' }

  const prev = await db.animales.get(id)
  try {
    await fsUpdate('animales', id, {
      fechaBaja,
      pesoVenta:   pesoVenta || null,
      valorVenta:  valorVenta || null,
      precioVentaKg: precioVentaKg || null,
      comprador:   comprador || null,
      obsBaja:     obs || null
    })
    pushUndo('Edición de venta', async () => {
      await fsUpdate('animales', id, {
        fechaBaja:    prev.fechaBaja,
        pesoVenta:    prev.pesoVenta    ?? null,
        valorVenta:   prev.valorVenta   ?? null,
        precioVentaKg:prev.precioVentaKg?? null,
        comprador:    prev.comprador    ?? null,
        obsBaja:      prev.obsBaja      ?? null
      })
    })
    closeSheet()
    showToast('✅ Venta actualizada','ok',3000)
    go('ventas')
  } catch(e) {
    showToast('Error: '+e.message,'err',4000)
    if (btn) { btn.disabled=false; btn.textContent='Guardar cambios' }
  }
}

// REPORTE DE RENDIMIENTO (activos + vendidos + bajas)
// ═══════════════════════════════════════════════════
async function calcRendimientoFilas(){
  const [animales, lotes, pesajesAll] = await Promise.all([
    db.animales.toArray(), db.lotes.toArray(), db.pesajes.orderBy('fecha').toArray()
  ])
  const loteMap = Object.fromEntries(lotes.map(l=>[l.id,l.nombre]))
  const psMap = {}
  for(const p of pesajesAll){ (psMap[p.animalId] ||= []).push(p) }  // ya vienen ordenados por fecha asc

  return animales.map(a=>{
    const ps = psMap[a.id]||[]
    const activo = a.activo===1
    const pesoInicial = a.pesoInicial || (ps.length?ps[0].pesoKg:0) || 0
    const ultimoPesaje = ps.length ? ps[ps.length-1].pesoKg : null
    const pesoFinal = activo ? (ultimoPesaje ?? pesoInicial) : (a.pesoVenta ?? ultimoPesaje ?? pesoInicial)
    const fechaFin = activo ? Date.now() : (a.fechaBaja || Date.now())
    const fechaIni = a.fechaIngreso || (ps.length?ps[0].fecha:fechaFin)
    const dias = Math.max(1, Math.round((fechaFin-fechaIni)/86400000))
    const ganancia = pesoFinal - pesoInicial
    const gdp = Math.round(ganancia/dias*1000)
    const loteNom = activo ? (a.loteId ? (loteMap[a.loteId]||'Sin lote') : 'Sin lote') : (a.loteNombreSalida || 'Sin lote')
    const estado = activo ? 'activo' : (a.causaBaja==='Venta' ? 'vendido' : 'baja')
    return {a, pesoInicial, pesoFinal, dias, ganancia, gdp, loteNom, estado, nPesajes: ps.length}
  })
}

async function renderRendimiento(){
  const filas = await calcRendimientoFilas()

  return `<div class="seg mb10">

      <button class="${_rendTab==='detalle'?'on':''}" onclick="_rendTab='detalle';go('config')">🐄 Detalle por animal</button>
    </div>
    ${_rendTab==='resumen' ? rendRenderResumen(filas) : _rendTab==='periodos' ? rendRenderPeriodos(filas) : rendRenderDetalleWrap(filas)}`

function rendRenderPeriodos(filas){
  const vendidos = filas.filter(f=>f.estado==='vendido')
  if(!vendidos.length) return '<p class="xs gray" style="text-align:center;padding:20px">Sin ventas registradas</p>'

  // Últimos 4 semestres (2 años), del más reciente al más antiguo
  const ahora = new Date()
  let y = ahora.getFullYear(), s = ahora.getMonth() < 6 ? 1 : 2
  const semestres = []
  for(let i=0;i<4;i++){
    const inicio = new Date(s===1?y:y, s===1?0:6, 1).getTime()
    const finExcl = new Date(s===1?y:y+1, s===1?6:0, 1).getTime()
    semestres.push({label:`${y} · S${s}`, inicio, fin:finExcl})
    s--
    if(s===0){ s=2; y-- }
  }

  const bloques = semestres.map(sem=>{
    const anis = vendidos.filter(f => f.a.fechaBaja && f.a.fechaBaja>=sem.inicio && f.a.fechaBaja<sem.fin)
    const conD = anis.filter(f=>f.dias>0)
    const gdp = conD.length ? Math.round(conD.reduce((s,f)=>s+f.gdp,0)/conD.length) : null
    const kg = anis.reduce((s,f)=>s+f.pesoFinal,0)
    const ganancia = anis.reduce((s,f)=>s+f.ganancia,0)
    return {...sem, n:anis.length, gdp, kg, ganancia}
  })

  return bloques.map(p=>`<div class="card mb8">
      <div class="row-b mb6"><p class="bold">${p.label}</p><span class="xs gray">${p.n} vendido${p.n!==1?'s':''}</span></div>
      ${p.n ? `<div class="row-b"><span class="xs gray">GDP promedio</span><span class="xs bold">${p.gdp!==null?p.gdp+' g/día':'—'}</span></div>
      <div class="row-b"><span class="xs gray">Kg vendidos</span><span class="xs bold" style="color:#1565C0">${Math.round(p.kg).toLocaleString('es-CO')} kg</span></div>
      <div class="row-b"><span class="xs gray">Ganancia total</span><span class="xs bold" style="color:${p.ganancia>=0?'#2E7D32':'#C62828'}">${p.ganancia>=0?'+':''}${Math.round(p.ganancia).toLocaleString('es-CO')} kg</span></div>`
      : '<p class="xs gray">Sin ventas en este período</p>'}
    </div>`).join('')
}

function rendRenderResumen(filas){
  if(!filas.length) return '<p class="xs gray" style="text-align:center;padding:20px">Sin animales registrados</p>'
  const activos = filas.filter(f=>f.estado==='activo')
  const vendidos = filas.filter(f=>f.estado==='vendido')
  const bajas = filas.filter(f=>f.estado==='baja')
  const gananciaTotal = filas.reduce((s,f)=>s+f.ganancia,0)
  const conDias = filas.filter(f=>f.dias>0)
  const gdpProm = conDias.length ? Math.round(conDias.reduce((s,f)=>s+f.gdp,0)/conDias.length) : 0
  const pesoEnFinca = activos.reduce((s,f)=>s+f.pesoFinal,0)
  const kgVendidos = vendidos.reduce((s,f)=>s+f.pesoFinal,0)

  const grupos = {}
  for(const f of filas){ (grupos[f.loteNom] ||= []).push(f) }
  const gruposArr = Object.entries(grupos).sort((a,b)=>b[1].length-a[1].length)

  const cardsLotes = gruposArr.map(([nombre,anis])=>{
    const act = anis.filter(f=>f.estado==='activo')
    const sal = anis.filter(f=>f.estado!=='activo')
    const ven = anis.filter(f=>f.estado==='vendido')
    const gan = anis.reduce((s,f)=>s+f.ganancia,0)
    const conD = anis.filter(f=>f.dias>0)
    const gdp = conD.length ? Math.round(conD.reduce((s,f)=>s+f.gdp,0)/conD.length) : 0
    const pesoActivo = act.reduce((s,f)=>s+f.pesoFinal,0)
    const kgVend = ven.reduce((s,f)=>s+f.pesoFinal,0)
    return `<div class="card mb8">
      <div class="row-b mb6"><p class="bold">${nombre}</p><span class="xs gray">${anis.length} animal${anis.length>1?'es':''}</span></div>
      <div class="row-b"><span class="xs gray">Activos / Salidos</span><span class="xs bold">${act.length} / ${sal.length}</span></div>
      <div class="row-b"><span class="xs gray">Peso actual en finca</span><span class="xs bold">${Math.round(pesoActivo).toLocaleString('es-CO')} kg</span></div>
      ${ven.length?`<div class="row-b"><span class="xs gray">Kg vendidos</span><span class="xs bold" style="color:#1565C0">${Math.round(kgVend).toLocaleString('es-CO')} kg</span></div>`:''}
      <div class="row-b"><span class="xs gray">Ganancia total</span><span class="xs bold" style="color:${gan>=0?'#2E7D32':'#C62828'}">${gan>=0?'+':''}${Math.round(gan).toLocaleString('es-CO')} kg</span></div>
      <div class="row-b"><span class="xs gray">GDP promedio</span><span class="xs bold">${gdp} g/día</span></div>
    </div>`
  }).join('')

  return `<div class="card mb10" style="background:linear-gradient(135deg,#2E7D32,#1B5E20);color:white">
      <p class="xs" style="opacity:.85;margin-bottom:6px">RENDIMIENTO TOTAL DE LA FINCA</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><p style="font-size:1.3rem;font-weight:800">${filas.length}</p><p class="xs" style="opacity:.85">Animales (histórico)</p></div>
        <div><p style="font-size:1.3rem;font-weight:800">${gdpProm} g/d</p><p class="xs" style="opacity:.85">GDP promedio</p></div>
        <div><p style="font-size:1.3rem;font-weight:800">${Math.round(pesoEnFinca).toLocaleString('es-CO')} kg</p><p class="xs" style="opacity:.85">En finca (${activos.length})</p></div>
        <div><p style="font-size:1.3rem;font-weight:800">${Math.round(kgVendidos).toLocaleString('es-CO')} kg</p><p class="xs" style="opacity:.85">Vendidos (${vendidos.length})</p></div>
      </div>
      <div class="row-b" style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.25)">
        <span class="xs" style="opacity:.85">Ganancia total acumulada${bajas.length?' · '+bajas.length+' baja(s)':''}</span>
        <span class="bold">${gananciaTotal>=0?'+':''}${Math.round(gananciaTotal).toLocaleString('es-CO')} kg</span>
      </div>
    </div>
    <p class="sec">Por lote (incluye activos, vendidos y bajas)</p>
    ${cardsLotes}`
}

function rendFiltradas(){
  let f = _rendFilasCache || []
  if(_rendEstado!=='todos') f = f.filter(x=>x.estado===_rendEstado)
  if(_rendBusq){
    const q=_rendBusq.toLowerCase()
    f = f.filter(x=> x.a.arete.toLowerCase().includes(q) || (x.a.nombre||'').toLowerCase().includes(q) || x.loteNom.toLowerCase().includes(q))
  }
  return f
}

function rendDetalleListaHTML(){
  const filtradas = rendFiltradas()

  const lista = pag.length ? pag.map(rendCardAnimal).join('') : '<p class="xs gray" style="text-align:center;padding:20px">Sin animales para este filtro</p>'

  const vermas = hayMas ? `<button class="btn btn-gray mt8" onclick="_rendPage++;rendRenderDetalleLista()">Ver más (${filtradas.length-pag.length} restantes)</button>` : ''

  const esYo=id===USER?.id
  // Campos de PIN: solo el propio usuario puede cambiar su PIN

  const pinSection = esYo
    ? `<div class="field"><label>Cambiar PIN (dejar vacío para no cambiar)</label>
        <input id="eu-p" class="inp" type="password" inputmode="numeric" maxlength="8" placeholder="Nuevo PIN (4+ dígitos)"></div>`
    : (esAdmin1
        ? `<div class="alert" style="margin-top:4px">Para resetear el PIN de este usuario, usa el botón de abajo. El usuario creará uno nuevo al próximo ingreso.</div>
           <button class="btn btn-r btn-sm mb8" onclick="resetearPin(${id})">🔄 Resetear PIN</button>`
        : '')
  showSheet(`<div class="sh-title">✏️ Editar usuario<button class="sh-x" onclick="closeSheet()">✕</button></div>
    <div class="field"><label>Nombre *</label><input id="eu-n" class="inp" value="${u.nombre}"></div>
    ${esAdmin1
      ? `<div class="field"><label>Rol</label><select id="eu-r" class="inp">${mkArr(ROLES,u.rol)}</select></div>`
      : `<div class="field"><label>Rol</label><div class="inp" style="background:#f4f4f4;color:#777;padding:13px 14px">${u.rol}</div></div>`}
    ${pinSection}
    <button class="btn btn-b" onclick="guardarEditarUsuario(${id},${esAdmin1},${esYo})">Guardar cambios</button>`)

async function guardarEditarUsuario(id,puedeEditarRol,esYo) {
  const n=$('eu-n').value.trim()
  if(!n){
    const f=$('eu-n');if(f){f.style.border='2px solid #C62828';f.focus()}
    showToast('El nombre es requerido','err');return
  }
  const updates={nombre:n,modificadoPor:USER?.nombre||'—',modificadoEn:Date.now()}
  if(puedeEditarRol&&$('eu-r')) updates.rol=$('eu-r').value
  if(esYo){
    const pin=$('eu-p')?.value||''
    if(pin){
      if(pin.length<4){
        const f=$('eu-p');if(f){f.style.border='2px solid #C62828';f.focus()}
        showToast('El PIN debe tener al menos 4 dígitos','err');return
      }
      updates.pinHash=await hPin(pin)
    }
  }
  const btn=document.querySelector('#ov .btn-b')
  if(btn){btn.disabled=true;btn.textContent='Guardando…'}
  try{
    await fsUpdate('usuarios',id,updates)
  }catch(e){
    showToast('Error al guardar usuario','err',4000)
    if(btn){btn.disabled=false;btn.textContent='Guardar cambios'}
    return
  }
  if(id===USER?.id){if(USER){USER.nombre=n;if(updates.rol)USER.rol=updates.rol}}
  closeSheet(); go('config')
}
async function resetearPin(id) {
  if(!await showConfirm('¿Resetear el PIN de este usuario?\nDeberá crear uno nuevo la próxima vez que ingrese.')) return
  await fsUpdate('usuarios',id,{pinHash:null,pinReseteadoPor:USER?.nombre||'—',pinReseteadoEn:Date.now()})
  closeSheet(); go('config')
}

// ═══ EXCEL ═══
async function loadXLSX(){
  if(typeof XLSX!=='undefined') return true
  return new Promise((res,rej)=>{
    const s=document.createElement('script')
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'
    s.onload=()=>res(true)
    s.onerror=()=>rej(new Error('No se pudo cargar la librería Excel. Verifica tu conexión.'))
    document.head.appendChild(s)
  })
}


async function testFirebase(){
  try{
    showSyncStatus('sync')
    await Promise.race([
      (async()=>{
        await fsdb.collection('_test').doc('ping').set({ts:Date.now()})
        await fsdb.collection('_test').doc('ping').delete()
      })(),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),5000))
    ])
    showSyncStatus('ok'); return true
  }catch(e){ showSyncStatus('err'); console.warn('Firebase test:',e.message); return false }
}

async function subirAFirebase(){

    btn.disabled=false; btn.textContent='⬆ Subir TODO a Firebase'; return

async function diagnosticoFirestore(){
  showToast('Consultando Firestore...','ok',3000)
  try {
    const tables=['animales','pesajes','labores','potreros','lotes','ciclos','laboresPotrero','rotaciones','lluvias']
    const results=[]
    for(const t of tables){
      const snap=await fsdb.collection(t).get()
      if(!snap.empty) results.push(t+': '+snap.size)
    }
    const msg = results.length ? results.join(' | ') : 'Firestore vacío'
    await showAlert('📊 Firestore:\n\n'+msg+'\n\nDexie local:\nAnimales: '+(await db.animales.count()))
  } catch(e){ await showAlert('Error: '+e.message) }
}

async function probarFirebase(){
  const btn=event.target; btn.disabled=true; btn.textContent='⏳ Probando...'
  const ok=await testFirebase()
  btn.disabled=false; btn.textContent='🔍 Probar conexión'
  if(ok){
    showToast('✅ Firebase conectado correctamente','ok',4000)
  } else {
    showToast('La sincronización ocurre automáticamente en segundo plano','info',4000)
  }
}

async function exportarParaImportar(){
  try{
    await loadXLSX()
    const [animales,potreros,lotes,rotaciones,laboresPotrero,lluvias]=await Promise.all([
      db.animales.where('activo').equals(1).toArray(),
      db.potreros.where('activo').equals(1).toArray(),
      db.lotes.where('activo').equals(1).toArray(),
      db.rotaciones.where('activo').equals(1).toArray(),
      db.laboresPotrero.toArray(),
      db.lluvias.orderBy('fecha').toArray()
    ])
    const wb = XLSX.utils.book_new()
    const fd = ts => { if(!ts) return ''; const d=new Date(+ts); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear() }
    const loteNomMap = {}; lotes.forEach(l=>loteNomMap[l.id]=l.nombre)
    const potNomMap  = {}; potreros.forEach(p=>potNomMap[p.id]=p.nombre)

    // ── ANIMALES ──
    const wsAnim = XLSX.utils.aoa_to_sheet([
      ['#','Número','Cat.','Raza','Color','Peso Inicial (kg)','Precio Compra ($/kg)','Fecha Ingreso (DD/MM/AAAA)','Procedencia','Lote','Descripción / Obs.'],
      ...animales.map((a,i)=>[
        i+1, a.arete, a.categoria||'', a.raza||'', a.color||'',
        a.pesoInicial||0, a.precioPorKg||'', fd(a.fechaIngreso),
        a.procedencia||'', loteNomMap[a.loteId]||'', a.descripcion||''
      ])
    ])
    wsAnim['!cols']=[{wch:4},{wch:10},{wch:5},{wch:10},{wch:8},{wch:11},{wch:12},{wch:14},{wch:13},{wch:16},{wch:30}]
    wsAnim['!autofilter']={ref:'A1:K'+(animales.length+1)}
    XLSX.utils.book_append_sheet(wb, wsAnim, 'ANIMALES')

    // ── LOTES ──
    const wsLotes = XLSX.utils.aoa_to_sheet([
      ['Nombre del Lote','Descripción'],
      ...lotes.map(l=>[l.nombre, l.descripcion||''])
    ])
    wsLotes['!cols']=[{wch:17},{wch:30}]
    wsLotes['!autofilter']={ref:'A1:B'+(lotes.length+1)}
    XLSX.utils.book_append_sheet(wb, wsLotes, 'LOTES')

    // ── POTREROS ──
    const wsPotreros = XLSX.utils.aoa_to_sheet([
      ['Nombre del Potrero','Área (ha)','Estado inicial','Pendiente','Fuente de Agua','Descripción / Obs.','Composición Pastos (var % separados por coma)'],
      ...potreros.map(p=>[p.nombre, p.areaHa||0, p.estado||'DISPONIBLE', p.pendiente||'PLANO', p.fuenteAgua||'NINGUNA', p.observaciones||'', p.pastos||''])
    ])

      return{'Arete':a?.arete||'','Fecha pesaje':fd(p.fecha),'Peso (kg)':p.pesoKg,
        'Método':METODO[p.metodo]||p.metodo,'CC':p.cc||'','Observación':p.obs||'',
        'Registrado por':p.registradoPor||'','Fecha registro':fdh(p.registradoEn)}
    })),'Pesajes')

    // Labores
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(labores.map(l=>{
      const a=animales.find(x=>x.id===l.animalId)
      return{'Arete':a?.arete||'','Fecha':fd(l.fecha),'Labor':LABORES_TIPO[l.tipo]||l.tipo,
        'Peso (kg)':l.pesoKg||'','Observación':l.obs||'',
        'Registrado por':l.registradoPor||'','Fecha registro':fdh(l.registradoEn)}
    })),'Labores')

    // Potreros
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(potreros.map(p=>({
      'Nombre':p.nombre,'Área (ha)':p.areaHa,'Pastos':p.pastos||'',
      'Pendiente':PENDIENTE[p.pendiente]||p.pendiente||'',
      'Fuente de agua':FUENTE_AGUA[p.fuenteAgua]||p.fuenteAgua||'',
      'Estado':ESTADO_POT[p.estado]||p.estado,'Observaciones':p.observaciones||''
    }))),'Potreros')

    // Lotes
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(lotes.map(l=>({
      'Nombre':l.nombre,'Descripción':l.descripcion||'','Fecha creación':fd(l.fechaCreacion)
    }))),'Lotes')

    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(ciclos.map(c=>{
      const pot=potreros.find(x=>x.id===c.potreroId)
      // Días de ocupación: guardados en el ciclo, o calcular si sigue activo
      const diasOcup = c.diasOcupacion
        ? c.diasOcupacion
        : (c.activo===1 && c.fechaEntrada ? Math.max(0,Math.round((ahoraXLS-c.fechaEntrada)/86400000)) : '')
      // Días de descanso: desde la fecha de salida hasta hoy (solo si el potrero está EN_DESCANSO)
      const pot2 = potreros.find(x=>x.id===c.potreroId)
      const diasDesc = (!c.activo && c.fechaSalida && pot2?.estado==='EN_DESCANSO')
        ? Math.max(0,Math.round((ahoraXLS-c.fechaSalida)/86400000))
        : ''
      return{
        'Potrero':pot?.nombre||'',
        'Lote':c.nombreLote||'',
        'N° animales':c.numAnimales||0,
        'Fecha entrada':fd(c.fechaEntrada),
        'Fecha salida':fd(c.fechaSalida),
        'Días ocupación':diasOcup,
        'Días descanso':diasDesc,
        'Estado ciclo':c.activo===1?'Activo':'Cerrado'
      }
    })),'Ciclos')

    // Lluvias
    if(lluvias.length){
      XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(
        [...lluvias].sort((a,b)=>a.fecha-b.fecha).map(l=>({
          'Fecha (DD/MM/AAAA)': fd(l.fecha),
          'Milímetros (mm)': l.mm,
          'Observación': l.obs||''
        }))
      ),'LLUVIAS')
    }

    // Rendimiento — detalle por animal (activos + vendidos + bajas)
    const filasRend = await calcRendimientoFilas()
    const estadoLbl = {activo:'Activo', vendido:'Vendido', baja:'Baja'}
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(filasRend.map(f=>({
      'Arete':f.a.arete,'Nombre':f.a.nombre||'','Categoría':CAT[f.a.categoria]||f.a.categoria,
      'Estado':estadoLbl[f.estado],'Lote':f.loteNom,
      'Peso inicial (kg)':Math.round(f.pesoInicial),'Peso final (kg)':Math.round(f.pesoFinal),
      'Ganancia (kg)':Math.round(f.ganancia),'Días':f.dias,'GDP (g/día)':f.gdp,
      'N° pesajes':f.nPesajes
    }))), 'Rendimiento')

    // Rendimiento — resumen por lote
    const gruposXls = {}
    for(const f of filasRend){ (gruposXls[f.loteNom] ||= []).push(f) }
    const resumenLoteRows = Object.entries(gruposXls).map(([nombre,anis])=>{
      const act = anis.filter(f=>f.estado==='activo')
      const ven = anis.filter(f=>f.estado==='vendido')
      const baj = anis.filter(f=>f.estado==='baja')
      const gan = anis.reduce((s,f)=>s+f.ganancia,0)
      const conD = anis.filter(f=>f.dias>0)
      const gdp = conD.length ? Math.round(conD.reduce((s,f)=>s+f.gdp,0)/conD.length) : 0
      const pesoActivo = act.reduce((s,f)=>s+f.pesoFinal,0)
      const kgVend = ven.reduce((s,f)=>s+f.pesoFinal,0)
      return {
        'Lote':nombre,'N° animales':anis.length,'Activos':act.length,'Vendidos':ven.length,'Bajas':baj.length,
        'Peso actual en finca (kg)':Math.round(pesoActivo),'Kg vendidos':Math.round(kgVend),
        'Ganancia total (kg)':Math.round(gan),'GDP promedio (g/día)':gdp
      }
    }).sort((a,b)=>b['N° animales']-a['N° animales'])
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumenLoteRows), 'Rendimiento por lote')

    XLSX.writeFile(wb,`HPRapp-${new Date().toISOString().split('T')[0]}.xlsx`)
  }catch(e){await showAlert('Error al exportar: '+e.message)}
}

// Busca un valor en la fila probando múltiples nombres de columna (sin distinguir mayúsculas)
function getCol(row,...names){
  for(const n of names){
    if(row[n]!==undefined&&row[n]!==null&&String(row[n]).trim()!=='') return row[n]
    const k=Object.keys(row).find(c=>c.trim().toLowerCase()===n.toLowerCase())
    if(k&&row[k]!==undefined&&row[k]!==null&&String(row[k]).trim()!=='') return row[k]
  }
  return ''
}
// Detecta la hoja de animales aunque tenga nombre diferente
function findSheet(wb,...names){
  for(const n of names){
    const found=wb.SheetNames.find(s=>s.trim().toLowerCase()===n.toLowerCase())
    if(found) return found
  }
  // Si no coincide exacto, busca que el nombre de hoja lo contenga
  for(const n of names){
    const found=wb.SheetNames.find(s=>s.toLowerCase().includes(n.toLowerCase()))
    if(found) return found
  }
  return null
}

  }
  const _hideProg = () => {

    if (ov) ov.remove()
  }

  try {
    _showProg(2, 'Leyendo archivo…')
    await loadXLSX()
    const data = await file.arrayBuffer()
    const wb = XLSX.read(data, {type:'array', cellDates:true})
    let resumen = []
    const quien = USER?.nombre || '—'
    const ahora = Date.now()

    // Helper: convierte fecha de cualquier tipo (Date obj, serial Excel, string DD/MM/AAAA)
    const parseFecha = (v) => {
      if (!v) return null
      // Serial numérico de Excel (ej: 46168)
      const num = parseFloat(v)
      if (!isNaN(num) && num > 40000 && num < 60000) return (num - 25569) * 86400000
      // String con formato DD/MM/YYYY o DD-MM-YYYY — siempre interpretamos como día/mes/año
      const s = String(v).trim()
      const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/)
      if (m) { const y = m[3].length===2?'20'+m[3]:m[3]; return Date.UTC(parseInt(y),parseInt(m[2])-1,parseInt(m[1])) }
      // Formato largo español: "20 de abr de 2026" — fallback por si acaso
      const MESES_ES = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11}
      const ml = s.match(/^(\d{1,2})\s+de\s+(\w+)\s+de\s+(\d{4})$/i)
      if (ml) { const mo=MESES_ES[ml[2].toLowerCase().substring(0,3)]; if(mo!==undefined) return Date.UTC(parseInt(ml[3]),mo,parseInt(ml[1])) }
      // Date object de XLSX.js: puede estar invertido si el PC tiene región inglesa.
      // Reconstruimos desde los componentes UTC para evitar el problema de zona horaria,
      // pero verificamos si el día > 12 para saber si ya viene en orden correcto.
      if (v instanceof Date) {
        const d = v.getUTCDate(), mo = v.getUTCMonth()+1, y = v.getUTCFullYear()
        // Si el mes parseado > 12 es imposible → XLSX lo interpretó como DD/MM correctamente
        // Si día <= 12 y mes <= 12, XLSX pudo haber invertido (región inglesa MM/DD).
        // En ese caso confiamos en que el formato de celda es DD/MM → intercambiamos d y mo.
        // Heurística: si mo > 12 → imposible como mes, usar d como mes
        if (mo > 12) return Date.UTC(y, d-1, mo)   // caso raro pero seguro
        return Date.UTC(y, mo-1, d)                  // asumir que XLSX lo leyó bien (celda formateada DD/MM)
      }
      const dt = new Date(s); return isNaN(dt.getTime()) ? null : dt.getTime()
    }
    // Helper: lee hoja como arrays desde fila 2 (range:0, slice(1) salta encabezados)
    const readSheet = (sh, raw=true) =>
      XLSX.utils.sheet_to_json(wb.Sheets[sh], {header:1, range:0, raw, defval:''})
        .slice(1)  // slice(1) salta la fila de encabezados, datos desde fila 2

    _showProg(10, 'Importando lotes…')
    // ── LOTES ──────────────────────────────────────
    const shLote = wb.SheetNames.find(s => /^LOTES?$/i.test(s.trim()))
    if (shLote) {
      // Col 0: Nombre del Lote, Col 1: Descripción
      const rows = readSheet(shLote, false).filter(r => r[0] && String(r[0]).trim())
      let addedL=0, dupL=0
      for (const row of rows) {
        const raw = String(row[0]).trim()
        if (!raw) continue
        // Si es solo un número o "11", convertir a "LOTE 11"

            const rows = readSheet(shAnim, true).filter(r => r[1] && esAreteValido(r[1]))

        const arete = String(row[1]||'').trim();
        const catRaw = String(row[2]||'').trim().toUpperCase();
        
        // 1. Aretes duplicados dentro del mismo Excel — omitir el duplicado
        if (aretesEnExcel.has(arete)) continue;
        aretesEnExcel.add(arete);

        // 2. Categorías mal escritas — omitir fila con aviso al final
        if (!categoriasValidas.includes(catRaw)) continue;

        // 3. Aretes que ya existen en la DB — omitir silenciosamente (se contarán como dupA)
      }
      // --- FIN DEL BLINDAJE ---
      // Reconstruir mapa de lotes (incluye los recién importados)
      const todosLotes = await db.lotes.toArray()
      const loteMap = {}
      todosLotes.forEach(l => loteMap[l.nombre.trim().toLowerCase()] = l.id)

      // Auto-crear lotes que aparecen en ANIMALES pero no existen todavía
      const lotesEnAnimales = new Set()
      for (const row of rows) {
        const ln = String(row[9]||'').trim()
        if (!ln) continue
        // Normalizar ya en la recolección
        const lnNorm = /^\d+$/.test(ln) ? 'LOTE '+ln : /^lote\s+\d+$/i.test(ln) ? 'LOTE '+ln.replace(/^lote\s+/i,'') : ln
        lotesEnAnimales.add(lnNorm)
      }
      for (const ln of lotesEnAnimales) {
        if (!loteMap[ln.toLowerCase()]) {
          const id = await fsAdd('lotes', {nombre:ln, activo:1, creadoEn:ahora})
          loteMap[ln.toLowerCase()] = id
        }
      }

      let addedA=0, dupA=0, updA=0, sinArete=0
      for (const row of rows) {
        const arete = String(row[1]||'').trim()
        if (!arete) { sinArete++; continue }
        const existe = await db.animales.where('arete').equals(arete).first()

        const precioKg = parseFloat(String(row[6]||'0').replace(',','.')) || null

        if (existe) {
          // Actualizar solo precio de compra si viene en el Excel y es diferente
          if (precioKg && precioKg !== (existe.precioPorKg||null)) {
            await fsUpdate('animales', existe.id, {precioPorKg: precioKg})
            updA++
          } else {
            dupA++
          }
          continue
        }

        const catRaw = String(row[2]||'').trim()
        const cat = Object.keys(CAT).find(k=>k===catRaw) || Object.keys(CAT).find(k=>CAT[k]===catRaw) || 'HC'
        const pesoIni   = parseFloat(String(row[5]||'0').replace(',','.')) || 0
        const fechaTs   = parseFecha(row[7]) || ahora
        const loteRaw   = String(row[9]||'').trim()
        const loteNorm  = loteRaw ? (/^\d+$/.test(loteRaw) ? 'LOTE '+loteRaw : /^lote\s+\d+$/i.test(loteRaw) ? 'LOTE '+loteRaw.replace(/^lote\s+/i,'') : loteRaw) : ''
        const loteNom   = loteNorm.toLowerCase()
        const loteId    = loteNom ? (loteMap[loteNom]||null) : null

        const id = await fsAdd('animales', {
          arete, nombre:undefined,
          categoria:cat, raza:String(row[3]||'').trim(),
          color:String(row[4]||'').trim()||undefined,
          pesoInicial:pesoIni, descripcion:String(row[10]||'').trim()||undefined,
          procedencia:String(row[8]||'').trim()||undefined,
          estadoSanitario:'SANO', activo:1, fechaIngreso:fechaTs,
          loteId, fechaLote:loteId?fechaTs:undefined,
          precioPorKg:precioKg,
          creadoPor:quien, creadoEn:ahora
        })
        if (pesoIni > 0) {
          await fsAdd('pesajes', {animalId:id, fecha:fechaTs, pesoKg:pesoIni, metodo:'BASCULA', cc:3, obs:'Importado desde Excel', registradoPor:quien, registradoEn:ahora})
          await fsAdd('labores',  {animalId:id, fecha:fechaTs, tipo:'PESAJE', pesoKg:pesoIni, obs:'Importado desde Excel', registradoPor:quien, registradoEn:ahora})
        }
        addedA++
      }
      resumen.push(`🐄 Animales: ${addedA} importados${updA?' · '+updA+' precios actualizados':''}${dupA?' · '+dupA+' ya existían':''}${sinArete?' · '+sinArete+' sin arete':''}`)
    }

    _showProg(55, 'Importando pesajes…')
    // ── PESAJES ────────────────────────────────────
    // Col 0:Arete  1:Peso  2:Fecha  3:Obs
    const shPes = wb.SheetNames.find(s => /PESAJES?/i.test(s))
    if (shPes) {
      const rows = readSheet(shPes, true).filter(r => r[0] && r[1])
      const todosAnimalesPes = await db.animales.toArray()
      const areteMap = {}
      todosAnimalesPes.forEach(a => areteMap[String(a.arete).trim()] = a.id)
      let addedPes=0, skipPes=0
      for (const row of rows) {
        const arete   = String(row[0]||'').trim()
        const pesoKg  = parseFloat(String(row[1]).replace(',','.')) || 0
        const fechaTs = parseFecha(row[2])
        if (!arete || !pesoKg || !fechaTs) { skipPes++; continue }
        const animalId = areteMap[arete]; if (!animalId) { skipPes++; continue }
        const dup = await db.pesajes.where('animalId').equals(animalId).filter(p=>p.fecha===fechaTs&&p.pesoKg===pesoKg).first()
        if (dup) { skipPes++; continue }
        const obs = String(row[3]||'').trim()
        await fsAdd('pesajes', {animalId, fecha:fechaTs, pesoKg, metodo:'BASCULA', cc:3, ...(obs&&{obs}), registradoPor:quien, registradoEn:ahora})
        addedPes++
      }
      if (addedPes||skipPes) resumen.push(`⚖️ Pesajes: ${addedPes} importados${skipPes?' · '+skipPes+' omitidos':''}`)
    }

    _showProg(65, 'Importando labores de lotes…')
    // ── LABORES LOTES ──────────────────────────────
    // Col 0:Lote  1:Tipo  2:Producto  3:Dosis  4:Fecha  5:Obs
    const shLabL = wb.SheetNames.find(s => /LABORES?_LOTES?/i.test(s))
    if (shLabL) {
      const rows = readSheet(shLabL, true).filter(r => r[0] && r[1] && r[4])
      const todosLotesLL = await db.lotes.where('activo').equals(1).toArray()
      const loteMapLL = {}; todosLotesLL.forEach(l=>loteMapLL[l.nombre.trim().toLowerCase()]=l.id)
      let addedLL=0, skipLL=0
      for (const row of rows) {
        const loteNom = String(row[0]||'').trim(); if (!loteNom) { skipLL++; continue }
        const tipo    = String(row[1]||'').trim().toUpperCase()
        const fechaTs = parseFecha(row[4]); if (!fechaTs) { skipLL++; continue }
        const loteId  = loteMapLL[loteNom.toLowerCase()]; if (!loteId) { skipLL++; continue }
        const animalesLote = await db.animales.where('loteId').equals(loteId).toArray()
        const producto = String(row[2]||'').trim()||undefined
        const dosis    = String(row[3]||'').trim()||undefined
        const obs      = String(row[5]||'').trim()||undefined
        for (const animal of animalesLote) {
          const dup = await db.labores.where('animalId').equals(animal.id).filter(l=>l.fecha===fechaTs&&l.tipo===tipo).first()
          if (!dup) await fsAdd('labores',{animalId:animal.id,fecha:fechaTs,tipo,producto,dosis,obs,registradoPor:quien,registradoEn:ahora})
        }
        addedLL++
      }
      if (addedLL||skipLL) resumen.push(`💉 Labores lotes: ${addedLL} importadas${skipLL?' · '+skipLL+' omitidas':''}`)
    }

    _showProg(75, 'Importando labores de potreros…')
    // ── LABORES POTREROS ───────────────────────────
    // Col 0:Potrero  1:Tipo  2:Producto  3:Dosis  4:Fecha  5:Obs
    const shLabP = wb.SheetNames.find(s => /LABORES?_POTREROS?/i.test(s))
    if (shLabP) {
      // Col: 0=Potrero 1=Tipo 2=FechaIni 3=FechaFin 4=Jornales 5=Producto 6=Volumen 7=Obs
      const tiposValidos = ['CERCA','GUADANA','FUMIGACION','TOCONEO','SIEMBRA','RESIEMBRA']
      const rows = readSheet(shLabP, true).filter(r => r[0] && r[1] && r[2])
      const todosPotLP = await db.potreros.where('activo').equals(1).toArray()
      const potMapLP = {}; todosPotLP.forEach(p=>potMapLP[p.nombre.trim().toLowerCase()]=p.id)
      let addedLP=0, skipLP=0
      for (const row of rows) {
        const potNom  = String(row[0]||'').trim(); if (!potNom) { skipLP++; continue }
        const tipo    = String(row[1]||'').trim().toUpperCase(); if (!tiposValidos.includes(tipo)) { skipLP++; continue }
        const fechaTs = parseFecha(row[2]); if (!fechaTs) { skipLP++; continue }
        const potId   = potMapLP[potNom.toLowerCase()]; if (!potId) { skipLP++; continue }
        const dup = await db.laboresPotrero.where('potreroId').equals(potId).filter(l=>l.fecha===fechaTs&&l.tipo===tipo).first()
        if (dup) { skipLP++; continue }
        const fechaFin  = parseFecha(row[3]) || null
        const jornales  = parseInt(String(row[4]||'0')) || 0
        const productos = String(row[5]||'').trim() || null
        const volumen   = parseFloat(String(row[6]||'').replace(',','.')) || null
        const obs       = String(row[7]||'').trim() || null
        await fsAdd('laboresPotrero',{potreroId:potId,tipo,fecha:fechaTs,fechaFin,jornales,productos,volumen,observaciones:obs,registradoPor:quien,registradoEn:ahora})
        addedLP++
      }
      if (addedLP||skipLP) resumen.push(`🌿 Labores potreros: ${addedLP} importadas${skipLP?' · '+skipLP+' omitidas':''}`)
    }

    _showProg(82, 'Importando rotaciones…')
    // ── ROTACIONES ─────────────────────────────────
    // Col 0:Nombre  1:Potreros(coma)  2:Desc
    const shRot = wb.SheetNames.find(s => /ROTACION/i.test(s))
    if (shRot) {
      const rows = readSheet(shRot, false).filter(r => r[0] && r[1])
      const todosPotRot = await db.potreros.where('activo').equals(1).toArray()
      const potMapRot = {}; todosPotRot.forEach(p=>potMapRot[p.nombre.trim().toLowerCase()]=p.id)
      let addedRot=0, skipRot=0
      for (const row of rows) {
        const nombre = String(row[0]).trim(); if (!nombre) { skipRot++; continue }
        const dup = await db.rotaciones.filter(r=>r.nombre.trim().toLowerCase()===nombre.toLowerCase()&&r.activo===1).first()
        if (dup) { skipRot++; continue }
        const potNombres = String(row[1]).split(',').map(s=>s.trim()).filter(Boolean)
        const potreroIds = potNombres.map(n=>potMapRot[n.toLowerCase()]).filter(Boolean)
        const desc = String(row[2]||'').trim()||undefined
        await fsAdd('rotaciones',{nombre,descripcion:desc,potreroIds,activo:1,creadoEn:ahora})
        addedRot++
      }
      if (addedRot||skipRot) resumen.push(`🔄 Rotaciones: ${addedRot} importadas${skipRot?' · '+skipRot+' omitidas':''}`)
    }

    _showProg(90, 'Importando lluvias…')
    // ── LLUVIAS ────────────────────────────────────
    // Col 0:Fecha  1:mm  2:Obs
    const shLluv = wb.SheetNames.find(s => /LLUVIA/i.test(s))
    if (shLluv) {
      const rows = readSheet(shLluv, true).filter(r => r[0] && r[1])
      let addedLl=0, dupLl=0, errLl=0
      for (const row of rows) {
        const fechaTs = parseFecha(row[0]); const mm = parseFloat(String(row[1]).replace(',','.')) || 0
        if (!fechaTs || !mm) { errLl++; continue }
        const existe = await db.lluvias.where('fecha').equals(fechaTs).first()
        if (existe) { dupLl++; continue }
        const obs = String(row[2]||'').trim()||undefined
        await fsAdd('lluvias', {fecha:fechaTs, mm, ...(obs&&{obs})})
        addedLl++
      }
      resumen.push(`🌧 Lluvias: ${addedLl} importadas${dupLl?' · '+dupLl+' ya existían':''}${errLl?' · '+errLl+' sin fecha':''}`)
    }

    _showProg(93, 'Importando ciclos…')
    // ── CICLOS ────────────────────────────────────
    // Col 0:Potrero  1:Lote  2:NumAnimales  3:FechaEntrada  4:FechaSalida  5:Activo  6:Obs
    const shCiclos = wb.SheetNames.find(s => /^CICLOS?$/i.test(s.trim()))
    if (shCiclos) {
      const rowsCiclos = readSheet(shCiclos, true).filter(r => r[0] && r[1])
      const todosPotCic = await db.potreros.where('activo').equals(1).toArray()
      const potMapCic = {}; todosPotCic.forEach(p=>potMapCic[p.nombre.trim().toLowerCase()]=p)
      const todosLotesCic = await db.lotes.where('activo').equals(1).toArray()
      const loteMapCic = {}; todosLotesCic.forEach(l=>loteMapCic[l.nombre.trim().toLowerCase()]=l)
      let addedCic=0, skipCic=0
      for (const row of rowsCiclos) {
        const potNom  = String(row[0]||'').trim(); if (!potNom) { skipCic++; continue }
        const loteNom = String(row[1]||'').trim(); if (!loteNom) { skipCic++; continue }
        const pot  = potMapCic[potNom.toLowerCase()];  if (!pot)  { skipCic++; continue }
        const lote = loteMapCic[loteNom.toLowerCase()]; if (!lote) { skipCic++; continue }
        const fechaEntrada = parseFecha(row[3]); if (!fechaEntrada) { skipCic++; continue }
        const fechaSalida  = parseFecha(row[4]) || undefined
        const activo = parseInt(String(row[5]||'1')) === 1 ? 1 : 0
        const numAnimales  = parseInt(String(row[2]||'0'))||0
        const obs = String(row[6]||'').trim()||undefined
        // Evitar duplicados: mismo potrero + lote + fechaEntrada
        const dup = await db.ciclos.where({potreroId:pot.id,loteId:lote.id}).filter(c=>c.fechaEntrada===fechaEntrada).first()
        if (dup) { skipCic++; continue }
        await fsAdd('ciclos',{potreroId:pot.id,loteId:lote.id,nombreLote:lote.nombre,numAnimales,fechaEntrada,fechaSalida,activo,obs})
        // Si ciclo activo → actualizar estado del potrero a OCUPADO
        if (activo === 1) {
          await fsUpdate('potreros', pot.id, {estado:'OCUPADO', numAnimales, loteActual:lote.id})
        }
        addedCic++
      }
      if (addedCic||skipCic) resumen.push(`🔄 Ciclos: ${addedCic} importados${skipCic?' · '+skipCic+' omitidos':''}`)
    }

    _showProg(100, 'Finalizando…')
    await new Promise(r => setTimeout(r, 400))
    _hideProg()

    if (!resumen.length) {
      await showAlert('No se encontraron hojas reconocidas.\nAsegúrese de usar el archivo HPRapp_Tablas_Importacion.xlsx')
    } else {
      // Actualizar data_version para que otros dispositivos detecten datos nuevos
      const _dv = String(Date.now())
      localStorage.setItem('hpr_data_version', _dv)
      try {
        await fsdb.collection('config').doc('data_version').set({clave:'data_version', valor:_dv, _ts:parseInt(_dv)})
        await setCfg('data_version', _dv)
      } catch(e) {}
      await showAlert('✅ Importación completada:\n\n' + resumen.join('\n'))
    }
    input.value = ''
    go('config')
  } catch(e) { _hideProg(); await showAlert('Error al importar: ' + e.message); input.value = '' }
}
