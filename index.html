// Busca un valor en la fila probando múltiples nombres de columna (sin distinguir mayúsculas)
function getCol(row,...names){
  for(const n of names){
    if(row[n]!==undefined&&row[n]!==null&&String(row[n]).trim()!=='') return row[n]
    const k=Object.keys(row).find(c=>c.trim().toLowerCase()===n.toLowerCase())
    if(k&&row[k]!==undefined&&row[k]!==null&&String(row[k]).trim()!=='') return row[k]
  }
  return ''
}
// Detecta la hoja de animales aunque tenga nombre diferente
function findSheet(wb,...names){
  for(const n of names){
    const found=wb.SheetNames.find(s=>s.trim().toLowerCase()===n.toLowerCase())
    if(found) return found
  }
  // Si no coincide exacto, busca que el nombre de hoja lo contenga
  for(const n of names){
    const found=wb.SheetNames.find(s=>s.toLowerCase().includes(n.toLowerCase()))
    if(found) return found
  }
  return null
}

async function importarTodo(input) {
  const file = input.files[0]; if (!file) return
  try {
    await loadXLSX()
    const data = await file.arrayBuffer()
    const wb = XLSX.read(data, {type:'array', cellDates:true})
    const sheets = wb.SheetNames.map(s => s.toUpperCase())

    let resumen = []

    // ── LOTES ──────────────────────────────────────
    const shLote = wb.SheetNames.find(s => /LOTES?/i.test(s))
    if (shLote) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[shLote], {raw:false, defval:''})
        .filter(r => {
          const n = String(getCol(r,'Nombre del Lote','Nombre','NOMBRE','nombre') || '').trim()
          return n && !/^nombre/i.test(n)
        })
      let addedL = 0, dupL = 0
      for (const row of rows) {
        const nombre = String(getCol(row,'Nombre del Lote','Nombre','nombre') || '').trim()
        if (!nombre) continue
        const existe = await db.lotes.filter(l => l.nombre.trim().toLowerCase() === nombre.toLowerCase()).first()
        if (existe) { dupL++; continue }
        await fsAdd('lotes', {nombre, descripcion: String(getCol(row,'Descripción','Descripcion','descripcion') || '').trim(), activo:1, creadoEn:Date.now()})
        addedL++
      }
      resumen.push(`📂 Lotes: ${addedL} importados${dupL?' · '+dupL+' ya existían':''}`)
    }

    // ── POTREROS ───────────────────────────────────
    const shPot = wb.SheetNames.find(s => /POTREROS?/i.test(s))
    if (shPot) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[shPot], {raw:false, defval:''})
        .filter(r => {
          const n = String(getCol(r,'Nombre del Potrero','Nombre','nombre') || '').trim()
          return n && !/^nombre/i.test(n)
        })
      let addedP = 0, dupP = 0
      for (const row of rows) {
        const nombre = String(getCol(row,'Nombre del Potrero','Nombre','nombre') || '').trim()
        const areaHa = parseFloat(String(getCol(row,'Área (ha)','Area (ha)','Área','Area','areaHa') || '0').replace(',','.')) || 0
        const estadoRaw = String(getCol(row,'Estado inicial','Estado','estado') || 'DISPONIBLE').trim().toUpperCase()
        const estado = ['DISPONIBLE','OCUPADO','EN_DESCANSO'].includes(estadoRaw) ? estadoRaw : 'DISPONIBLE'
        if (!nombre) continue
        const existe = await db.potreros.where('activo').equals(1).filter(p => p.nombre.trim().toLowerCase() === nombre.toLowerCase()).first()
        if (existe) { dupP++; continue }
        await fsAdd('potreros', {nombre, areaHa, estado, activo:1, pendiente:'PLANO', pastos:'Pasto Nativo', fuenteAgua:'NINGUNA', observaciones:'', numAnimales:0})
        addedP++
      }
      resumen.push(`🌿 Potreros: ${addedP} importados${dupP?' · '+dupP+' ya existían':''}`)
    }

    // ── ANIMALES ───────────────────────────────────
    const shAnim = wb.SheetNames.find(s => /ANIMALES?/i.test(s))
    if (shAnim) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[shAnim], {raw:false, defval:''})
        .filter(r => {
          const a = String(getCol(r,'Arete','arete','ARETE') || '').trim()
          return a && !/^arete/i.test(a)
        })
      // Construir mapa de lotes por nombre para asignación
      const todosLotes = await db.lotes.toArray()
      const loteMap = {}
      for (const l of todosLotes) loteMap[l.nombre.trim().toLowerCase()] = l.id

      let addedA = 0, dupA = 0, sinAreteA = 0
      const quien = USER?.nombre || '—', ahora = Date.now()
      for (const row of rows) {
        const arete = String(getCol(row,'Arete','ARETE','arete','Arete / Número') || '').trim()
        if (!arete || arete === '0') { sinAreteA++; continue }
        const existe = await db.animales.where('arete').equals(arete).first()
        if (existe) { dupA++; continue }

        const catRaw = String(getCol(row,'Categoría','Categoria','CATEGORIA','categoria') || '').trim()
        const cat = Object.keys(CAT).find(k => k === catRaw)
          || Object.keys(CAT).find(k => CAT[k] === catRaw)
          || 'HC'

        const pesoRaw = getCol(row,'Peso Inicial (kg)','Peso inicial (kg)','Peso (kg)','Peso','peso','pesoInicial')
        const pesoIni = parseFloat(String(pesoRaw).replace(',','.')) || 0

        const fRaw = getCol(row,'Fecha Ingreso (DD/MM/AAAA)','Fecha Ingreso','Fecha ingreso','fechaIngreso','Fecha')
        let fechaTs = ahora
        if (fRaw) {
          // Intentar parsear DD/MM/AAAA
          const m = String(fRaw).match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/)
          if (m) {
            const y = m[3].length === 2 ? '20'+m[3] : m[3]
            fechaTs = new Date(`${y}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}T00:00:00`).getTime() || ahora
          } else {
            const d = new Date(fRaw); if (!isNaN(d.getTime())) fechaTs = d.getTime()
          }
        }

        const nombre     = String(getCol(row,'Nombre','NOMBRE','nombre') || '').trim()
        const raza       = String(getCol(row,'Raza','RAZA','raza') || '').trim()
        const color      = String(getCol(row,'Color','COLOR','color') || '').trim()
        const desc       = String(getCol(row,'Descripción / Obs.','Descripcion','descripcion','Obs') || '').trim()
        const proc       = String(getCol(row,'Procedencia','procedencia','Origen') || '').trim()
        const loteNombre = String(getCol(row,'Nombre del Lote','Lote','lote') || '').trim().toLowerCase()
        const loteId     = loteNombre ? (loteMap[loteNombre] || null) : null

        const id = await fsAdd('animales', {
          arete, nombre, categoria:cat, raza, color, pesoInicial:pesoIni,
          descripcion:desc, procedencia:proc, estadoSanitario:'SANO', activo:1,
          fechaIngreso:fechaTs, loteId, fechaLote:loteId?fechaTs:undefined,
          creadoPor:quien, creadoEn:ahora
        })
        if (pesoIni > 0) {
          await fsAdd('pesajes', {animalId:id, fecha:fechaTs, pesoKg:pesoIni, metodo:'BASCULA', cc:3, obs:'Importado desde Excel', registradoPor:quien, registradoEn:ahora})
          await fsAdd('labores',  {animalId:id, fecha:fechaTs, tipo:'PESAJE', pesoKg:pesoIni, obs:'Importado desde Excel', registradoPor:quien, registradoEn:ahora})
        }
        addedA++
      }
      resumen.push(`🐄 Animales: ${addedA} importados${dupA?' · '+dupA+' ya existían':''}${sinAreteA?' · '+sinAreteA+' sin arete':''}`)
    }

    // ── LLUVIAS ────────────────────────────────────
    // NOTA: La hoja tiene 2 filas de título antes de los encabezados reales (fila 3).
    // Se usa {header:1, range:2} para leer en modo array desde fila 3,
    // evitando que sheet_to_json use el título como clave de columna.
    const shLluv = wb.SheetNames.find(s => /LLUVIA/i.test(s))
    if (shLluv) {
      const allRowsLl = XLSX.utils.sheet_to_json(wb.Sheets[shLluv], {header:1, range:2, raw:true, defval:''})
      // allRowsLl[0] = fila de encabezados, allRowsLl[1+] = datos
      // Columna 0 = Fecha, Columna 1 = mm, Columna 2 = Observación
      const dataRowsLl = allRowsLl.slice(1).filter(r => r[0] && r[1])

      // Convierte fecha: Date object (cellDates), serial Excel, o string
      const parseFechaLluvia = (v) => {
        if (!v) return null
        if (v instanceof Date) {
          // Date de cellDates:true — usar UTC para evitar desfase de zona horaria
          return Date.UTC(v.getUTCFullYear(), v.getUTCMonth(), v.getUTCDate())
        }
        const num = parseFloat(v)
        if (!isNaN(num) && num > 40000 && num < 60000) {
          return (num - 25569) * 86400000 // Serial Excel → timestamp JS
        }
        const s = String(v).trim()
        // Formato DD/MM/AAAA o DD-MM-AAAA
        const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/)
        if (m) {
          const y = m[3].length === 2 ? '20'+m[3] : m[3]
          return Date.UTC(parseInt(y), parseInt(m[2])-1, parseInt(m[1]))
        }
        const d = new Date(s); return isNaN(d.getTime()) ? null : d.getTime()
      }

      let addedLl = 0, dupLl = 0, errLl = 0
      for (const row of dataRowsLl) {
        const fechaTs = parseFechaLluvia(row[0])
        const mm = parseFloat(String(row[1]).replace(',','.')) || 0
        if (!fechaTs || !mm) { errLl++; continue }
        const existe = await db.lluvias.where('fecha').equals(fechaTs).first()
        if (existe) { dupLl++; continue }
        const obsLl = String(row[2]||'').trim()
        const recLl = {fecha:fechaTs, mm}
        if (obsLl) recLl.obs = obsLl
        await fsAdd('lluvias', recLl)
        addedLl++
      }
      resumen.push(`🌧 Lluvias: ${addedLl} registros importados${dupLl?' · '+dupLl+' ya existían':''}${errLl?' · '+errLl+' sin fecha válida':''}`)
    }

    if (!resumen.length) {
      alert('No se encontraron hojas reconocidas.\nAsegúrese de usar el archivo HPRapp_Tablas_Importacion.xlsx')
    } else {
      alert('✅ Importación completada:\n\n' + resumen.join('\n'))
    }
    input.value = ''
    go('config')
  } catch(e) { alert('Error al importar: ' + e.message); input.value = '' }
}

async function importarExcel(input){
  const file=input.files[0];if(!file)return
  try{
    await loadXLSX()
    const data=await file.arrayBuffer()
    const wb=XLSX.read(data,{type:'array',cellDates:true})

    // Detectar hoja de animales con nombres alternativos
    const shAnimal=findSheet(wb,'Animales','Animal','Inventario','Ganado','ANIMALES','INVENTARIO','GANADO','Bovinos','Hato')
      ||wb.SheetNames[0]

    const rows=XLSX.utils.sheet_to_json(wb.Sheets[shAnimal],{raw:false,defval:''})
    if(!rows.length){alert('El archivo no contiene datos o está vacío.');input.value='';return}

    // Vista previa: mostrar primeras columnas detectadas
    const colsDetectadas=Object.keys(rows[0])
    const preview=`Hoja detectada: "${shAnimal}"\nColumnas encontradas: ${colsDetectadas.join(', ')}\n\nSe importarán ${rows.length} filas.\n¿Continuar?`
    if(!confirm(preview)){input.value='';return}

    let added=0, omitidos=0, sinArete=0
    for(const row of rows){
      // Arete: buscar bajo múltiples nombres
      const arete=String(getCol(row,'Arete','arete','ARETE','No.','Número','Numero','ID',
        'Código','Codigo','Identificación','Identificacion','Nro','Nro.','# Arete','Num')).trim()
      if(!arete||arete==='0'){sinArete++;continue}

      const existe=await db.animales.where('arete').equals(arete).first()
      if(existe){omitidos++;continue}

      // Categoría: acepta abreviatura (HC) o nombre completo o variantes
      const catRaw=String(getCol(row,'Categoría','Categoria','CATEGORIA','Tipo','TIPO',
        'Clase','CLASE','Abreviatura','Abre','Cat')).trim()
      const cat=Object.keys(CAT).find(k=>k===catRaw)
        ||Object.keys(CAT).find(k=>CAT[k]===catRaw)
        ||Object.keys(CAT).find(k=>CAT[k].toLowerCase().includes(catRaw.toLowerCase()))
        ||'HC'

      // Peso: buscar bajo múltiples nombres
      const pesoRaw=getCol(row,'Peso inicial (kg)','Peso (kg)','Peso','PESO','Peso kg',
        'Peso actual','Peso actual (kg)','Kg','KG','peso')
      const pesoIni=parseFloat(String(pesoRaw).replace(',','.'))||0

      // Fecha pesaje
      const fPesoRaw=getCol(row,'Fecha pesaje','Fecha de pesaje','Fecha Pesaje','Fecha peso',
        'Fecha','FECHA','Fecha ingreso','Fecha de ingreso')
      let fPesoTs=Date.now()
      if(fPesoRaw){const d=new Date(fPesoRaw);if(!isNaN(d.getTime()))fPesoTs=d.getTime()}

      const nombre=String(getCol(row,'Nombre','NOMBRE','nombre','')).trim()
      const raza=String(getCol(row,'Raza','RAZA','raza','Cruza','')).trim()
      const color=String(getCol(row,'Color','COLOR','color','Pelaje','PELAJE','')).trim()
      const desc=String(getCol(row,'Descripción','Descripcion','DESCRIPCION','Obs','Observación','Observacion','')).trim()
      const proc=String(getCol(row,'Procedencia','PROCEDENCIA','Origen','ORIGEN','')).trim()

      const id=await fsAdd('animales',{
        arete,nombre,categoria:cat,raza,color,pesoInicial:pesoIni,
        descripcion:desc,procedencia:proc,estadoSanitario:'SANO',activo:1,
        fechaIngreso:fPesoTs,creadoPor:USER?.nombre||'—',creadoEn:Date.now()
      })
      if(pesoIni>0){
        const quien=USER?.nombre||'—',ahora=Date.now()
        await fsAdd('pesajes',{animalId:id,fecha:fPesoTs,pesoKg:pesoIni,metodo:'BASCULA',cc:3,
          obs:'Importado desde Excel',registradoPor:quien,registradoEn:ahora})
        await fsAdd('labores',{animalId:id,fecha:fPesoTs,tipo:'PESAJE',pesoKg:pesoIni,
          obs:'Importado desde Excel',registradoPor:quien,registradoEn:ahora})
      }
      added++
    }

    let msg=`✓ ${added} animales importados`
    if(omitidos) msg+=`\n⏭ ${omitidos} ya existían (arete duplicado)`
    if(sinArete) msg+=`\n⚠ ${sinArete} filas sin arete (ignoradas)`
    alert(msg)
    input.value='';go('config')
  }catch(e){alert('Error al importar: '+e.message);input.value=''}
}


async function importarPotreros(input){
  const file=input.files[0]; if(!file) return
  try{
    await loadXLSX()
    const data=await file.arrayBuffer()
    const wb=XLSX.read(data,{type:'array',cellDates:true})
    const shPot=findSheet(wb,'Potreros_Rotacion','Potreros','POTREROS','Potrero','Rotacion','Rotación','N_Rotacion','Predios')||wb.SheetNames[0]
    const allRows=XLSX.utils.sheet_to_json(wb.Sheets[shPot],{header:1,defval:''})
    if(!allRows.length){alert('Sin datos.');input.value='';return}
    let headerIdx=0
    for(let i=0;i<Math.min(6,allRows.length);i++){
      if(allRows[i].filter(c=>typeof c==='string'&&c.trim().length>1).length>=2){headerIdx=i;break}
    }
    const headers=allRows[headerIdx].map(h=>(h||'').toString().trim())
    const rows=allRows.slice(headerIdx+1).map(row=>{const o={};headers.forEach((h,i)=>{o[h]=row[i]??''});return o})
      .filter(r=>Object.values(r).some(v=>v!==''&&v!==null))
    if(!rows.length){alert('No hay filas válidas.');input.value='';return}
    const norm=s=>s.toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[\s_\(\)\/]/g,'')
    const colNombre=headers.find(h=>/nombre|potrero|n.?rotac/i.test(h))
    const colArea=headers.find(h=>{const n=norm(h);return n==='area'||n==='areaha'||/\bha\b/.test(n)||/hect/.test(n)||/area/.test(n)})
    if(!colNombre||!colArea){alert('Columnas no detectadas.\nDetectadas: '+headers.filter(h=>h).join(', '));input.value='';return}
    const validas=rows.filter(r=>{
      const nom=(r[colNombre]||'').toString().trim()
      const ar=(r[colArea]||'').toString().trim()
      return nom&&!/^total/i.test(nom)&&ar&&ar.toLowerCase()!=='verificar'&&!isNaN(parseFloat(ar.replace(',','.')))
    })
    if(!validas.length){alert('Sin filas válidas.');input.value='';return}
    if(!confirm(`Hoja: "${shPot}"\nPotreros a importar: ${validas.length}\nPrimeros 5: ${validas.slice(0,5).map(r=>r[colNombre]).join(', ')}\n\n¿Confirmar?`)){input.value='';return}
    let added=0,dup=0
    for(const row of validas){
      const nombre=(row[colNombre]||'').toString().trim()
      const areaHa=parseFloat((row[colArea]||'').toString().replace(',','.'))
      const existe=await db.potreros.where('activo').equals(1).filter(p=>p.nombre.trim().toLowerCase()===nombre.toLowerCase()).first()
      if(existe){dup++;continue}
      const potId = await fsAdd('potreros',{nombre,areaHa,pendiente:'PLANO',pastos:'Pasto Nativo',fuenteAgua:'NINGUNA',observaciones:'',estado:'DISPONIBLE',activo:1,numAnimales:0})
      trazar('IMPORTAR_POTRERO','POTRERO',potId,{nombre,areaHa,fuente:'Excel'})
      added++
    }
    let msg=`✓ ${added} potreros importados`
    if(dup) msg+=`\n⏭ ${dup} ya existían`
    alert(msg); input.value=''; go('config')
  }catch(e){alert('Error: '+e.message);input.value=''}
}

async function crearUsuario(){
  const n=$('nu-n').value.trim()
  if(!n){
    const f=$('nu-n');if(f){f.style.border='2px solid #C62828';f.focus()}
    showToast('El nombre es requerido','err');return
  }
  const pin=($('nu-pin')?.value||'').trim()
  if(!pin||pin.length<4||isNaN(pin)){
    const f=$('nu-pin');if(f){f.style.border='2px solid #C62828';f.focus()}
    showToast('El PIN debe tener 4 dígitos','err');return
  }
  const existe = await db.usuarios.where('activo').equals(1).filter(u=>u.nombre.trim().toLowerCase()===n.toLowerCase()).first()
  if(existe){ showToast(`Ya existe el usuario "${existe.nombre}"`, 'err', 4000); return }
  const rol=$('nu-r')?.value
  const btn=document.querySelector('#ov .btn-b')
  if(btn){btn.disabled=true;btn.textContent='Creando…'}
  try{
    const ph = await hPin(pin)
    await fsAdd('usuarios',{nombre:n,rol,pinHash:ph,activo:1,creadoEn:Date.now()})
  }catch(e){
    showToast('Error al crear usuario','err',4000)
    if(btn){btn.disabled=false;btn.textContent='Crear usuario'}
    return
  }
  closeSheet()
  showToast(`Usuario "${n}" creado ✓`,'ok')
  go('config')
}

async function migrarNombresLote(){
  // Agrega prefijo "LOTE " a todos los lotes que no lo tengan
  const todos=await db.lotes.toArray()
  for(const l of todos){
    if(!/^lote\s/i.test(l.nombre.trim())){
      await fsUpdate('lotes',l.id,{nombre:'LOTE '+l.nombre.trim()})
    }
  }
}
async function bootstrapFromFirebase(){
  try {
    // Pull ALL collections from Firebase to local Dexie
    const tables=['animales','pesajes','labores','potreros','lotes','ciclos','usuarios','laboresPotrero','rotaciones']
    for(const t of tables){
      const snap=await fsdb.collection(t).get()
      if(snap.empty) continue
      for(const doc of snap.docs){
        const d=doc.data()
        const localId=parseInt(doc.id)
        if(isNaN(localId)) continue
        const {_id,_ts,...clean}=d
        try{
          const exists=await db[t].get(localId)
          if(!exists) await db[t].put({...clean,id:localId})
        }catch(e){}
      }
    }
    // Config
    const cfgSnap=await fsdb.collection('config').get()
    for(const doc of cfgSnap.docs){
      const d=doc.data()
      if(d.clave) await setCfg(d.clave,d.valor)
    }
  }catch(e){ console.warn('Bootstrap offline:',e.message) }
}
